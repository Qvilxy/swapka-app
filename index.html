<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flower Shop TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-color: #000000;
            --secondary-text: #8e8e93;
            --card-bg: #ffffff;
            --input-bg: #e3e3e8;
            --nav-bg: rgba(255, 255, 255, 0.85); /* Более прозрачный для эффекта стекла */
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --green-tile: #a8e6cf;
        }

        body.dark-mode {
            --bg-color: #000000;
            --text-color: #ffffff;
            --secondary-text: #98989d;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
            --nav-bg: rgba(28, 28, 30, 0.85);
            --shadow: 0 2px 8px rgba(0,0,0,0.2);
            --green-tile: #1c3a2a; /* Темно-зеленый для темной темы или прозрачный */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            /* Убираем стандартные отступы браузера */
        }

        /* Главный контейнер, который сдвигает контент вниз на 10px от нативного хедера */
        .app-container {
            padding-top: 10px; 
            padding-bottom: 100px; /* Место под нижнее меню */
            min-height: 100vh;
        }

        /* --- Headers --- */
        .page-header {
            padding: 10px 16px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-color); /* Сливается с фоном */
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 {
            font-size: 28px; /* Чуть крупнее как в iOS */
            font-weight: 700;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: var(--text-color);
            cursor: pointer;
        }

        /* --- Tabs --- */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* --- TAB 1: GIFTS --- */
        .search-row {
            padding: 0 16px 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .search-box {
            flex-grow: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 10px 10px 38px;
            border-radius: 10px;
            border: none;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-text);
            font-size: 14px;
        }

        .cart-btn {
            background-color: var(--card-bg);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            position: relative;
            border: none;
            color: var(--text-color);
            font-size: 18px;
        }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff3b30;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 10px;
            display: none;
        }

        .filters-row {
            padding: 0 16px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none; /* Скрыть скроллбар Firefox */
        }
        .filters-row::-webkit-scrollbar { display: none; } /* Скрыть скроллбар Chrome/Safari */

        .filter-pill {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: none;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow);
            white-space: nowrap;
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 16px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .tile-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--green-tile); /* Зеленая плитка по умолчанию */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Если есть фото, зеленый фон убирается, становится прозрачным/картинкой */
        .tile-image.has-img {
            background-color: transparent;
        }
        
        .tile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .p-info {
            padding: 10px;
        }

        .p-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .p-price {
            font-size: 13px;
            color: var(--secondary-text);
            margin-bottom: 8px;
        }

        .add-btn {
            width: 100%;
            padding: 8px;
            background-color: var(--bg-color); /* Кнопка под цвет фона или контрастная */
            color: var(--text-color);
            border: 1px solid var(--input-bg);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .add-btn:active {
            opacity: 0.7;
        }

        /* --- TAB 2: PROFILE --- */
        .profile-top {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #ccc;
            object-fit: cover;
        }

        .u-name { font-size: 18px; font-weight: 600; }
        .u-tag { font-size: 14px; color: var(--secondary-text); }

        .info-card {
            background-color: var(--card-bg);
            margin: 0 16px 12px;
            border-radius: 14px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .card-head {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--secondary-text); /* Заголовки секций серые как в iOS настройках */
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        
        .card-head i { color: var(--text-color); }

        /* Calendar */
        .cal-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 16px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .d-name { font-size: 11px; color: var(--secondary-text); margin-bottom: 6px; }
        
        .d-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border-radius: 50%; /* Круглые даты */
        }

        .d-cell.today {
            background-color: var(--text-color);
            color: var(--bg-color);
            font-weight: 600;
        }

        .d-cell.event {
            background-color: #ff3b30;
            color: white;
            font-weight: 600;
        }

        /* Lists in Profile */
        .list-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--input-bg);
            font-size: 15px;
        }
        .list-row:last-child { border-bottom: none; }
        .row-label { color: var(--text-color); }
        .row-val { color: var(--secondary-text); }
        .row-action { color: #007aff; }

        /* --- TAB 3: COURIER --- */
        .order-card {
            background-color: var(--card-bg);
            margin: 0 16px 16px;
            border-radius: 14px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .o-head {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--input-bg);
        }

        .o-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
            padding-bottom: 4px;
        }

        .o-thumb {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            background-color: var(--green-tile);
            flex-shrink: 0;
        }
        .o-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }

        .o-detail { font-size: 14px; margin-bottom: 6px; line-height: 1.3; }
        .o-detail b { display: block; color: var(--text-color); margin-bottom: 2px; }
        .o-detail span { color: var(--secondary-text); }
        .o-phone { color: #007aff !important; font-weight: 500; }

        /* --- BOTTOM NAV --- */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85px;
            background: var(--nav-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-around;
            align-items: flex-start; /* Иконки сверху */
            padding-top: 10px;
            z-index: 100;
            border-top: 0.5px solid rgba(128,128,128, 0.1); /* Едва заметная линия */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--secondary-text);
            font-size: 10px;
            font-weight: 500;
            width: 25%;
            cursor: pointer;
        }

        .nav-item i { font-size: 24px; margin-bottom: 2px; transition: transform 0.1s; }
        .nav-item:active i { transform: scale(0.9); }

        .nav-item.active { color: #007aff; }
        .nav-item.active i { font-weight: 900; } /* Жирная иконка для активного */

        /* --- MODALS --- */
        .modal-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .modal-bg.open { display: block; opacity: 1; }

        .sheet {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: var(--card-bg);
            border-radius: 16px 16px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 201;
            max-height: 70vh;
            overflow-y: auto;
        }
        .sheet.open { transform: translateY(0); }

        .handle {
            width: 36px; height: 4px; background: var(--secondary-text);
            border-radius: 2px; margin: 0 auto 20px; opacity: 0.3;
        }

        .btn-full {
            width: 100%; padding: 14px;
            background: #007aff; color: white;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600;
            margin-top: 15px;
        }
        
        .cat-btn {
            width: 100%; padding: 14px;
            text-align: left; background: none; border: none;
            border-bottom: 1px solid var(--input-bg);
            font-size: 16px; color: var(--text-color);
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- === TAB 1: GIFTS === -->
        <div id="tab-gifts" class="tab-content active">
            <header class="page-header">
                <h1>Цветы</h1>
            </header>

            <div class="search-row">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Поиск..." id="searchInput">
                </div>
                <button class="cart-btn" onclick="openCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartBadge">0</span>
                </button>
            </div>

            <div class="filters-row">
                <button class="filter-pill" onclick="openCategoryModal()">
                    Категория <i class="fas fa-chevron-down" style="font-size:10px;"></i>
                </button>
                <button class="filter-pill" onclick="openPriceModal()">
                    Цена <i class="fas fa-chevron-down" style="font-size:10px;"></i>
                </button>
            </div>

            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- === TAB 2: PROFILE === -->
        <div id="tab-profile" class="tab-content">
            <div class="profile-top">
                <div class="user-block">
                    <img src="https://via.placeholder.com/60" alt="" class="avatar" id="userAvatar">
                    <div>
                        <div class="u-name" id="userName">Name</div>
                        <div class="u-tag" id="userUsername">@username</div>
                    </div>
                </div>
                <button class="icon-btn" onclick="toggleTheme()">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>

            <div class="info-card">
                <div class="card-head"><i class="far fa-flag"></i> Важные даты</div>
                <div class="cal-nav">
                    <i class="fas fa-chevron-left" style="color:var(--secondary-text)"></i>
                    <span>Март 2026</span>
                    <i class="fas fa-chevron-right" style="color:var(--secondary-text)"></i>
                </div>
                <div class="cal-grid" id="calendarGrid"></div>
            </div>

            <div class="info-card">
                <div class="card-head"><i class="fas fa-map-marker-alt"></i> Адрес доставки</div>
                <div class="list-row">
                    <span class="row-label">Енисейская 33, кв 16</span>
                </div>
                <div class="list-row">
                    <span class="row-action">+ Добавить адрес</span>
                </div>
            </div>

            <div class="info-card">
                <div class="card-head"><i class="far fa-credit-card"></i> Оплата</div>
                <div class="list-row">
                    <span class="row-label">•••• 4242</span>
                    <span class="row-val">Visa</span>
                </div>
            </div>

            <div class="info-card">
                <div class="card-head"><i class="far fa-clock"></i> История заказов</div>
                <div class="list-row">
                    <span class="row-label">Нет активных заказов</span>
                    <span class="row-val" id="orderCountBadge">0</span>
                </div>
            </div>
        </div>

        <!-- === TAB 3: COURIER === -->
        <div id="tab-courier" class="tab-content">
            <header class="page-header">
                <h1>Заказы</h1>
            </header>
            <div id="courierOrdersList"></div>
        </div>

    </div>

    <!-- === NAVIGATION === -->
    <nav class="bottom-bar">
        <div class="nav-item active" onclick="switchTab('gifts', this)">
            <i class="fas fa-gift"></i>
            <span>Подарки</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="switchTab('courier', this)">
            <i class="fas fa-truck"></i>
            <span>Курьер</span>
        </div>
        <div class="nav-item" onclick="alert('Admin')">
            <i class="fas fa-crown" style="color: gold;"></i>
            <span>Админ</span>
        </div>
    </nav>

    <!-- === MODALS === -->
    <div class="modal-bg" id="modalOverlay" onclick="closeAllModals()"></div>
    
    <!-- Category Sheet -->
    <div class="sheet" id="catSheet">
        <div class="handle"></div>
        <button class="cat-btn" onclick="setCat('all')">Все</button>
        <button class="cat-btn" onclick="setCat('flowers')">Цветы</button>
        <button class="cat-btn" onclick="setCat('sweets')">Сладкое</button>
        <button class="cat-btn" onclick="setCat('toys')">Игрушки</button>
    </div>

    <!-- Price Sheet -->
    <div class="sheet" id="priceSheet">
        <div class="handle"></div>
        <h3 style="margin-bottom:15px;">Цена</h3>
        <input type="range" style="width:100%" oninput="document.getElementById('pVal').innerText=this.value+' ₽'">
        <div style="text-align:center; margin:10px 0;" id="pVal">5000 ₽</div>
        <div style="display:flex; gap:10px;">
            <input type="number" placeholder="От" style="width:50%; padding:10px; border-radius:8px; border:1px solid var(--input-bg); background:var(--bg-color); color:var(--text-color);">
            <input type="number" placeholder="До" style="width:50%; padding:10px; border-radius:8px; border:1px solid var(--input-bg); background:var(--bg-color); color:var(--text-color);">
        </div>
        <button class="btn-full" onclick="closeAllModals()">Готово</button>
    </div>

    <!-- Cart Sheet -->
    <div class="sheet" id="cartSheet">
        <div class="handle"></div>
        <h3 style="margin-bottom:15px;">Корзина</h3>
        <div id="cartItems"></div>
        <div style="text-align:right; font-size:18px; font-weight:bold; margin-top:15px;" id="cartTotal">0 ₽</div>
        <button class="btn-full" onclick="checkout()">Оформить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Theme Init
        if (tg.colorScheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
        }

        // User Data
        const user = tg.initDataUnsafe.user || { first_name: "Name", username: "username" };
        document.getElementById('userName').innerText = user.first_name;
        document.getElementById('userUsername').innerText = user.username ? '@'+user.username : '';

        // Mock Data
        const products = [
            { id: 1, title: "Букет роз", price: 3500, cat: "flowers", img: null },
            { id: 2, title: "Мишка", price: 1200, cat: "toys", img: null },
            { id: 3, title: "Шоколад", price: 800, cat: "sweets", img: null },
            { id: 4, title: "Тюльпаны", price: 2500, cat: "flowers", img: null },
            { id: 5, title: "Рафаэлло", price: 600, cat: "sweets", img: null },
            { id: 6, title: "Зайка", price: 1500, cat: "toys", img: null },
        ];

        let cart = [];
        let currentCat = 'all';

        // Render Products
        function renderProducts(q = '') {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            products.filter(p => {
                return (currentCat === 'all' || p.cat === currentCat) && 
                       p.title.toLowerCase().includes(q.toLowerCase());
            }).forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-card';
                const imgHtml = p.img 
                    ? `<div class="tile-image has-img"><img src="${p.img}"></div>` 
                    : `<div class="tile-image"><i class="fas fa-image" style="opacity:0.3"></i></div>`;
                
                div.innerHTML = `
                    ${imgHtml}
                    <div class="p-info">
                        <div class="p-title">${p.title}</div>
                        <div class="p-price">${p.price} ₽</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">В корзину</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        // Render Calendar
        function renderCal() {
            const g = document.getElementById('calendarGrid');
            ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => {
                g.innerHTML += `<div class="d-name">${d}</div>`;
            });
            // Empty slots for March 2026 start (Sun)
            for(let i=0; i<6; i++) g.innerHTML += `<div></div>`;
            
            for(let i=1; i<=31; i++) {
                let cls = 'd-cell';
                if(i===16) cls += ' today';
                if(i===25) cls += ' event';
                g.innerHTML += `<div class="${cls}">${i}</div>`;
            }
        }

        // Render Courier Orders
        function renderOrders() {
            const c = document.getElementById('courierOrdersList');
            const orders = [
                { date: "25 марта 15:00", addr: "Ленина 1", phone: "+7900...", items: [1,2] },
                { date: "25 марта 18:30", addr: "Мира 10", phone: "+7999...", items: [3], expired: true }
            ];

            orders.forEach(o => {
                let thumbs = o.items.map(id => {
                    const p = products.find(x=>x.id===id);
                    return p.img 
                        ? `<div class="o-thumb"><img src="${p.img}"></div>` 
                        : `<div class="o-thumb"></div>`;
                }).join('');

                c.innerHTML += `
                    <div class="order-card" style="${o.expired?'opacity:0.5':''}">
                        <div class="o-head">Содержимое</div>
                        <div class="o-scroll">${thumbs}</div>
                        <div class="o-detail"><b>Адрес:</b> <span>${o.addr}</span></div>
                        <div class="o-detail"><b>Дата:</b> <span>${o.date}</span></div>
                        <div class="o-detail"><b>Телефон:</b> <span class="o-phone">${o.phone}</span></div>
                    </div>
                `;
            });
        }

        // Logic
        function switchTab(name, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+name).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            if(document.body.classList.contains('dark-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        document.getElementById('searchInput').addEventListener('input', e => renderProducts(e.target.value));

        // Modals
        function openModal(id) {
            document.getElementById('modalOverlay').classList.add('open');
            document.getElementById(id).classList.add('open');
        }
        function closeAllModals() {
            document.getElementById('modalOverlay').classList.remove('open');
            document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
        }
        function openCategoryModal() { openModal('catSheet'); }
        function openPriceModal() { openModal('priceSheet'); }
        function setCat(c) { currentCat = c; renderProducts(); closeAllModals(); }

        // Cart
        function addToCart(id) {
            cart.push(products.find(p=>p.id===id));
            updateCart();
            tg.HapticFeedback.selectionChanged();
        }
        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            document.getElementById('cartBadge').style.display = cart.length ? 'block' : 'none';
            
            const list = document.getElementById('cartItems');
            list.innerHTML = '';
            let sum = 0;
            cart.forEach((item, idx) => {
                sum += item.price;
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--input-bg);">
                        <span>${item.title}</span>
                        <span>${item.price} ₽ <i class="fas fa-times" style="color:red; margin-left:10px;" onclick="rmFromCart(${idx})"></i></span>
                    </div>
                `;
            });
            document.getElementById('cartTotal').innerText = sum + ' ₽';
            document.getElementById('orderCountBadge').innerText = cart.length;
        }
        function rmFromCart(idx) { cart.splice(idx,1); updateCart(); }
        function openCart() { openModal('cartSheet'); }
        function checkout() { alert('Заказ оформлен'); cart=[]; updateCart(); closeAllModals(); }

        // Init
        renderProducts();
        renderCal();
        renderOrders();

    </script>
</body>
</html>
