<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Swapka</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f2f2f7;
      --text-primary: #000000;
      --text-secondary: #8e8e93;
      --border-color: #e5e5ea;
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --card-bg: #ffffff;
      --search-bg: #ffffff;
      --chat-pill-bg: #f9f9f9;
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      --indicator-bg: #d0d0d0;
      --indicator-glow: rgba(208, 208, 208, 0.5);
      --icon-inactive: #8e8e93;
      --icon-active: #007AFF;
      --chat-header-bg: rgba(249, 249, 249, 0.85);
      --star-empty: #c7c7cc;
      --star-filled: #FFD60A;
      --header-height: 122px;
      --danger-color: #FF3B30;
    }

    .dark-theme {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2c2c2e;
      --text-primary: #ffffff;
      --text-secondary: #8e8e93;
      --border-color: #3a3a3c;
      --shadow: 0 4px 16px rgba(0,0,0,0.4);
      --card-bg: #2c2c2e;
      --search-bg: #2c2c2e;
      --chat-pill-bg: #3a3a3c;
      --glass-bg: rgba(30, 30, 30, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      --indicator-bg: #4a4a4a;
      --indicator-glow: rgba(74, 74, 74, 0.5);
      --icon-inactive: #8e8e93;
      --icon-active: #0A84FF;
      --chat-header-bg: rgba(44, 44, 46, 0.85);
      --star-empty: #48484a;
      --star-filled: #FFD60A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      transition: background 0.3s, color 0.3s;
      user-select: none;
      -webkit-user-select: none;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 0 50px rgba(0,0,0,0.1);
    }

    @media (min-width: 431px) {
      body {
        border-left: 1px solid var(--border-color);
        border-right: 1px solid var(--border-color);
        background: var(--bg-primary);
      }
      html {
        background: #e5e5ea;
      }
      .dark-theme html {
        background: #1a0b2e; 
      }
    }

    /* --- HEADER --- */
    .app-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--header-height);
      background: linear-gradient(90deg, 
        #8A2BE2 0%, 
        #FFD60A 25%, 
        #007AFF 50%, 
        #FFFFFF 75%, 
        #FF00FF 100%,
        #8A2BE2 100% 
      );
      background-size: 400% 100%;
      animation: gradientFlow 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center; 
      pointer-events: none;
      overflow: hidden;
      max-width: 430px;
      margin: 0 auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding-top: env(safe-area-inset-top); 
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .header-logo {
      width: 160px;
      height: auto;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
      z-index: 2;
      pointer-events: auto;
      margin-top: 20px;
    }

    .main-content {
      position: fixed;
      top: var(--header-height);
      left: 0;
      right: 0;
      bottom: 90px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      will-change: scroll-position;
      max-width: 430px;
      margin: 0 auto;
      background: var(--bg-primary);
    }

    .page {
      display: none;
      min-height: 100%;
      padding-bottom: 20px;
      opacity: 0;
      transform: translateY(10px);
      position: relative;
    }

    .page.active {
      display: block;
      animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- SEARCH & ADS --- */
    .search-container {
      padding: 12px 16px;
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.3s;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--search-bg);
      border-radius: 100px;
      padding: 10px 14px;
      box-shadow: 0 3px 18px rgba(0,0,0,0.12);
      transition: box-shadow 0.2s, background 0.3s;
    }

    .search-bar:focus-within {
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }

    .search-icon {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .search-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--icon-inactive);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .search-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
      color: var(--text-primary);
      width: 100%;
      font-family: inherit;
    }

    .search-input::placeholder { color: #C8C8C8; }
    .dark-theme .search-input::placeholder { color: #6b6b6b; }

    .ads-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px 16px;
    }

    .ad-card {
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, background 0.3s;
      cursor: pointer;
      will-change: transform;
      position: relative;
    }

    .ad-card:active { transform: scale(0.97); }

    .ad-delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(255, 59, 48, 0.9);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .ad-delete-btn:active {
      transform: scale(0.9);
      background: rgba(255, 59, 48, 1);
    }

    .ad-delete-btn svg {
      width: 16px;
      height: 16px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ad-image-container {
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      position: relative;
    }

    .ad-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--text-secondary);
    }

    .ad-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ad-info { padding: 10px; }

    .ad-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ad-price {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
      transform: translateY(-2px);
    }

    .ad-city {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* --- MESSAGES --- */
    .messages-list { padding: 16px; }
    
    .message-item-wrapper {
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
      border-radius: 100px;
    }
    
    .message-delete-bg {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 120px;
      background: rgba(255, 59, 48, 0.65);
      border-radius: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.3s;
      gap: 4px;
    }
    
    .message-delete-bg.visible {
      opacity: 1;
    }
    
    .message-delete-bg svg {
      width: 28px;
      height: 28px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    .message-delete-bg span {
      font-size: 12px;
      color: white;
      font-weight: 600;
    }
    
    .message-delete-btn {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 120px;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 3;
      display: none;
    }
    
    .message-delete-btn.visible {
      display: block;
    }

    .message-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-right: 20px;
      background: var(--chat-pill-bg);
      border-radius: 100px;
      cursor: pointer;
      transition: transform 0.2s ease-out, background 0.2s;
      position: relative;
      z-index: 2;
      touch-action: pan-y;
      box-shadow: none;
    }
    
    .message-item.swiping {
      transition: none;
    }
    
    .message-item:hover { background: var(--bg-secondary); }
    
    .message-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      margin-right: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    
    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .message-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .message-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .message-preview {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    
    .unread-badge {
      width: 24px;
      height: 24px;
      background: #FF3B30;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-left: 12px;
      line-height: 1;
    }

    /* --- CHAT SCREEN --- */
    .chat-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary);
      z-index: 150;
      display: none;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
    }
    .chat-screen.active { display: flex; }

    .chat-screen.active ~ .bottom-nav {
      display: none !important;
    }
    
    .chat-header-pill-container {
      position: absolute;
      top: 90px;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      pointer-events: none;
    }

    .chat-profile-pill {
      pointer-events: auto;
      display: flex;
      align-items: center;
      background: var(--chat-header-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 100px;
      padding: 10px 24px 10px 10px; 
      box-shadow: 0 6px 20px rgba(0,0,0,0.15), 0 2px 5px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
      margin: 0 auto; 
      max-width: 90%; 
    }
    
    .chat-profile-pill:active {
      transform: scale(0.98);
      background: var(--bg-secondary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .chat-pill-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-secondary);
      margin-right: 14px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-pill-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-pill-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .chat-pill-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-pill-status {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .chat-pill-status.online {
      color: #34C759;
      font-weight: 500;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 180px 16px calc(20px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      background: var(--bg-primary);
      scroll-behavior: smooth;
    }

    .chat-message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
      position: relative;
      animation: messagePopIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes messagePopIn {
      from { opacity: 0; transform: scale(0.9) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .chat-message img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 4px;
      display: block;
    }

    .chat-message.received {
      background: var(--bg-secondary);
      color: var(--text-primary);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .chat-message.sent {
      background: #007AFF;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .chat-message-time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    
    .chat-input-area {
      padding: 10px 16px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: transparent; 
      border-top: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-add-photo-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--icon-active);
      transition: transform 0.1s;
    }
    .chat-add-photo-btn:active { transform: scale(0.9); }
    .chat-add-photo-btn svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .chat-input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .chat-input {
      width: 100%;
      padding: 10px 45px 10px 16px;
      border: 1px solid var(--border-color);
      border-radius: 24px;
      background: var(--bg-secondary);
      font-size: 16px;
      outline: none;
      color: var(--text-primary);
      transition: border-color 0.2s;
    }
    .chat-input:focus {
      border-color: var(--icon-active);
    }

    .chat-send-btn {
      position: absolute;
      right: 4px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .chat-send-btn:active { transform: scale(0.9); }
    .chat-send-btn svg {
      width: 16px;
      height: 16px;
      fill: white;
      margin-left: 2px;
    }
    
    .attached-photo-preview {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: var(--bg-primary);
      display: none;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
    }
    .attached-photo-preview.active { display: flex; }
    .attached-photo-thumb {
      height: 60px;
      border-radius: 8px;
      overflow: hidden;
    }
    .attached-photo-thumb img {
      height: 100%;
      width: auto;
    }
    .remove-attachment-btn {
      background: rgba(120, 120, 128, 0.12);
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .remove-attachment-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.5;
    }


    .empty-state {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      pointer-events: none;
    }
    
    #myAdsEmpty {
      transform: translateY(calc(-50% + 80px));
    }
    
    .empty-state-text {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* --- PROFILE --- */
    .profile-moon-wrapper {
      position: relative; height: 50px; display: flex;
      justify-content: flex-end; align-items: center; padding: 0 16px; z-index: 10;
    }
    
    .moon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      transition: transform 0.3s;
      pointer-events: auto;
      z-index: 1001;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
    }
    
    .moon-btn svg {
      width: 24px;
      height: 24px;
      transition: transform 0.3s ease;
    }
    
    .moon-btn svg path,
    .moon-btn svg circle {
      fill: var(--text-primary);
    }
    
    .moon-btn svg line {
      stroke: var(--text-primary);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .moon-btn:active { transform: scale(0.85); }
    .moon-btn:active svg { transform: rotate(15deg); }

    .profile-shifted-content { transform: translateY(-120px); }
    .profile-user-info { padding: 20px 16px; text-align: center; transform: translateY(60px); }
    
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 12px;
      display: block; background: var(--bg-secondary);
    }
    .profile-avatar-placeholder {
      width: 80px; height: 80px; border-radius: 50%; background: var(--bg-secondary);
      margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 36px;
    }
    .profile-name { font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .profile-username { font-size: 15px; color: var(--text-secondary); margin-top: 4px; transform: translateY(-5px); }
    
    .profile-rating { 
      display: flex; justify-content: center; gap: 4px; 
      margin-top: 8px; 
      font-size: 20px; 
      transform: translateY(-10px); 
    }
    
    .profile-rating svg {
      width: 24px;
      height: 24px;
      fill: var(--star-empty);
    }
    .profile-rating svg.filled {
      fill: var(--star-filled);
    }

    .create-ad-btn {
      display: block; margin: 0 auto 20px; padding: 14px 15px; width: fit-content; min-width: 200px;
      background: #007AFF;
      color: #ffffff;
      border: none; border-radius: 100px; font-size: 17px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.2s, opacity 0.2s;
      transform: translateY(38px); box-shadow: 0 4px 20px rgba(0, 122, 255, 0.3);
    }
    .create-ad-btn:active { transform: translateY(38px) scale(0.97); opacity: 0.9; }

    .dark-theme .create-ad-btn {
      background: #0A84FF;
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(10, 132, 255, 0.4);
    }

    .my-ads-title { font-size: 18px; font-weight: 700; padding: 0 16px 12px; color: var(--text-primary); transform: translateY(30px); }
    .my-ads-grid-wrapper { transform: translateY(30px); }

    /* --- BOTTOM NAV --- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: auto;
      z-index: 1000;
      display: flex;
      justify-content: center;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-top: 8px;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform;
      max-width: 430px;
      margin: 0 auto;
    }

    .bottom-nav.hidden { transform: translateY(150%); }

    .nav-pill {

      align-items: center;
      width: 90%;
      max-width: 380px;
      height: 64px;

      cursor: pointer;
      z-index: 2;
      position: relative;
      border: none;
      background: transparent;
      gap: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;

    .nav-item.active { background: transparent; box-shadow: none; }

    .nav-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    
    .nav-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--icon-inactive);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);

    .nav-item.active .nav-icon svg {
      stroke: var(--icon-active);
      transform: scale(1.1);
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;

    .nav-item.active .nav-label {
      color: var(--icon-active);
      font-weight: 700;
      opacity: 1;

    .nav-indicator {
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 8px;
      width: calc(33.33% - 8px);
      
      background: var(--indicator-bg);
      border-radius: 24px;
      z-index: 1;
      
      will-change: transform, width, border-radius, scale;
      transform: translateZ(0) scale(1);
      transform-origin: center center;
      
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.3s ease;
      
      box-shadow: 0 4px 20px var(--indicator-glow);
      pointer-events: none;
      overflow: visible;
    }

    .nav-indicator::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 60%);

  <script>
    // === ВЕСЬ JS-КОД ИЗ ИСХОДНИКА, НО С ИСПРАВЛЕННОЙ openOtherProfile ===
    // (функции loadAds, saveAds, renderAds, createAdCard, openChat, contactSeller и т.д. - без изменений)

    // ...

    // === ИСПРАВЛЕННАЯ ФУНКЦИЯ openOtherProfile ===
    function openOtherProfile() {
      const chatScreen = document.getElementById('chatScreen');
      const chatId = chatScreen.dataset.chatId;
      const chats = loadChats();
      const chat = chats.find(c => c.id === chatId);
      
      if (!chat) {
        console.error("Chat not found for ID:", chatId);
        return;
      }

      // Ищем все объявления продавца
      const ads = loadAds();
      const sellerAds = ads.filter(ad => ad.userId === chat.sellerId);
      
      // Пытаемся взять свежие имя и фото из его объявлений
      let sellerName = chat.sellerName;
      let sellerPhoto = chat.sellerPhoto;
      
      if (sellerAds.length > 0) {
        // Берём самое новое объявление
        const latestAd = sellerAds.reduce((a, b) => (a.createdAt > b.createdAt) ? a : b);
        sellerName = latestAd.userName || sellerName;
        sellerPhoto = latestAd.userPhoto || sellerPhoto;
      }
      
      if (!sellerName || sellerName.trim() === '') {
        sellerName = 'Пользователь';
      }

      // Аватар
      const avatarImg = document.getElementById('otherProfileAvatar');
      const placeholder = document.getElementById('otherProfileAvatarPlaceholder');
      const hasValidPhoto = sellerPhoto && sellerPhoto.trim() !== '';
      
      if (hasValidPhoto) {
        avatarImg.src = sellerPhoto;
        avatarImg.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        avatarImg.style.display = 'none';
        placeholder.style.display = 'flex';
      }

      document.getElementById('otherProfileName').textContent = sellerName;
      
      renderStars('otherProfileRating', 0);

      const count = sellerAds.length;
      const displayCount = count > 99 ? '99+' : count;
      document.getElementById('otherAdsTitle').textContent = `Активные объявления (${displayCount})`;
      
      const otherGrid = document.getElementById('otherAdsGrid');
      const otherEmpty = document.getElementById('otherAdsEmpty');
      otherGrid.innerHTML = '';
      
      if (count === 0) {
        otherEmpty.style.display = 'flex';
        otherGrid.style.display = 'none';
      } else {
        otherEmpty.style.display = 'none';
        otherGrid.style.display = 'grid';
        sellerAds.forEach(ad => {
          otherGrid.appendChild(createAdCard(ad, false));
        });
      }

      navigateTo('otherProfile');
    }

    // ... (весь остальной JS без изменений) ...
  </script>
</body>
</html>
