<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Swapka</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f2f2f7;
      --text-primary: #000000;
      --text-secondary: #8e8e93;
      --border-color: #e5e5ea;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --card-bg: #ffffff;
      --search-bg: #ffffff;
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
    }

    .dark-theme {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2c2c2e;
      --text-primary: #ffffff;
      --text-secondary: #8e8e93;
      --border-color: #3a3a3c;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --card-bg: #2c2c2e;
      --search-bg: #2c2c2e;
      --glass-bg: rgba(30, 30, 30, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      transition: background 0.3s, color 0.3s;
      user-select: none;
      -webkit-user-select: none;
    }

    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 100px;
      background: var(--bg-primary); transition: background 0.3s;
      display: flex; justify-content: center; align-items: center; pointer-events: none;
    }

    .app-logo {
      font-family: 'Pacifico', cursive; font-size: 42px;
      background: linear-gradient(270deg, #FF416C, #FF4B2B, #ff80b5, #FF416C);
      background-size: 400% 400%; -webkit-background-clip: text; background-clip: text;
      color: transparent; animation: gradientShift 6s ease infinite; transform: translate(5px, 19px);
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
    }

    .main-content {
      position: fixed; top: 100px; left: 0; right: 0; bottom: 90px;
      overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth; will-change: scroll-position;
    }

    .page {
      display: none; min-height: 100%; padding-bottom: 20px; opacity: 0; transform: translateY(10px);
    }

    .page.active {
      display: block; animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); }
    }

    .search-container { padding: 12px 16px; background: var(--bg-primary); position: sticky; top: 0; z-index: 10; transition: background 0.3s; }

    .search-bar {
      display: flex; align-items: center; background: var(--search-bg); border-radius: 100px;
      padding: 10px 14px; box-shadow: 0 3px 18px rgba(0,0,0,0.12); transition: box-shadow 0.2s, background 0.3s;
    }

    .search-bar:focus-within { box-shadow: 0 4px 24px rgba(0,0,0,0.18); }

    .search-icon { color: var(--text-secondary); font-size: 18px; margin-right: 10px; flex-shrink: 0; }

    .search-input {
      border: none; outline: none; background: transparent; font-size: 16px;
      color: var(--text-primary); width: 100%; font-family: inherit;
    }

    .ads-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 16px; }

    .ad-card {
      background: var(--card-bg); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow);
      transition: transform 0.2s, background 0.3s; cursor: pointer; will-change: transform;
    }

    .ad-card:active { transform: scale(0.97); }

    .ad-image-container { width: 100%; aspect-ratio: 1; overflow: hidden; position: relative; }

    .ad-image-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 40px; color: var(--text-secondary);
    }

    .ad-image { width: 100%; height: 100%; object-fit: cover; }

    .ad-info { padding: 10px; }

    .ad-title {
      font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;
      line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .ad-price { font-size: 15px; font-weight: 800; color: var(--text-primary); margin-bottom: 2px; transform: translateY(-2px); }

    .ad-city { font-size: 12px; color: var(--text-secondary); }

    .messages-list { padding: 8px 16px; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 20px; text-align: center;
    }

    .empty-state-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state-text { font-size: 16px; color: var(--text-secondary); }

    .profile-moon-wrapper {
      position: relative; height: 50px; display: flex; justify-content: flex-end;
      align-items: center; padding: 0 16px; z-index: 10;
    }

    .moon-btn {
      background: none; border: none; font-size: 28px; cursor: pointer; padding: 8px;
      transition: transform 0.3s; pointer-events: auto; z-index: 1001; position: relative;
    }

    .moon-btn:active { transform: scale(0.85); }

    .profile-shifted-content { transform: translateY(-120px); }
    .profile-user-info { padding: 20px 16px; text-align: center; transform: translateY(60px); }

    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 12px;
      display: block; background: var(--bg-secondary);
    }

    .profile-avatar-placeholder {
      width: 80px; height: 80px; border-radius: 50%; background: var(--bg-secondary);
      margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 36px;
    }

    .profile-name { font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .profile-username { font-size: 15px; color: var(--text-secondary); margin-top: 4px; transform: translateY(-5px); }
    .profile-rating { display: flex; justify-content: center; gap: 4px; margin-top: 8px; font-size: 18px; transform: translateY(-10px); }

    .create-ad-btn {
      display: block; margin: 0 auto 20px; padding: 14px 15px; width: fit-content; min-width: 200px;
      background: linear-gradient(270deg, #87CEEB, #B0E0E6, #9370DB, #BA55D3, #87CEEB);
      background-size: 400% 400%; animation: gradientShift 6s ease infinite;
      color: white; border: none; border-radius: 100px; font-size: 17px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.2s, opacity 0.2s;
      transform: translateY(38px); box-shadow: 0 4px 20px rgba(135, 206, 235, 0.4);
    }

    .create-ad-btn:active { transform: translateY(38px) scale(0.97); opacity: 0.9; }

    .my-ads-title { font-size: 18px; font-weight: 700; padding: 0 16px 12px; color: var(--text-primary); transform: translateY(30px); }
    .my-ads-grid-wrapper { transform: translateY(30px); }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: auto; z-index: 1000;
      display: flex; justify-content: center; padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-top: 8px; pointer-events: none; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform;
    }

    .bottom-nav.hidden { transform: translateY(150%); }

    .nav-pill {
      pointer-events: auto; display: flex; justify-content: space-between; align-items: center;
      width: 90%; max-width: 380px; height: 72px;
      background: var(--glass-bg); backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border-radius: 36px; padding: 0 10px; border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      position: relative; overflow: visible; transition: all 0.3s ease;
    }

    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; border-radius: 28px; cursor: pointer; z-index: 2; position: relative;
      border: none; background: transparent; gap: 4px; -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }

    .nav-icon {
      font-size: 28px; color: var(--text-secondary);
      transition: color 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 2;
    }

    .nav-label {
      font-size: 12px; font-weight: 500; color: var(--text-secondary);
      transition: color 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 2; opacity: 0.8;
    }

    /* ===== FLOATING INDICATOR — INACTIVE (GREY) ===== */
    .nav-indicator {
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 10px;
      width: calc(33.33% - 20px);
      background: rgba(140, 145, 160, 0.32);
      border-radius: 28px;
      z-index: 1;
      border: 1px solid rgba(150, 155, 170, 0.25);
      box-shadow: none;
      transform: translateZ(0);
      will-change: transform;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                  top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.4s ease,
                  box-shadow 0.4s ease,
                  border-color 0.4s ease;
      pointer-events: none;
      overflow: visible;
    }

    .nav-indicator .bubble-highlight-top,
    .nav-indicator .bubble-highlight-bottom,
    .nav-indicator .rainbow-edge,
    .nav-indicator .bubble-shimmer-overlay {
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    /* ===== SOAP BUBBLE STATE (DRAGGING) ===== */
    .nav-indicator.dragging {
      transition: none !important;
      top: 1px !important;
      bottom: 1px !important;
      left: 2px !important;
      width: calc(33.33% - 4px) !important;
      border-radius: 32px !important;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.4) 0%,
        rgba(255, 200, 220, 0.35) 20%,
        rgba(200, 220, 255, 0.35) 40%,
        rgba(220, 255, 230, 0.35) 60%,
        rgba(255, 220, 200, 0.35) 80%,
        rgba(255, 255, 255, 0.4) 100%
      );
      background-size: 400% 400%;
      animation: bubbleShimmer 3s ease infinite;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1.5px solid rgba(255, 255, 255, 0.7);
      box-shadow:
        0 6px 25px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        inset 0 -1px 0 rgba(255, 255, 255, 0.3),
        inset 3px 0 15px rgba(255, 255, 255, 0.5),
        inset -3px 0 15px rgba(255, 255, 255, 0.3),
        0 0 40px rgba(255, 200, 220, 0.4),
        0 0 20px rgba(200, 220, 255, 0.25),
        0 0 60px rgba(220, 255, 230, 0.15);
    }

    .nav-indicator.dragging .bubble-highlight-top,
    .nav-indicator.dragging .bubble-highlight-bottom,
    .nav-indicator.dragging .rainbow-edge,
    .nav-indicator.dragging .bubble-shimmer-overlay {
      opacity: 1;
    }

    .nav-indicator .bubble-highlight-top {
      position: absolute; top: 8px; left: 14px; width: 38%; height: 32%; border-radius: 50%;
      background: linear-gradient(160deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.5) 45%, rgba(255,255,255,0) 100%);
      filter: blur(2px); pointer-events: none; z-index: 3;
    }

    .nav-indicator .bubble-highlight-bottom {
      position: absolute; bottom: 10px; right: 16px; width: 30%; height: 24%; border-radius: 50%;
      background: linear-gradient(315deg, rgba(255,255,255,0.75) 0%, rgba(255,200,220,0.35) 50%, rgba(255,255,255,0) 100%);
      filter: blur(2px); pointer-events: none; z-index: 3;
    }

    .nav-indicator .rainbow-edge {
      position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 32px; padding: 1.5px;
      background: linear-gradient(135deg, rgba(255,0,100,0.55), rgba(100,150,255,0.55), rgba(150,255,200,0.55), rgba(255,200,150,0.55), rgba(255,0,100,0.55));
      background-size: 300% 300%; animation: rainbowEdge 4s ease infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; z-index: 4;
    }

    @keyframes rainbowEdge {
      0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
    }

    .nav-indicator .bubble-shimmer-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 32px;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 30%, rgba(255,200,220,0.1) 50%, rgba(200,220,255,0.1) 70%, transparent 100%);
      background-size: 200% 200%; animation: shimmerOverlay 2.5s ease infinite;
      pointer-events: none; z-index: 2;
    }

    @keyframes shimmerOverlay {
      0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; }
    }

    @keyframes bubbleShimmer {
      0% {
        background-position: 0% 50%;
        box-shadow: 0 6px 25px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -1px 0 rgba(255,255,255,0.3), inset 3px 0 15px rgba(255,255,255,0.5), inset -3px 0 15px rgba(255,255,255,0.3), 0 0 40px rgba(255,200,220,0.4), 0 0 20px rgba(200,220,255,0.25), 0 0 60px rgba(220,255,230,0.15);
      }
      25% {
        box-shadow: 0 6px 25px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.95), inset 0 -1px 0 rgba(255,255,255,0.3), inset 3px 0 15px rgba(200,220,255,0.6), inset -3px 0 15px rgba(255,200,220,0.4), 0 0 45px rgba(200,220,255,0.5), 0 0 20px rgba(220,255,230,0.3), 0 0 60px rgba(255,200,220,0.2);
      }
      50% {
        background-position: 100% 50%;
        box-shadow: 0 6px 25px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -1px 0 rgba(255,255,255,0.3), inset 3px 0 15px rgba(220,255,230,0.55), inset -3px 0 15px rgba(255,255,255,0.3), 0 0 40px rgba(220,255,230,0.4), 0 0 20px rgba(255,200,220,0.25), 0 0 60px rgba(200,220,255,0.15);
      }
      75% {
        box-shadow: 0 6px 25px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.95), inset 0 -1px 0 rgba(255,255,255,0.3), inset 3px 0 15px rgba(255,200,220,0.6), inset -3px 0 15px rgba(200,220,255,0.4), 0 0 45px rgba(255,200,220,0.5), 0 0 20px rgba(200,220,255,0.3), 0 0 60px rgba(220,255,230,0.2);
      }
      100% {
        background-position: 0% 50%;
        box-shadow: 0 6px 25px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -1px 0 rgba(255,255,255,0.3), inset 3px 0 15px rgba(255,255,255,0.5), inset -3px 0 15px rgba(255,255,255,0.3), 0 0 40px rgba(255,200,220,0.4), 0 0 20px rgba(200,220,255,0.25), 0 0 60px rgba(220,255,230,0.15);
      }
    }

    /* ===== BUBBLE JIGGLE ANIMATION ===== */
    @keyframes bubbleJiggle {
      0% { transform: translate3d(0,0,0) scaleX(1) scaleY(1) rotate(0deg); }
      15% { transform: translate3d(0,0,0) scaleX(1.08) scaleY(0.92) rotate(-2deg); }
      30% { transform: translate3d(0,0,0) scaleX(0.93) scaleY(1.07) rotate(1.5deg); }
      45% { transform: translate3d(0,0,0) scaleX(1.04) scaleY(0.96) rotate(-1deg); }
      60% { transform: translate3d(0,0,0) scaleX(0.97) scaleY(1.03) rotate(0.5deg); }
      80% { transform: translate3d(0,0,0) scaleX(1.01) scaleY(0.99) rotate(-0.2deg); }
      100% { transform: translate3d(0,0,0) scaleX(1) scaleY(1) rotate(0deg); }
    }

    .nav-indicator.jiggle {
      animation: bubbleJiggle 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Модальные окна */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
      z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(5px);
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg-primary); width: 100%; max-height: 92vh; border-radius: 20px 20px 0 0;
      padding: 20px; padding-bottom: max(20px, env(safe-area-inset-bottom));
      overflow-y: auto; animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      background: var(--bg-secondary); border: none; border-radius: 50%; width: 36px; height: 36px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
    }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: block; }
    .form-input {
      width: 100%; padding: 12px 16px; border: 2px solid var(--border-color); border-radius: 12px;
      font-size: 16px; color: var(--text-primary); background: var(--input-bg); font-family: inherit; outline: none;
    }
    .photos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .photo-slot {
      aspect-ratio: 1; border: 2px dashed var(--border-color); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      overflow: hidden; position: relative; background: var(--input-bg);
    }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    .photo-slot .add-icon { font-size: 28px; color: var(--text-secondary); }
    .photo-slot .remove-btn {
      position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white;
      border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .submit-btn {
      width: auto; margin: 10px auto 0; display: block; padding: 16px 15px; background: #000000;
      color: #ffffff; border: none; border-radius: 100px; font-size: 17px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .detail-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary);
      z-index: 200; display: none; overflow-y: auto;
    }
    .detail-modal.active { display: block; animation: fadeInDetail 0.3s ease; }
    @keyframes fadeInDetail { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .detail-header {
      position: sticky; top: 0; background: var(--bg-primary); padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top)); display: flex; justify-content: space-between;
      align-items: center; z-index: 10; border-bottom: 1px solid var(--border-color);
    }
    .detail-back {
      background: var(--bg-secondary); border: none; border-radius: 50%; width: 36px; height: 36px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
    }
    .image-carousel { width: 100%; aspect-ratio: 1; position: relative; overflow: hidden; background: var(--bg-secondary); }
    .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.3s ease; }
    .carousel-slide { min-width: 100%; height: 100%; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
    .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); border: none; cursor: pointer; padding: 0; }
    .carousel-dot.active { background: white; }
    .detail-info { padding: 20px 16px; }
    .detail-title { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .detail-price { font-size: 24px; font-weight: 800; color: #ff6b35; margin-bottom: 8px; }
    .detail-city { font-size: 15px; color: var(--text-secondary); margin-bottom: 20px; }
    .detail-seller { display: flex; align-items: center; padding: 14px; background: var(--bg-secondary); border-radius: 14px; }
    .detail-seller-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--border-color); margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .detail-seller-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .detail-contact-btn {
      width: 100%; padding: 16px; background: linear-gradient(270deg, #87CEEB, #B0E0E6, #9370DB, #BA55D3, #87CEEB);
      background-size: 400% 400%; animation: gradientShift 6s ease infinite; color: white; border: none;
      border-radius: 14px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 20px;
    }
    .main-content::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>

  <div class="header"><div class="app-logo">Swapka</div></div>

  <div class="main-content" id="mainContent">
    <div class="page active" id="pageHome">
      <div class="search-container">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
        </div>
      </div>
      <div class="ads-grid" id="adsGrid"></div>
      <div class="empty-state" id="homeEmpty" style="display:none;">
        <div class="empty-state-icon">🏷️</div>
        <div class="empty-state-text">Пока нет объявлений</div>
      </div>
    </div>
    <div class="page" id="pageMessages">
      <div class="messages-list" id="messagesList">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div class="empty-state-text">У вас пока нет чатов</div>
        </div>
      </div>
    </div>
    <div class="page" id="pageProfile">
      <div class="profile-moon-wrapper">
        <button class="moon-btn" id="themeToggle">🌙</button>
      </div>
      <div class="profile-shifted-content">
        <div class="profile-user-info">
          <div id="profileAvatarContainer"></div>
          <div class="profile-name" id="profileName">Загрузка...</div>
          <div class="profile-username" id="profileUsername">@loading</div>
          <div class="profile-rating"><span>☆</span><span>☆</span><span>☆</span></div>
        </div>
        <button class="create-ad-btn" id="openCreateBtn">Создать объявление</button>
        <div class="my-ads-title">Мои объявления</div>
        <div class="my-ads-grid-wrapper">
          <div class="ads-grid" id="myAdsGrid"></div>
          <div class="empty-state" id="myAdsEmpty">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">У вас пока нет объявлений</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FLOATING INDICATOR BOTTOM NAV -->
  <div class="bottom-nav" id="bottomNav">
    <div class="nav-pill" id="navPill">
      <div class="nav-indicator" id="navIndicator">
        <div class="bubble-highlight-top"></div>
        <div class="bubble-highlight-bottom"></div>
        <div class="rainbow-edge"></div>
        <div class="bubble-shimmer-overlay"></div>
      </div>
      <button class="nav-item active" data-tab="home" id="navHome">
        <span class="nav-icon">🏠</span><span class="nav-label">Главная</span>
      </button>
      <button class="nav-item" data-tab="messages" id="navMessages">
        <span class="nav-icon">💬</span><span class="nav-label">Сообщения</span>
      </button>
      <button class="nav-item" data-tab="profile" id="navProfile">
        <span class="nav-icon">👤</span><span class="nav-label">Профиль</span>
      </button>
    </div>
  </div>

  <div class="modal-overlay" id="createModal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Новое объявление</span>
        <button class="modal-close" onclick="closeCreateModal()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Фотографии (1–4)</label>
        <div class="photos-grid" id="photosGrid">
          <div class="photo-slot" onclick="addPhoto(0)" id="photoSlot0"><span class="add-icon">+</span></div>
          <div class="photo-slot" onclick="addPhoto(1)" id="photoSlot1"><span class="add-icon">+</span></div>
          <div class="photo-slot" onclick="addPhoto(2)" id="photoSlot2"><span class="add-icon">+</span></div>
          <div class="photo-slot" onclick="addPhoto(3)" id="photoSlot3"><span class="add-icon">+</span></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Название товара</label>
        <input type="text" class="form-input" id="adTitle" placeholder="Введите название">
      </div>
      <div class="form-group">
        <label class="form-label">Цена</label>
        <input type="text" class="form-input" id="adPrice" placeholder="Введите цену">
      </div>
      <div class="form-group">
        <label class="form-label">Город</label>
        <input type="text" class="form-input" id="adCity" placeholder="Введите город">
      </div>
      <button class="submit-btn" id="submitAdBtn" onclick="createAd()">Создать</button>
    </div>
  </div>

  <div class="detail-modal" id="detailModal">
    <div class="detail-header">
      <button class="detail-back" onclick="closeDetailModal()">←</button>
      <div style="width:30px;height:30px;"></div>
      <button class="detail-back" style="visibility:hidden">←</button>
    </div>
    <div class="image-carousel" id="detailCarousel">
      <div class="carousel-track" id="carouselTrack"></div>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>
    <div class="detail-info">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-price" id="detailPrice"></div>
      <div class="detail-city" id="detailCity"></div>
      <div class="detail-seller">
        <div class="detail-seller-avatar" id="detailSellerAvatar">👤</div>
        <div><div class="detail-seller-name" id="detailSellerName"></div></div>
      </div>
      <button class="detail-contact-btn" onclick="contactSeller()">Написать продавцу</button>
    </div>
  </div>

  <input type="file" id="photoInput" accept="image/*" multiple style="display:none;" onchange="handlePhotoSelect(event)">

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const currentUser = {
      id: user?.id || 'guest_' + Date.now(),
      firstName: user?.first_name || 'Гость',
      lastName: user?.last_name || '',
      username: user?.username || '',
      photoUrl: user?.photo_url || ''
    };

    const ADS_KEY = 'swapka_ads';
    const THEME_KEY = 'swapka_theme';

    function loadAds() { try { const d = localStorage.getItem(ADS_KEY); return d ? JSON.parse(d) : []; } catch (e) { return []; } }
    function saveAds(a) { try { localStorage.setItem(ADS_KEY, JSON.stringify(a)); } catch (e) {} }
    function loadTheme() { return localStorage.getItem(THEME_KEY); }
    function saveTheme(t) { localStorage.setItem(THEME_KEY, t); }

    function applyTheme(theme) {
      const body = document.body;
      const btn = document.getElementById('themeToggle');
      if (theme === 'dark') { body.classList.add('dark-theme'); if (btn) btn.textContent = '☀️'; }
      else { body.classList.remove('dark-theme'); if (btn) btn.textContent = '🌙'; }
    }

    const savedTheme = loadTheme();
    if (savedTheme === 'dark' || savedTheme === 'light') applyTheme(savedTheme);
    else applyTheme(tg.colorScheme === 'dark' ? 'dark' : 'light');

    document.getElementById('themeToggle').addEventListener('click', function() {
      const isDark = document.body.classList.contains('dark-theme');
      applyTheme(isDark ? 'light' : 'dark');
      saveTheme(isDark ? 'light' : 'dark');
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    });

    function setupProfile() {
      const ac = document.getElementById('profileAvatarContainer');
      if (currentUser.photoUrl) ac.innerHTML = `<img src="${currentUser.photoUrl}" class="profile-avatar" alt="Avatar">`;
      else ac.innerHTML = `<div class="profile-avatar-placeholder">👤</div>`;
      document.getElementById('profileName').textContent = currentUser.firstName + (currentUser.lastName ? ' ' + currentUser.lastName : '');
      document.getElementById('profileUsername').textContent = currentUser.username ? '@' + currentUser.username : '';
    }
    setupProfile();

    // ===== TAB NAVIGATION =====
    const navPill = document.getElementById('navPill');
    const navIndicator = document.getElementById('navIndicator');
    const navItems = document.querySelectorAll('.nav-item');

    let cachedItemWidth = navItems[0].offsetWidth;
    let isDragging = false;
    let startX = 0;
    let dragStartX = 0;
    let currentIndex = 0;
    let dragged = false;

    // ===== ФИЗИКА МЫЛЬНОГО ПУЗЫРЯ =====
    let lastX = 0;
    let lastTime = 0;
    let velocity = 0;
    let prevVelocity = 0;
    let accumulatedSquash = 0;
    let squashX = 1;
    let squashY = 1;
    let rotation = 0;
    let isReleasing = false;

    window.addEventListener('resize', () => {
      cachedItemWidth = navItems[0].offsetWidth;
      updateIndicatorPosition(currentIndex, false);
    });

    function getCenteredPosition(index) {
      const item = navItems[index];
      const itemRect = item.getBoundingClientRect();
      const pillRect = navPill.getBoundingClientRect();
      const itemCenter = itemRect.left - pillRect.left + itemRect.width / 2;
      const indicatorWidth = navIndicator.offsetWidth;
      return itemCenter - indicatorWidth / 2;
    }

    function setTransform(x, sx, sy, r) {
      navIndicator.style.transform = `translate3d(${x}px, 0, 0) scaleX(${sx}) scaleY(${sy}) rotate(${r}deg)`;
    }

    function updateIndicatorPosition(index, animate = true) {
      const xPos = getCenteredPosition(index);
      if (!animate) {
        navIndicator.style.transition = 'none';
        void navIndicator.offsetWidth;
      } else {
        navIndicator.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease';
      }
      squashX = 1; squashY = 1; rotation = 0;
      setTransform(xPos, 1, 1, 0);
    }

    function switchTab(tab) {
      navItems.forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const activeBtn = document.querySelector(`.nav-item[data-tab="${tab}"]`);
      if (activeBtn) activeBtn.classList.add('active');
      const pageMap = { 'home': 'pageHome', 'messages': 'pageMessages', 'profile': 'pageProfile' };
      const activePage = document.getElementById(pageMap[tab]);
      if (activePage) activePage.classList.add('active');
      navItems.forEach((item, idx) => { if (item.getAttribute('data-tab') === tab) currentIndex = idx; });
      updateIndicatorPosition(currentIndex, true);
      const mc = document.getElementById('mainContent');
      if (mc) mc.scrollTop = 0;
    }

    navItems.forEach((btn) => {
      btn.addEventListener('click', function(e) {
        if (dragged) { dragged = false; return; }
        e.preventDefault();
        const tab = this.getAttribute('data-tab');
        if (tab) {
          switchTab(tab);
          // Jiggle эффект при переключении вкладкой
          triggerBubbleJiggle();
          if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
      });
    });

    function triggerBubbleJiggle() {
      navIndicator.classList.remove('jiggle');
      void navIndicator.offsetWidth;
      navIndicator.classList.add('jiggle');
      navIndicator.addEventListener('animationend', () => {
        navIndicator.classList.remove('jiggle');
      }, { once: true });
    }

    // ===== DRAG / SWIPE С ФИЗИКОЙ =====
    setTimeout(() => { updateIndicatorPosition(0, false); }, 100);

    navPill.addEventListener('touchstart', (e) => {
      isDragging = true;
      startX = e.touches[0].clientX;
      const style = window.getComputedStyle(navIndicator);
      const matrix = new DOMMatrix(style.transform);
      dragStartX = matrix.m41;
      lastX = startX;
      lastTime = performance.now();
      velocity = 0;
      prevVelocity = 0;
      accumulatedSquash = 0;
      dragged = false;

      navIndicator.classList.add('dragging');
      navIndicator.style.transition = 'none';

      if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
    }, { passive: true });

    navPill.addEventListener('touchmove', (e) => {
      if (!isDragging) return;

      const now = performance.now();
      const x = e.touches[0].clientX;
      const dt = now - lastTime;
      const diff = x - startX;
      const instantVel = dt > 0 ? (x - lastX) / dt : 0;

      // Сглаживание скорости (exponential moving average)
      velocity = velocity * 0.4 + instantVel * 0.6;
      prevVelocity = velocity;

      const itemWidth = cachedItemWidth;
      const maxIndex = navItems.length - 1;
      let newPos = dragStartX + diff;

      // Мягкие границы
      const limit = itemWidth * 0.5;
      if (newPos < -limit) newPos = -limit;
      if (newPos > (maxIndex * itemWidth) + limit) newPos = (maxIndex * itemWidth) + limit;

      // ===== ФИЗИКА: SQUASH & STRETCH =====
      // Чем быстрее движение — тем сильнее деформация
      const speed = Math.abs(velocity);
      const maxSquash = 1.22; // максимальное растяжение 22%
      const targetSquashX = 1 + Math.min(speed * 0.008, maxSquash - 1) * Math.sign(velocity || 1);
      // Сохраняем "объём" пузыря — если растягивается по X, сжимается по Y
      const targetSquashY = 1 / targetSquashX;

      // Плавная интерполяция деформации (чтобы не было резких рывков)
      accumulatedSquash = accumulatedSquash * 0.55 + targetSquashX * 0.45;
      squashX = accumulatedSquash;
      squashY = 1 / squashX;

      // ===== ФИЗИКА: WOBBLE (покачивание) =====
      // Направление покачивания зависит от знака скорости
      // Пузырь немного наклоняется в сторону движения
      const maxWobble = 6;
      const targetRotation = Math.sign(velocity) * Math.min(speed * 0.04, maxWobble);
      rotation = rotation * 0.6 + targetRotation * 0.4;

      if (Math.abs(diff) > 10) dragged = true;

      setTransform(newPos, squashX, squashY, rotation);

      lastX = x;
      lastTime = now;
    }, { passive: true });

    navPill.addEventListener('touchend', (e) => {
      if (!isDragging) return;
      isDragging = false;

      const style = window.getComputedStyle(navIndicator);
      const matrix = new DOMMatrix(style.transform);
      const finalLeft = matrix.m41;

      const itemWidth = cachedItemWidth;
      let targetIndex = Math.round(finalLeft / itemWidth);
      if (targetIndex < 0) targetIndex = 0;
      if (targetIndex > 2) targetIndex = 2;

      const newTab = navItems[targetIndex].getAttribute('data-tab');

      // Убираем эффект пузыря
      navIndicator.classList.remove('dragging');

      if (dragged) {
        // ===== ФИЗИКА: OVERSHOOT ПРИ ОТПУСКАНИИ =====
        // Пузырь "перелетает" через целевую позицию и возвращается
        const targetPos = getCenteredPosition(targetIndex);
        const distFromTarget = finalLeft - targetPos;
        const overshootAmount = Math.sign(distFromTarget) * Math.min(Math.abs(distFromTarget) * 0.3, 15);
        const overshootPos = targetPos + overshootAmount;

        // Включаем transition с пружинистым easing
        navIndicator.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease';

        // Сначала перелёт к overshoot позиции
        setTransform(overshootPos, squashX, squashY, rotation);

        // Затем через небольшую задержку — к конечной позиции с jiggle
        setTimeout(() => {
          switchTab(newTab);
          triggerBubbleJiggle();
        }, 100);

        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
      } else {
        // Просто тап — возвращаем на место с анимацией
        navIndicator.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease';
        updateIndicatorPosition(currentIndex, true);
        triggerBubbleJiggle();
      }

      dragged = false;
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderAds(filter = '') {
      const ads = loadAds();
      const grid = document.getElementById('adsGrid');
      const empty = document.getElementById('homeEmpty');
      grid.innerHTML = '';
      let filteredAds = ads;
      if (filter.trim()) {
        const q = filter.toLowerCase().trim();
        filteredAds = ads.filter(ad => ad.title.toLowerCase().includes(q));
      }
      if (filteredAds.length === 0) {
        empty.style.display = 'flex';
        if (filter.trim() && ads.length > 0) {
          empty.querySelector('.empty-state-icon').textContent = '🔍';
          empty.querySelector('.empty-state-text').textContent = 'Ничего не найдено';
        } else {
          empty.querySelector('.empty-state-icon').textContent = '🏷️';
          empty.querySelector('.empty-state-text').textContent = 'Пока нет объявлений';
        }
      } else {
        empty.style.display = 'none';
        filteredAds.forEach(ad => grid.appendChild(createAdCard(ad)));
      }
    }

    function createAdCard(ad) {
      const card = document.createElement('div');
      card.className = 'ad-card';
      card.onclick = () => openDetailModal(ad);
      const imgHtml = ad.photos && ad.photos.length > 0
        ? `<img class="ad-image" src="${ad.photos[0]}" alt="${escapeHtml(ad.title)}">`
        : `<div class="ad-image-placeholder">📷</div>`;
      card.innerHTML = `<div class="ad-image-container">${imgHtml}</div><div class="ad-info"><div class="ad-title">${escapeHtml(ad.title)}</div><div class="ad-price">${escapeHtml(ad.price)}</div><div class="ad-city">📍 ${escapeHtml(ad.city)}</div></div>`;
      return card;
    }

    function renderMyAds() {
      const ads = loadAds();
      const grid = document.getElementById('myAdsGrid');
      const empty = document.getElementById('myAdsEmpty');
      grid.innerHTML = '';
      const myAds = ads.filter(ad => ad.userId === currentUser.id);
      if (myAds.length === 0) { empty.style.display = 'flex'; }
      else { empty.style.display = 'none'; myAds.forEach(ad => grid.appendChild(createAdCard(ad))); }
    }

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function(e) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => renderAds(e.target.value), 200);
    });

    let selectedPhotos = [];
    const bottomNav = document.getElementById('bottomNav');
    function hideBottomNav() { bottomNav.classList.add('hidden'); }
    function showBottomNav() { bottomNav.classList.remove('hidden'); }

    function openCreateModal() {
      selectedPhotos = []; resetPhotoSlots();
      document.getElementById('adTitle').value = '';
      document.getElementById('adPrice').value = '';
      document.getElementById('adCity').value = '';
      document.getElementById('createModal').classList.add('active');
      hideBottomNav();
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    function closeCreateModal() {
      document.getElementById('createModal').classList.remove('active');
      showBottomNav();
    }

    document.getElementById('openCreateBtn').addEventListener('click', openCreateModal);

    function resetPhotoSlots() {
      for (let i = 0; i < 4; i++) {
        const slot = document.getElementById('photoSlot' + i);
        slot.innerHTML = '<span class="add-icon">+</span>';
        slot.style.display = 'flex';
        slot.onclick = () => addPhoto(i);
      }
    }

    function addPhoto(index) {
      document.getElementById('photoInput').dataset.index = index;
      document.getElementById('photoInput').click();
    }

    function handlePhotoSelect(event) {
      const files = event.target.files;
      if (!files || files.length === 0) return;
      const remaining = 4 - selectedPhotos.length;
      const toProcess = Math.min(files.length, remaining);
      for (let i = 0; i < toProcess; i++) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const si = selectedPhotos.length;
          if (si >= 4) return;
          selectedPhotos.push(e.target.result);
          updatePhotoSlot(si, e.target.result);
        };
        reader.readAsDataURL(files[i]);
      }
      event.target.value = '';
    }

    function updatePhotoSlot(index, dataUrl) {
      const slot = document.getElementById('photoSlot' + index);
      slot.innerHTML = `<img src="${dataUrl}" alt="Photo"><button class="remove-btn" onclick="removePhoto(event, ${index})">✕</button>`;
      slot.onclick = null;
    }

    function removePhoto(event, index) {
      event.stopPropagation();
      selectedPhotos.splice(index, 1);
      resetPhotoSlots();
      selectedPhotos.forEach((photo, i) => updatePhotoSlot(i, photo));
    }

    function createAd() {
      const title = document.getElementById('adTitle').value.trim();
      const price = document.getElementById('adPrice').value.trim();
      const city = document.getElementById('adCity').value.trim();
      if (!title) { tg.showAlert('Введите название товара'); return; }
      if (!price) { tg.showAlert('Введите цену'); return; }
      if (!city) { tg.showAlert('Введите город'); return; }
      if (selectedPhotos.length === 0) { tg.showAlert('Добавьте хотя бы одну фотографию'); return; }
      const ads = loadAds();
      ads.unshift({
        id: 'ad_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        userId: currentUser.id, userName: currentUser.firstName,
        userUsername: currentUser.username, userPhoto: currentUser.photoUrl,
        title, price, city, photos: selectedPhotos.slice(0, 4), createdAt: Date.now()
      });
      saveAds(ads); closeCreateModal(); renderAds(); renderMyAds();
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      tg.showAlert('Объявление создано! ✅');
    }

    let currentCarouselIndex = 0;

    function openDetailModal(ad) {
      const modal = document.getElementById('detailModal');
      document.getElementById('detailTitle').textContent = ad.title;
      document.getElementById('detailPrice').textContent = ad.price;
      document.getElementById('detailCity').textContent = '📍 ' + ad.city;
      document.getElementById('detailSellerName').textContent = ad.userName || 'Продавец';
      if (ad.userPhoto) document.getElementById('detailSellerAvatar').innerHTML = `<img src="${ad.userPhoto}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">`;
      else document.getElementById('detailSellerAvatar').innerHTML = '👤';
      const track = document.getElementById('carouselTrack');
      const dots = document.getElementById('carouselDots');
      track.innerHTML = ''; dots.innerHTML = ''; currentCarouselIndex = 0;
      ad.photos.forEach((photo, i) => {
        track.innerHTML += `<div class="carousel-slide"><img src="${photo}" alt="Photo ${i+1}"></div>`;
        dots.innerHTML += `<button class="carousel-dot${i === 0 ? ' active' : ''}" onclick="goToSlide(${i})"></button>`;
      });
      modal.dataset.adId = ad.id; modal.classList.add('active'); hideBottomNav();
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function goToSlide(index) {
      document.getElementById('carouselTrack').style.transform = `translateX(-${index * 100}%)`;
      currentCarouselIndex = index;
      document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === index));
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('active');
      showBottomNav();
    }

    function contactSeller() {
      const adId = document.getElementById('detailModal').dataset.adId;
      const ad = loadAds().find(a => a.id === adId);
      if (ad && ad.userUsername) tg.openTelegramLink(`https://t.me/${ad.userUsername}`);
      else tg.showAlert('Контакты продавца недоступны');
    }

    document.getElementById('createModal').addEventListener('click', function(e) { if (e.target === this) closeCreateModal(); });

    let touchStartX = 0, touchEndX = 0;
    document.getElementById('detailCarousel').addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    document.getElementById('detailCarousel').addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      const total = document.querySelectorAll('.carousel-slide').length;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && currentCarouselIndex < total - 1) goToSlide(currentCarouselIndex + 1);
        else if (diff < 0 && currentCarouselIndex > 0) goToSlide(currentCarouselIndex - 1);
      }
    }, { passive: true });

    let initialHeight = window.innerHeight;
    window.addEventListener('resize', () => {
      if (window.innerHeight < initialHeight - 100) hideBottomNav(); else showBottomNav();
    });

    renderAds();
    renderMyAds();
  </script>
</body>
</html>
