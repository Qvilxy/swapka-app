<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flower Shop TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-color: #000000;
            --secondary-text: #8e8e93;
            --card-bg: #ffffff;
            --input-bg: #e3e3e8;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --green-tile: #a8e6cf;
            --blue-accent: #007aff;
            --border-color: #d1d1d6;
            
            --nav-container-bg: #ffffff;
            --nav-indicator-bg: #e5e5ea;
            --nav-text-inactive: #000000;
            --nav-text-active: #007aff;
        }

        body.dark-mode {
            --bg-color: #000000;
            --text-color: #ffffff;
            --secondary-text: #98989d;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
            --shadow: 0 2px 8px rgba(0,0,0,0.2);
            --green-tile: #1c3a2a;
            --border-color: #3a3a3c;
            
            --nav-container-bg: #1c1c1e;
            --nav-indicator-bg: #3a3a3c;
            --nav-text-inactive: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ВАЖНО: Блокируем скролл всего боди, если идет драг */
        body.no-scroll {
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            padding-top: 100px; 
            padding-bottom: 120px;
            min-height: 100vh;
        }

        /* --- Headers & Common --- */
        .page-header { padding: 0 16px 15px; display: flex; justify-content: space-between; align-items: center; background-color: var(--bg-color); position: sticky; top: 0; z-index: 10; }
        h1 { font-size: 28px; font-weight: 700; }
        .icon-btn { background: none; border: none; font-size: 22px; color: var(--text-color); cursor: pointer; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- TAB 1: GIFTS --- */
        .search-row { padding: 0 16px 12px; display: flex; gap: 12px; align-items: center; }
        .search-box { flex-grow: 1; position: relative; }
        .search-input { width: 100%; padding: 10px 10px 10px 38px; border-radius: 10px; border: none; background-color: var(--input-bg); color: var(--text-color); font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--secondary-text); font-size: 14px; }
        .cart-btn { background-color: var(--card-bg); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); border: none; color: var(--text-color); font-size: 18px; position: relative; }
        .cart-badge { position: absolute; top: -4px; right: -4px; background: #ff3b30; color: white; font-size: 10px; font-weight: bold; padding: 2px 5px; border-radius: 10px; display: none; }
        .filters-row { padding: 0 16px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .filters-row::-webkit-scrollbar { display: none; }
        .filter-pill { background-color: var(--card-bg); color: var(--text-color); border: none; padding: 8px 14px; border-radius: 18px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow); white-space: nowrap; }
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
        .product-card { background-color: var(--card-bg); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .tile-image { width: 100%; aspect-ratio: 1 / 1; background-color: var(--green-tile); display: flex; align-items: center; justify-content: center; }
        .tile-image.has-img { background-color: transparent; }
        .tile-image img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { padding: 10px; }
        .p-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .p-price { font-size: 13px; color: var(--secondary-text); margin-bottom: 8px; }
        .add-btn { width: 100%; padding: 8px; background-color: var(--bg-color); color: var(--text-color); border: 1px solid var(--input-bg); border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }

        /* --- TAB 2: PROFILE --- */
        .profile-top { padding: 0 16px 10px; display: flex; align-items: center; justify-content: space-between; }
        .user-block { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 56px; height: 56px; border-radius: 50%; background-color: #ccc; object-fit: cover; }
        .u-name { font-size: 18px; font-weight: 600; }
        .u-tag { font-size: 14px; color: var(--secondary-text); }
        .info-card { background-color: var(--card-bg); margin: 0 16px 12px; border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
        .card-head { font-size: 12px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 0.5px; }
        .card-head i { color: var(--text-color); font-size: 14px; }
        
        .cal-nav { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .date-select-btn { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 8px 12px; font-size: 17px; font-weight: 500; color: var(--text-color); display: flex; align-items: center; gap: 6px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .date-select-btn i { font-size: 12px; color: var(--secondary-text); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .d-name { font-size: 11px; color: var(--secondary-text); margin-bottom: 6px; }
        .d-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 50%; cursor: pointer; }
        .d-cell.today { background-color: var(--text-color); color: var(--bg-color); font-weight: 600; }
        .d-cell.event { background-color: #ff3b30; color: white; font-weight: 600; }
        .list-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--input-bg); font-size: 15px; }
        .list-row:last-child { border-bottom: none; }
        .row-label { color: var(--text-color); }
        .row-val { color: var(--secondary-text); }
        .row-action { color: var(--blue-accent); }

        /* --- TAB 3: COURIER --- */
        .order-card { background-color: var(--card-bg); margin: 0 16px 16px; border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
        .o-head { font-size: 16px; font-weight: 700; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--input-bg); }
        .o-scroll { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 4px; }
        .o-thumb { width: 70px; height: 70px; border-radius: 10px; background-color: var(--green-tile); flex-shrink: 0; }
        .o-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .o-detail { font-size: 14px; margin-bottom: 6px; line-height: 1.3; }
        .o-detail b { display: block; color: var(--text-color); margin-bottom: 2px; }
        .o-detail span { color: var(--secondary-text); }
        .o-phone { color: var(--blue-accent) !important; font-weight: 500; }

        /* --- NAVIGATION --- */
        .nav-wrapper {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 400px;
            z-index: 1000;
            pointer-events: none;
        }

        .nav-container {
            background-color: var(--nav-container-bg);
            border-radius: 100px;
            padding: 6px;
            display: flex;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05);
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }

        .nav-indicator {
            position: absolute;
            top: 6px;
            bottom: 6px;
            background-color: var(--nav-indicator-bg);
            border-radius: 100px;
            z-index: 1;
            cursor: grab;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.3s ease;
            will-change: transform, width;
        }
        
        .nav-indicator.dragging {
            cursor: grabbing;
            transition: none; /* Отключаем анимацию при драге */
            background-color: #d1d1d6;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            z-index: 2;
            cursor: pointer;
            transition: color 0.2s;
            color: var(--nav-text-inactive);
            position: relative;
        }

        .nav-item i { font-size: 22px; margin-bottom: 4px; transition: transform 0.2s; }
        .nav-item span { font-size: 11px; font-weight: 500; }
        .nav-item.active { color: var(--nav-text-active); }
        .nav-item.active i { transform: scale(1.1); }

        /* --- MODALS --- */
        .modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200; display: none; opacity: 0; transition: opacity 0.2s; }
        .modal-bg.open { display: block; opacity: 1; }
        .sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); border-radius: 16px 16px 0 0; padding: 20px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 201; max-height: 70vh; overflow-y: auto; }
        .sheet.open { transform: translateY(0); }
        .handle { width: 36px; height: 4px; background: var(--secondary-text); border-radius: 2px; margin: 0 auto 20px; opacity: 0.3; }
        
        .event-widget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .event-widget-title { font-size: 18px; font-weight: 600; }
        .trash-btn { background: none; border: none; color: #ff3b30; font-size: 20px; cursor: pointer; padding: 5px; }
        .event-date-label { color: var(--secondary-text); font-size: 14px; margin-bottom: 10px; }
        .event-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--input-bg); background: var(--bg-color); color: var(--text-color); font-size: 16px; margin-bottom: 15px; outline: none; }
        .btn-full { width: 100%; padding: 14px; background: var(--blue-accent); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; margin-top: 5px; cursor: pointer; opacity: 1; transition: opacity 0.2s; }
        .btn-full:disabled { background: var(--input-bg); color: var(--secondary-text); cursor: not-allowed; opacity: 0.7; }
        .cat-btn { width: 100%; padding: 14px; text-align: left; background: none; border: none; border-bottom: 1px solid var(--input-bg); font-size: 16px; color: var(--text-color); }
        .picker-list-container { display: flex; flex-direction: column; gap: 8px; max-height: 40vh; overflow-y: auto; padding-right: 5px; }
        .picker-item { padding: 14px; background: var(--bg-color); border-radius: 10px; text-align: center; font-size: 16px; font-weight: 500; cursor: pointer; border: 1px solid transparent; }
        .picker-item.selected { background: var(--blue-accent); color: white; border-color: var(--blue-accent); }

    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- === TAB 1: GIFTS === -->
        <div id="tab-gifts" class="tab-content active">
            <header class="page-header"><h1>Цветы</h1></header>
            <div class="search-row">
                <div class="search-box"><i class="fas fa-search search-icon"></i><input type="text" class="search-input" placeholder="Поиск..." id="searchInput"></div>
                <button class="cart-btn" onclick="openCart()"><i class="fas fa-shopping-cart"></i><span class="cart-badge" id="cartBadge">0</span></button>
            </div>
            <div class="filters-row">
                <button class="filter-pill" onclick="openCategoryModal()">Категория <i class="fas fa-chevron-down" style="font-size:10px;"></i></button>
                <button class="filter-pill" onclick="openPriceModal()">Цена <i class="fas fa-chevron-down" style="font-size:10px;"></i></button>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- === TAB 2: PROFILE === -->
        <div id="tab-profile" class="tab-content">
            <div class="profile-top">
                <div class="user-block">
                    <img src="https://via.placeholder.com/60" alt="" class="avatar" id="userAvatar">
                    <div><div class="u-name" id="userName">Name</div><div class="u-tag" id="userUsername">@username</div></div>
                </div>
                <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
            </div>
            <div class="info-card">
                <div class="card-head"><i class="far fa-flag"></i> Важные даты</div>
                <div class="cal-nav">
                    <div class="date-select-btn" onclick="openMonthPicker()"><span id="monthDisplay">Апрель</span><i class="fas fa-chevron-down"></i></div>
                    <div class="date-select-btn" onclick="openYearPicker()"><span id="yearDisplay">2026</span><i class="fas fa-chevron-down"></i></div>
                </div>
                <div class="cal-grid" id="calendarGrid"></div>
            </div>
            <div class="info-card">
                <div class="card-head"><i class="fas fa-map-marker-alt"></i> Адрес доставки</div>
                <div class="list-row"><span class="row-label">Енисейская 33, кв 16</span></div>
                <div class="list-row"><span class="row-action">+ Добавить адрес</span></div>
            </div>
            <div class="info-card">
                <div class="card-head"><i class="far fa-credit-card"></i> Оплата</div>
                <div class="list-row"><span class="row-label">•••• 4242</span><span class="row-val">Visa</span></div>
            </div>
            <div class="info-card">
                <div class="card-head"><i class="far fa-clock"></i> История заказов</div>
                <div class="list-row"><span class="row-label">Нет активных заказов</span><span class="row-val" id="orderCountBadge">0</span></div>
            </div>
        </div>

        <!-- === TAB 3: COURIER === -->
        <div id="tab-courier" class="tab-content">
            <header class="page-header"><h1>Заказы</h1></header>
            <div id="courierOrdersList"></div>
        </div>

    </div>

    <!-- === NAVIGATION === -->
    <div class="nav-wrapper">
        <div class="nav-container" id="navContainer">
            <div class="nav-indicator" id="navIndicator"></div>
            
            <div class="nav-item" data-index="0" onclick="switchTabByIndex(0)">
                <i class="fas fa-gift"></i>
                <span>Подарки</span>
            </div>
            <div class="nav-item" data-index="1" onclick="switchTabByIndex(1)">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </div>
            <div class="nav-item" data-index="2" onclick="switchTabByIndex(2)">
                <i class="fas fa-truck"></i>
                <span>Курьер</span>
            </div>
            <div class="nav-item" data-index="3" onclick="switchTabByIndex(3)">
                <i class="fas fa-crown" style="color: gold;"></i>
                <span>Админ</span>
            </div>
        </div>
    </div>

    <!-- === MODALS === -->
    <div class="modal-bg" id="modalOverlay" onclick="closeAllModals()"></div>
    <div class="sheet" id="catSheet"><div class="handle"></div><button class="cat-btn" onclick="setCat('all')">Все</button><button class="cat-btn" onclick="setCat('flowers')">Цветы</button><button class="cat-btn" onclick="setCat('sweets')">Сладкое</button><button class="cat-btn" onclick="setCat('toys')">Игрушки</button></div>
    <div class="sheet" id="priceSheet"><div class="handle"></div><h3 style="margin-bottom:15px;">Цена</h3><input type="range" style="width:100%" oninput="document.getElementById('pVal').innerText=this.value+' ₽'"><div style="text-align:center; margin:10px 0;" id="pVal">5000 ₽</div><div style="display:flex; gap:10px;"><input type="number" placeholder="От" style="width:50%; padding:10px; border-radius:8px; border:1px solid var(--input-bg); background:var(--bg-color); color:var(--text-color);"><input type="number" placeholder="До" style="width:50%; padding:10px; border-radius:8px; border:1px solid var(--input-bg); background:var(--bg-color); color:var(--text-color);"></div><button class="btn-full" onclick="closeAllModals()">Готово</button></div>
    <div class="sheet" id="cartSheet"><div class="handle"></div><h3 style="margin-bottom:15px;">Корзина</h3><div id="cartItems"></div><div style="text-align:right; font-size:18px; font-weight:bold; margin-top:15px;" id="cartTotal">0 ₽</div><button class="btn-full" onclick="checkout()">Оформить</button></div>
    <div class="sheet" id="monthPickerSheet"><div class="handle"></div><h3 style="margin-bottom:15px;">Выберите месяц</h3><div class="picker-list-container" id="monthListContainer"></div></div>
    <div class="sheet" id="yearPickerSheet"><div class="handle"></div><h3 style="margin-bottom:15px;">Выберите год</h3><div class="picker-list-container" id="yearListContainer"></div></div>
    <div class="sheet" id="eventSheet"><div class="handle"></div><div class="event-widget-header"><div class="event-widget-title">Событие</div><button class="trash-btn" id="deleteEventBtn" onclick="deleteEvent()" style="display:none;"><i class="fas fa-trash-alt"></i></button></div><div class="event-date-label" id="eventDateLabel">Дата: ...</div><input type="text" class="event-input" id="eventNameInput" placeholder="Название события" oninput="checkEventInput()"><button class="btn-full" id="saveEventBtn" disabled onclick="saveEvent()">Сохранить</button></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        if (tg.colorScheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
        }

        const user = tg.initDataUnsafe.user || { first_name: "Name", username: "username" };
        document.getElementById('userName').innerText = user.first_name;
        document.getElementById('userUsername').innerText = user.username ? '@'+user.username : '';

        // --- CALENDAR LOGIC ---
        const MOCK_TODAY = new Date(2026, 3, 17);
        let currentViewMonth = MOCK_TODAY.getMonth();
        let currentViewYear = MOCK_TODAY.getFullYear();
        let events = {};
        let selectedEventDay = null;
        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        function updateCalendarHeader() {
            document.getElementById('monthDisplay').innerText = monthNames[currentViewMonth];
            document.getElementById('yearDisplay').innerText = currentViewYear;
        }

        function renderCalendar() {
            updateCalendarHeader();
            const g = document.getElementById('calendarGrid');
            g.innerHTML = '';
            ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => g.innerHTML += `<div class="d-name">${d}</div>`);
            const firstDayOfMonth = new Date(currentViewYear, currentViewMonth, 1).getDay();
            let startOffset = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;
            for(let i=0; i<startOffset; i++) g.innerHTML += `<div></div>`;
            const daysInMonth = new Date(currentViewYear, currentViewMonth + 1, 0).getDate();
            for(let d=1; d<=daysInMonth; d++) {
                let cls = 'd-cell';
                if (d === MOCK_TODAY.getDate() && currentViewMonth === MOCK_TODAY.getMonth() && currentViewYear === MOCK_TODAY.getFullYear()) cls += ' today';
                const eventKey = `${currentViewYear}-${currentViewMonth}-${d}`;
                if (events[eventKey]) cls += ' event';
                g.innerHTML += `<div class="${cls}" onclick="openEventModal(${d})">${d}</div>`;
            }
        }

        function openMonthPicker() {
            const container = document.getElementById('monthListContainer');
            container.innerHTML = '';
            monthNames.forEach((m, index) => {
                const div = document.createElement('div');
                div.className = `picker-item ${index === currentViewMonth ? 'selected' : ''}`;
                div.innerText = m;
                div.onclick = () => { currentViewMonth = index; renderCalendar(); closeAllModals(); };
                container.appendChild(div);
            });
            openModal('monthPickerSheet');
        }

        function openYearPicker() {
            const container = document.getElementById('yearListContainer');
            container.innerHTML = '';
            for(let y=2026; y<=2030; y++) {
                const div = document.createElement('div');
                div.className = `picker-item ${y === currentViewYear ? 'selected' : ''}`;
                div.innerText = y;
                div.onclick = () => { currentViewYear = y; renderCalendar(); closeAllModals(); };
                container.appendChild(div);
            }
            openModal('yearPickerSheet');
        }

        function openEventModal(day) {
            selectedEventDay = day;
            const dateStr = `${day} ${monthNames[currentViewMonth]} ${currentViewYear}`;
            document.getElementById('eventDateLabel').innerText = `Дата: ${dateStr}`;
            const input = document.getElementById('eventNameInput');
            const deleteBtn = document.getElementById('deleteEventBtn');
            const eventKey = `${currentViewYear}-${currentViewMonth}-${day}`;
            if (events[eventKey]) { input.value = events[eventKey]; deleteBtn.style.display = 'block'; }
            else { input.value = ''; deleteBtn.style.display = 'none'; }
            checkEventInput();
            openModal('eventSheet');
            setTimeout(() => input.focus(), 300);
        }

        function checkEventInput() {
            const val = document.getElementById('eventNameInput').value.trim();
            document.getElementById('saveEventBtn').disabled = val.length === 0;
        }

        function saveEvent() {
            const val = document.getElementById('eventNameInput').value.trim();
            if (!val) return;
            events[`${currentViewYear}-${currentViewMonth}-${selectedEventDay}`] = val;
            renderCalendar(); closeAllModals();
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        function deleteEvent() {
            const key = `${currentViewYear}-${currentViewMonth}-${selectedEventDay}`;
            if (events[key]) { delete events[key]; renderCalendar(); closeAllModals(); if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning'); }
        }

        // --- PRODUCTS & CART ---
        const products = [
            { id: 1, title: "Букет роз", price: 3500, cat: "flowers", img: null },
            { id: 2, title: "Мишка", price: 1200, cat: "toys", img: null },
            { id: 3, title: "Шоколад", price: 800, cat: "sweets", img: null },
            { id: 4, title: "Тюльпаны", price: 2500, cat: "flowers", img: null },
            { id: 5, title: "Рафаэлло", price: 600, cat: "sweets", img: null },
            { id: 6, title: "Зайка", price: 1500, cat: "toys", img: null },
        ];
        let cart = [];
        let currentCat = 'all';

        function renderProducts(q = '') {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            products.filter(p => (currentCat === 'all' || p.cat === currentCat) && p.title.toLowerCase().includes(q.toLowerCase())).forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-card';
                const imgHtml = p.img ? `<div class="tile-image has-img"><img src="${p.img}"></div>` : `<div class="tile-image"><i class="fas fa-image" style="opacity:0.3"></i></div>`;
                div.innerHTML = `${imgHtml}<div class="p-info"><div class="p-title">${p.title}</div><div class="p-price">${p.price} ₽</div><button class="add-btn" onclick="addToCart(${p.id})">В корзину</button></div>`;
                grid.appendChild(div);
            });
        }

        function renderOrders() {
            const c = document.getElementById('courierOrdersList');
            const orders = [
                { date: "25 марта 15:00", addr: "Ленина 1", phone: "+7900...", items: [1,2] },
                { date: "25 марта 18:30", addr: "Мира 10", phone: "+7999...", items: [3], expired: true }
            ];
            orders.forEach(o => {
                let thumbs = o.items.map(id => { const p = products.find(x=>x.id===id); return p.img ? `<div class="o-thumb"><img src="${p.img}"></div>` : `<div class="o-thumb"></div>`; }).join('');
                c.innerHTML += `<div class="order-card" style="${o.expired?'opacity:0.5':''}"><div class="o-head">Содержимое</div><div class="o-scroll">${thumbs}</div><div class="o-detail"><b>Адрес:</b> <span>${o.addr}</span></div><div class="o-detail"><b>Дата:</b> <span>${o.date}</span></div><div class="o-detail"><b>Телефон:</b> <span class="o-phone">${o.phone}</span></div></div>`;
            });
        }

        // --- NAVIGATION LOGIC WITH PHYSICS (FIXED SCROLL ISSUE) ---
        let currentTabIndex = 0;
        const indicator = document.getElementById('navIndicator');
        const navItems = document.querySelectorAll('.nav-item');
        const navContainer = document.getElementById('navContainer');
        
        let isDragging = false;
        let startX = 0;
        let currentTranslateX = 0;

        function updateIndicatorPosition(index, animate = true) {
            const targetItem = navItems[index];
            const itemLeft = targetItem.offsetLeft;
            const itemWidth = targetItem.offsetWidth;
            const itemCenter = itemLeft + (itemWidth / 2);
            const indicatorWidth = itemWidth - 12; 
            const newLeft = itemCenter - (indicatorWidth / 2);

            if (!animate) {
                indicator.style.transition = 'none';
            } else {
                indicator.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.3s ease';
            }
            
            indicator.style.width = `${indicatorWidth}px`;
            indicator.style.transform = `translateX(${newLeft}px)`;
            currentTranslateX = newLeft; 

            navItems.forEach((el, i) => {
                if (i === index) el.classList.add('active');
                else el.classList.remove('active');
            });
            
            currentTabIndex = index;
        }

        function switchTabByIndex(index) {
            if (isDragging) return;
            
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            const tabs = ['gifts', 'profile', 'courier', 'admin'];
            const targetId = index === 3 ? 'tab-gifts' : `tab-${tabs[index]}`;
            
            if(index === 3) alert("Раздел Админ в разработке");
            
            document.getElementById(targetId).classList.add('active');
            updateIndicatorPosition(index);
        }

        window.addEventListener('load', () => updateIndicatorPosition(0, false));
        window.addEventListener('resize', () => updateIndicatorPosition(currentTabIndex, false));

        // --- DRAG AND DROP PHYSICS (SCROLL FIX) ---
        
        indicator.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            indicator.classList.add('dragging');
            indicator.style.transition = 'none';
            
            // БЛОКИРУЕМ СКРОЛЛ СТРАНИЦЫ
            document.body.classList.add('no-scroll');
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            
            // КРИТИЧЕСКИ ВАЖНО: preventDefault блокирует нативный скролл браузера
            e.preventDefault(); 
            
            const x = e.touches[0].clientX;
            const diff = x - startX;
            
            let newPos = currentTranslateX + diff;
            
            // Ограничители
            const maxRight = navContainer.offsetWidth - indicator.offsetWidth;
            if (newPos < -50) newPos = -50;
            if (newPos > maxRight + 50) newPos = maxRight + 50;

            indicator.style.transform = `translateX(${newPos}px)`;
        }, {passive: false}); // passive: false разрешает использовать preventDefault

        document.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            indicator.classList.remove('dragging');
            
            // РАЗРЕШАЕМ СКРОЛЛ ОБРАТНО
            document.body.classList.remove('no-scroll');
            
            indicator.style.transition = 'transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.3s ease';
            
            const style = window.getComputedStyle(indicator);
            const matrix = new WebKitCSSMatrix(style.transform);
            const currentLeft = matrix.m41;
            const indicatorCenter = currentLeft + (indicator.offsetWidth / 2);
            
            let nearestIndex = 0;
            let minDiff = Infinity;

            navItems.forEach((item, index) => {
                const itemCenter = item.offsetLeft + (item.offsetWidth / 2);
                const diff = Math.abs(indicatorCenter - itemCenter);
                if (diff < minDiff) {
                    minDiff = diff;
                    nearestIndex = index;
                }
            });
            
            switchTabByIndex(nearestIndex);
        });


        // --- MODALS UTILS ---
        function openModal(id) { document.getElementById('modalOverlay').classList.add('open'); document.getElementById(id).classList.add('open'); }
        function closeAllModals() { document.getElementById('modalOverlay').classList.remove('open'); document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open')); }
        function openCategoryModal() { openModal('catSheet'); }
        function openPriceModal() { openModal('priceSheet'); }
        function setCat(c) { currentCat = c; renderProducts(); closeAllModals(); }
        function addToCart(id) { cart.push(products.find(p=>p.id===id)); updateCart(); if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged(); }
        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            document.getElementById('cartBadge').style.display = cart.length ? 'block' : 'none';
            const list = document.getElementById('cartItems'); list.innerHTML = ''; let sum = 0;
            cart.forEach((item, idx) => { sum += item.price; list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--input-bg);"><span>${item.title}</span><span>${item.price} ₽ <i class="fas fa-times" style="color:red; margin-left:10px;" onclick="rmFromCart(${idx})"></i></span></div>`; });
            document.getElementById('cartTotal').innerText = sum + ' ₽';
            document.getElementById('orderCountBadge').innerText = cart.length;
        }
        function rmFromCart(idx) { cart.splice(idx,1); updateCart(); }
        function openCart() { openModal('cartSheet'); }
        function checkout() { alert('Заказ оформлен'); cart=[]; updateCart(); closeAllModals(); }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            if(document.body.classList.contains('dark-mode')) icon.classList.replace('fa-moon', 'fa-sun');
            else icon.classList.replace('fa-sun', 'fa-moon');
        }
        document.getElementById('searchInput').addEventListener('input', e => renderProducts(e.target.value));

        // Init
        renderProducts();
        renderCalendar();
        renderOrders();

    </script>
</body>
</html>
