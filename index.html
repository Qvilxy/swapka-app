<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Swapka</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f2f2f7;
      --text-primary: #000000;
      --text-secondary: #8e8e93;
      --border-color: #e5e5ea;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --card-bg: #ffffff;
      --search-bg: #ffffff;
      
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      
      --indicator-bg: #d0d0d0;
      --indicator-glow: rgba(208, 208, 208, 0.5);
      
      --icon-inactive: #8e8e93;
      --icon-active: #007AFF;
    }

    .dark-theme {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2c2c2e;
      --text-primary: #ffffff;
      --text-secondary: #8e8e93;
      --border-color: #3a3a3c;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --card-bg: #2c2c2e;
      --search-bg: #2c2c2e;

      --glass-bg: rgba(30, 30, 30, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      
      --indicator-bg: #4a4a4a;
      --indicator-glow: rgba(74, 74, 74, 0.5);
      
      --icon-inactive: #8e8e93;
      --icon-active: #0A84FF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      transition: background 0.3s, color 0.3s;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== HEADER ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 55px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      transition: background 0.3s, border-color 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      overflow: hidden;
    }

    .marquee-container {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
    }

    .marquee-content {
      display: inline-flex;
      animation: marquee 20s linear infinite;
      will-change: transform;
    }

    .marquee-item {
      font-family: 'Arial Black', 'Impact', 'Helvetica Neue', Arial, sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: #000000;
      text-transform: uppercase;
      letter-spacing: 2px;
      flex-shrink: 0;
      padding-right: 7px;
    }

    @keyframes marquee {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    .main-content {
      position: fixed;
      top: 55px;
      left: 0;
      right: 0;
      bottom: 90px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      will-change: scroll-position;
    }

    .page {
      display: none;
      min-height: 100%;
      padding-bottom: 20px;
      opacity: 0;
      transform: translateY(10px);
      position: relative;
    }

    .page.active {
      display: block;
      animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Search & Ads Styles */
    .search-container {
      padding: 12px 16px;
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.3s;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--search-bg);
      border-radius: 100px;
      padding: 10px 14px;
      box-shadow: 0 3px 18px rgba(0,0,0,0.12);
      transition: box-shadow 0.2s, background 0.3s;
    }

    .search-bar:focus-within {
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }

    .search-icon {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .search-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--icon-inactive);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .search-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
      color: var(--text-primary);
      width: 100%;
      font-family: inherit;
    }

    .search-input::placeholder { color: #C8C8C8; }
    .dark-theme .search-input::placeholder { color: #6b6b6b; }

    .ads-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px 16px;
    }

    .ad-card {
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, background 0.3s;
      cursor: pointer;
      will-change: transform;
      position: relative;
    }

    .ad-card:active { transform: scale(0.97); }

    .ad-delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(255, 59, 48, 0.9);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .ad-delete-btn:active {
      transform: scale(0.9);
      background: rgba(255, 59, 48, 1);
    }

    .ad-delete-btn svg {
      width: 16px;
      height: 16px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ad-image-container {
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      position: relative;
    }

    .ad-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--text-secondary);
    }

    .ad-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ad-info { padding: 10px; }

    .ad-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ad-price {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
      transform: translateY(-2px);
    }

    .ad-city {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ✅ НОВЫЙ ДИЗАЙН ЧАТОВ */
    .messages-list { padding: 16px; }
    
    .message-item-wrapper {
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
      border-radius: 100px;
    }
    
    /* ✅ КНОПКА УДАЛЕНИЯ СЗАДИ */
    .message-delete-bg {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 120px;
      background: rgba(255, 59, 48, 0.65);
      border-radius: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.3s;
      gap: 4px;
    }
    
    .message-delete-bg.visible {
      opacity: 1;
    }
    
    .message-delete-bg svg {
      width: 28px;
      height: 28px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    .message-delete-bg span {
      font-size: 12px;
      color: white;
      font-weight: 600;
    }
    
    .message-delete-btn {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 120px;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 3;
    }

    /* ✅ КАРТОЧКА ЧАТА */
    .message-item {
      display: flex; 
      align-items: center; 
      padding: 12px 16px;
      padding-right: 20px;
      background: var(--card-bg); 
      border-radius: 100px;
      cursor: pointer; 
      transition: background 0.2s, transform 0.3s;
      position: relative;
      z-index: 2;
      touch-action: pan-y;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    
    .dark-theme .message-item {
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    
    .message-item.swiping {
      transition: transform 0.1s;
    }
    
    .message-item:hover { background: var(--bg-secondary); }
    
    /* ✅ АВАТАРКА */
    .message-avatar {
      width: 56px; 
      height: 56px; 
      border-radius: 50%;
      margin-right: 14px;
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-size: 24px; 
      flex-shrink: 0;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    
    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    /* ✅ КОНТЕНТ */
    .message-content { 
      flex: 1; 
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .message-name { 
      font-size: 17px; 
      font-weight: 700; 
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .message-preview { 
      font-size: 14px; 
      color: var(--text-secondary); 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    
    /* ✅ СЧЁТЧИК НЕПРОЧИТАННЫХ */
    .unread-badge {
      width: 24px;
      height: 24px;
      background: #FF3B30;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-left: 12px;
      line-height: 1;
    }

    /* Chat Modal */
    .chat-modal {
      position: fixed;
      top: 55px;
      left: 0;
      right: 0;
      bottom: 90px;
      background: var(--bg-primary);
      z-index: 150;
      display: none;
      flex-direction: column;
    }
    .chat-modal.active { display: flex; }
    
    .chat-header {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-back-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-back-btn svg {
      width: 24px;
      height: 24px;
      stroke: var(--text-primary);
      stroke-width: 2;
      fill: none;
    }
    .chat-seller-info { flex: 1; }
    .chat-seller-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .chat-seller-ad { font-size: 13px; color: var(--text-secondary); }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .chat-message.received {
      background: var(--bg-secondary);
      color: var(--text-primary);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .chat-message.sent {
      background: #007AFF;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .chat-message-time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
    }
    
    .chat-input-container {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 20px;
      background: var(--bg-primary);
      font-size: 15px;
      outline: none;
      color: var(--text-primary);
    }
    .chat-send-btn {
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .chat-send-btn:active { transform: scale(0.9); }
    .chat-send-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* ✅ ЦЕНТРИРОВАНИЕ EMPTY STATE */
    .empty-state {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex; 
      flex-direction: column; 
      align-items: center;
      justify-content: center; 
      padding: 20px; 
      text-align: center;
      pointer-events: none;
    }
    
    #myAdsEmpty {
      transform: translateY(calc(-50% + 80px));
    }
    
    .empty-state-text { 
      font-size: 16px; 
      color: var(--text-secondary); 
      font-weight: 500;
    }

    /* Profile Styles */
    .profile-moon-wrapper {
      position: relative; height: 50px; display: flex;
      justify-content: flex-end; align-items: center; padding: 0 16px; z-index: 10;
    }
    
    .moon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      transition: transform 0.3s;
      pointer-events: auto;
      z-index: 1001;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
    }
    
    .moon-btn svg {
      width: 24px;
      height: 24px;
      transition: transform 0.3s ease;
    }
    
    .moon-btn svg path,
    .moon-btn svg circle {
      fill: var(--text-primary);
    }
    
    .moon-btn svg line {
      stroke: var(--text-primary);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .moon-btn:active { transform: scale(0.85); }
    .moon-btn:active svg { transform: rotate(15deg); }

    .profile-shifted-content { transform: translateY(-120px); }
    .profile-user-info { padding: 20px 16px; text-align: center; transform: translateY(60px); }
    
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 12px;
      display: block; background: var(--bg-secondary);
    }
    .profile-avatar-placeholder {
      width: 80px; height: 80px; border-radius: 50%; background: var(--bg-secondary);
      margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 36px;
    }
    .profile-name { font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .profile-username { font-size: 15px; color: var(--text-secondary); margin-top: 4px; transform: translateY(-5px); }
    .profile-rating { display: flex; justify-content: center; gap: 4px; margin-top: 8px; font-size: 18px; transform: translateY(-10px); }

    .create-ad-btn {
      display: block; margin: 0 auto 20px; padding: 14px 15px; width: fit-content; min-width: 200px;
      background: linear-gradient(270deg, #87CEEB, #B0E0E6, #9370DB, #BA55D3, #87CEEB);
      background-size: 400% 400%; animation: gradientShift 6s ease infinite;
      color: white; border: none; border-radius: 100px; font-size: 17px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.2s, opacity 0.2s;
      transform: translateY(38px); box-shadow: 0 4px 20px rgba(135, 206, 235, 0.4);
    }
    .create-ad-btn:active { transform: translateY(38px) scale(0.97); opacity: 0.9; }

    .my-ads-title { font-size: 18px; font-weight: 700; padding: 0 16px 12px; color: var(--text-primary); transform: translateY(30px); }
    .my-ads-grid-wrapper { transform: translateY(30px); }

    /* ===== LIQUID GLASS BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: auto;
      z-index: 1000;
      display: flex;
      justify-content: center;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-top: 8px;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform;
    }

    .bottom-nav.hidden { transform: translateY(150%); }

    .nav-pill {
      pointer-events: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 380px;
      height: 64px;
      
      background: var(--glass-bg);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      
      border-radius: 32px;
      padding: 0 8px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      border-radius: 24px;
      cursor: pointer;
      z-index: 2;
      position: relative;
      border: none;
      background: transparent;
      gap: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }

    .nav-item.active { background: transparent; box-shadow: none; }

    .nav-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    
    .nav-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--icon-inactive);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .nav-item.active .nav-icon svg {
      stroke: var(--icon-active);
      transform: scale(1.1);
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 2;
      opacity: 0.8;
    }

    .nav-item.active .nav-label {
      color: var(--icon-active);
      font-weight: 700;
      opacity: 1;
    }

    .nav-indicator {
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 8px;
      width: calc(33.33% - 8px);
      
      background: var(--indicator-bg);
      border-radius: 24px;
      z-index: 1;
      
      will-change: transform, width, border-radius, scale;
      transform: translateZ(0) scale(1);
      transform-origin: center center;
      
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), 
                  width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.3s ease;
      
      box-shadow: 0 4px 20px var(--indicator-glow);
      pointer-events: none;
      overflow: visible;
    }

    .nav-indicator::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 60%);
      opacity: 0.4;
      pointer-events: none;
    }

    .dark-theme .nav-indicator::after {
      background: transparent;
      opacity: 0;
    }

    /* Модальные окна */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 200; display: none;
      align-items: flex-end; justify-content: center;
      backdrop-filter: blur(5px);
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg-primary); width: 100%; max-height: 92vh;
      border-radius: 20px 20px 0 0; padding: 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      overflow-y: auto; animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      background: var(--bg-secondary); border: none; border-radius: 50%; width: 36px; height: 36px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
    }
    
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: block; }
    .form-input {
      width: 100%; padding: 12px 16px; border: 2px solid var(--border-color); border-radius: 12px;
      font-size: 16px; color: var(--text-primary); background: var(--bg-secondary); font-family: inherit; outline: none;
    }
    .photos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .photo-slot {
      aspect-ratio: 1; border: 2px dashed var(--border-color); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; background: var(--bg-secondary);
    }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    .photo-slot .add-icon { font-size: 28px; color: var(--text-secondary); }
    .photo-slot .remove-btn {
      position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none;
      border-radius: 50%; width: 22px; height: 22px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .submit-btn {
      width: auto; margin: 10px auto 0; display: block; padding: 16px 15px; background: #000000; color: #ffffff;
      border: none; border-radius: 100px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Detail Modal */
    .detail-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary);
      z-index: 200; display: none; overflow-y: auto;
    }
    .detail-modal.active { display: block; animation: fadeInDetail 0.3s ease; }
    
    @keyframes fadeInDetail {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .detail-header {
      position: sticky; top: 0; background: var(--bg-primary); padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: center; z-index: 10;
      border-bottom: 1px solid var(--border-color);
    }
    .detail-back {
      background: var(--bg-secondary); border: none; border-radius: 50%; width: 36px; height: 36px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
    }
    .detail-back svg {
      width: 18px;
      height: 18px;
      stroke: var(--text-secondary);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .image-carousel { width: 100%; aspect-ratio: 1; position: relative; overflow: hidden; background: var(--bg-secondary); }
    .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.3s ease; }
    .carousel-slide { min-width: 100%; height: 100%; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
    .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); border: none; cursor: pointer; padding: 0; }
    .carousel-dot.active { background: white; }
    .detail-info { padding: 20px 16px; }
    .detail-title { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .detail-price { font-size: 24px; font-weight: 800; color: #ff6b35; margin-bottom: 8px; }
    .detail-city { font-size: 15px; color: var(--text-secondary); margin-bottom: 20px; }
    .detail-seller { display: flex; align-items: center; padding: 14px; background: var(--bg-secondary); border-radius: 14px; margin-bottom: 16px; }
    .detail-seller-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--border-color); margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; }
    .detail-seller-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .detail-seller-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .detail-contact-btn {
      width: 100%; padding: 16px; background: linear-gradient(270deg, #87CEEB, #B0E0E6, #9370DB, #BA55D3, #87CEEB);
      background-size: 400% 400%; animation: gradientShift 6s ease infinite; color: white; border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 20px;
    }
    .main-content::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="marquee-container">
      <div class="marquee-content" id="marqueeContent">
      </div>
    </div>
  </div>

  <div class="main-content" id="mainContent">

    <!-- HOME PAGE -->
    <div class="page active" id="pageHome">

          <div class="search-icon">

    <!-- MESSAGES PAGE -->
    <div class="page" id="pageMessages">

    <!-- PROFILE PAGE -->
    <div class="page" id="pageProfile">
      <div class="profile-moon-wrapper">

  <!-- CHAT MODAL -->

  <!-- IOS 26 LIQUID GLASS BOTTOM NAV -->

  <!-- CREATE AD MODAL -->
  <div class="modal-overlay" id="createModal">

      <div class="form-group">

      <button class="submit-btn" id="submitAdBtn" onclick="createAd()">Создать</button>

  <!-- AD DETAIL MODAL -->
  <div class="detail-modal" id="detailModal">
    <div class="detail-header">
      <button class="detail-back" onclick="closeDetailModal()">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div style="width:30px;height:30px;"></div>
      <button class="detail-back" style="visibility:hidden">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
    </div>
    <div class="image-carousel" id="detailCarousel">
      <div class="carousel-track" id="carouselTrack"></div>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>
    <div class="detail-info">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-price" id="detailPrice"></div>
      <div class="detail-city" id="detailCity"></div>
      <div class="detail-seller">
        <div class="detail-seller-avatar" id="detailSellerAvatar">👤</div>
        <div>
          <div class="detail-seller-name" id="detailSellerName"></div>
        </div>
      </div>
      <button class="detail-contact-btn" onclick="contactSeller()">Написать продавцу</button>
    </div>
  </div>

  <input type="file" id="photoInput" accept="image/*" multiple style="display:none;" onchange="handlePhotoSelect(event)">

  <script>
    // ✅ БЕГУЩАЯ СТРОКА
    function initMarquee() {
      const marqueeContent = document.getElementById('marqueeContent');
      const itemCount = 8;
      for (let i = 0; i < itemCount; i++) {
        const item = document.createElement('div');
        item.className = 'marquee-item';
        item.textContent = 'SWAPKA';
        marqueeContent.appendChild(item);
      }
      for (let i = 0; i < itemCount; i++) {
        const item = document.createElement('div');
        item.className = 'marquee-item';
        item.textContent = 'SWAPKA';
        marqueeContent.appendChild(item);
      }
    }
    initMarquee();
    
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const currentUser = {
      id: user?.id || 'guest_' + Date.now(),
      firstName: user?.first_name || 'Гость',
      lastName: user?.last_name || '',
      username: user?.username || '',
      photoUrl: user?.photo_url || ''
    };

    const ADS_KEY = 'swapka_ads';
    const THEME_KEY = 'swapka_theme';
    const CHATS_KEY = 'swapka_chats';

    function loadAds() {
      try { const data = localStorage.getItem(ADS_KEY); return data ? JSON.parse(data) : []; } catch (e) { return []; }
    }
    function saveAds(ads) {
      try { localStorage.setItem(ADS_KEY, JSON.stringify(ads)); } catch (e) {}
    }
    function loadChats() {
      try { const data = localStorage.getItem(CHATS_KEY); return data ? JSON.parse(data) : []; } catch (e) { return []; }
    }
    function saveChats(chats) {
      try { localStorage.setItem(CHATS_KEY, JSON.stringify(chats)); } catch (e) {}
    }
    function loadTheme() { return localStorage.getItem(THEME_KEY); }
    function saveTheme(theme) { localStorage.setItem(THEME_KEY, theme); }

    function applyTheme(theme) {
      const body = document.body;
      const iconMoon = document.getElementById('iconMoon');
      const iconSun = document.getElementById('iconSun');
      if (theme === 'dark') {
        body.classList.add('dark-theme');
        if (iconMoon) iconMoon.style.display = 'none';
        if (iconSun) iconSun.style.display = 'block';
      } else {
        body.classList.remove('dark-theme');
        if (iconMoon) iconMoon.style.display = 'block';
        if (iconSun) iconSun.style.display = 'none';
      }
    }

    const savedTheme = loadTheme();
    if (savedTheme === 'dark' || savedTheme === 'light') {
      applyTheme(savedTheme);
    } else {
      applyTheme(tg.colorScheme === 'dark' ? 'dark' : 'light');
    }

    const themeBtn = document.getElementById('themeToggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', function() {
        const isDark = document.body.classList.contains('dark-theme');
        if (isDark) { applyTheme('light'); saveTheme('light'); }
        else { applyTheme('dark'); saveTheme('dark'); }
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      });
    }

    function setupProfile() {
      const avatarContainer = document.getElementById('profileAvatarContainer');
      if (currentUser.photoUrl) {
        avatarContainer.innerHTML = `<img src="${currentUser.photoUrl}" class="profile-avatar" alt="Avatar">`;
      } else {
        avatarContainer.innerHTML = `<div class="profile-avatar-placeholder">👤</div>`;
      }
      document.getElementById('profileName').textContent = currentUser.firstName + (currentUser.lastName ? ' ' + currentUser.lastName : '');
      document.getElementById('profileUsername').textContent = currentUser.username ? '@' + currentUser.username : '';
    }
    setupProfile();

    function setRandomSearchPlaceholder() {
      const searchInput = document.getElementById('searchInput');
      const rand = Math.random();
      if (rand < 0.1) searchInput.placeholder = 'Свиной навоз оптом';
      else if (rand < 0.55) searchInput.placeholder = 'Что ищем?';
      else searchInput.placeholder = 'Погнали за покупками!';
    }

    // ===== ФИЗИКА ИНДИКАТОРА =====
    const navPill = document.getElementById('navPill');
    const navIndicator = document.getElementById('navIndicator');
    const navItems = document.querySelectorAll('.nav-item');
    let indicatorPhysics = { isDragging: false, currentTransformX: 0, touchOffsetX: 0, velocity: 0, lastX: 0, lastTime: 0, currentIndex: 0, cachedItemWidth: 0 };

    function initIndicatorPhysics() {
      indicatorPhysics.cachedItemWidth = navItems[0].offsetWidth;
      updateIndicatorPosition(0, false);
      window.addEventListener('resize', () => {
        indicatorPhysics.cachedItemWidth = navItems[0].offsetWidth;
        updateIndicatorPosition(indicatorPhysics.currentIndex, false);
      });
    }

    function updateIndicatorPosition(index, isDragging = false) {
      const targetX = index * indicatorPhysics.cachedItemWidth;
      indicatorPhysics.currentTransformX = targetX;
      indicatorPhysics.currentIndex = index;
      if (isDragging) return;
      navIndicator.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease';
      navIndicator.style.transform = `translate3d(${targetX}px, 0, 0) scale(1)`;
      navIndicator.style.width = `calc(33.33% - 8px)`;
      navIndicator.style.borderRadius = '24px';
    }

    function switchTab(tab, index) {
      navItems.forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const activeBtn = document.querySelector(`.nav-item[data-tab="${tab}"]`);
      if(activeBtn) activeBtn.classList.add('active');
      const pageMap = { 'home': 'pageHome', 'messages': 'pageMessages', 'profile': 'pageProfile' };
      const activePage = document.getElementById(pageMap[tab]);
      if(activePage) activePage.classList.add('active');
      updateIndicatorPosition(index, false);
      indicatorPhysics.currentIndex = index;
      const mainContent = document.getElementById('mainContent');
      if(mainContent) mainContent.scrollTop = 0;
      if (tab === 'messages') renderMessages();
    }

    navPill.addEventListener('touchstart', (e) => {
      indicatorPhysics.isDragging = true;
      indicatorPhysics.lastX = e.touches[0].clientX;
      indicatorPhysics.lastTime = Date.now();
      indicatorPhysics.velocity = 0;
      navItems.forEach((item, idx) => { if(item.classList.contains('active')) indicatorPhysics.currentIndex = idx; });
      indicatorPhysics.touchOffsetX = e.touches[0].clientX - indicatorPhysics.currentTransformX;
      navIndicator.style.transition = 'none';
    }, { passive: true });

    navPill.addEventListener('touchmove', (e) => {
      if (!indicatorPhysics.isDragging) return;
      const touchX = e.touches[0].clientX;
      const currentTime = Date.now();
      const dt = currentTime - indicatorPhysics.lastTime;
      if (dt > 10) { indicatorPhysics.velocity = (touchX - indicatorPhysics.lastX) / dt; indicatorPhysics.lastX = touchX; indicatorPhysics.lastTime = currentTime; }
      let newX = touchX - indicatorPhysics.touchOffsetX;
      const maxIndex = navItems.length - 1;
      const minX = 0;
      const maxX = maxIndex * indicatorPhysics.cachedItemWidth;
      const limit = indicatorPhysics.cachedItemWidth * 0.4;
      if (newX < minX - limit) newX = (minX - limit) + (newX - (minX - limit)) * 0.15;
      else if (newX > maxX + limit) newX = (maxX + limit) + (newX - (maxX + limit)) * 0.15;
      const diffFromCenter = Math.abs(newX - (indicatorPhysics.currentIndex * indicatorPhysics.cachedItemWidth));
      const stretch = Math.min(diffFromCenter / 100, 0.25);
      navIndicator.style.transform = `translate3d(${newX}px, 0, 0) scale(1.2)`;
      navIndicator.style.width = `calc(33.33% - 8px + ${stretch * 15}px)`;
      navIndicator.style.borderRadius = `${24 - stretch * 8}px`;
      indicatorPhysics.currentTransformX = newX;
    }, { passive: true });

    navPill.addEventListener('touchend', (e) => {
      if (!indicatorPhysics.isDragging) return;
      indicatorPhysics.isDragging = false;
      const momentum = indicatorPhysics.velocity * 15;
      let finalX = indicatorPhysics.currentTransformX + momentum;
      finalX = Math.max(0, Math.min(finalX, 2 * indicatorPhysics.cachedItemWidth));
      let targetIndex = Math.round(finalX / indicatorPhysics.cachedItemWidth);
      targetIndex = Math.max(0, Math.min(2, targetIndex));
      const newTab = navItems[targetIndex].getAttribute('data-tab');
      const currentTab = navItems[indicatorPhysics.currentIndex].getAttribute('data-tab');
      if (newTab !== currentTab) switchTab(newTab, targetIndex);
      else updateIndicatorPosition(indicatorPhysics.currentIndex, false);
      navIndicator.style.width = `calc(33.33% - 8px)`;
      navIndicator.style.borderRadius = '24px';
    });

    navItems.forEach((btn, index) => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const tab = this.getAttribute('data-tab');
        if (tab) switchTab(tab, index);
      });
    });

    setTimeout(() => { initIndicatorPhysics(); }, 100);

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderAds(filter = '') {
      const ads = loadAds();
      const grid = document.getElementById('adsGrid');
      const empty = document.getElementById('homeEmpty');
      grid.innerHTML = '';
      let filteredAds = ads;
      if (filter.trim()) {
        const q = filter.toLowerCase().trim();
        filteredAds = ads.filter(ad => ad.title.toLowerCase().includes(q));
      }
      if (filteredAds.length === 0) {
        empty.style.display = 'flex';
        if (filter.trim() && ads.length > 0) empty.querySelector('.empty-state-text').textContent = 'Ничего не найдено';
        else empty.querySelector('.empty-state-text').textContent = 'Пока нет объявлений';
      } else {
        empty.style.display = 'none';
        filteredAds.forEach(ad => grid.appendChild(createAdCard(ad)));
      }
    }

    function createAdCard(ad, isMyAd = false) {
      const card = document.createElement('div');
      card.className = 'ad-card';
      card.onclick = () => openDetailModal(ad);
      const imgHtml = ad.photos && ad.photos.length > 0
        ? `<img class="ad-image" src="${ad.photos[0]}" alt="${escapeHtml(ad.title)}">`
        : `<div class="ad-image-placeholder">📷</div>`;
      let deleteBtn = '';
      if (isMyAd) {
        deleteBtn = `<button class="ad-delete-btn" onclick="deleteAd(event, '${ad.id}')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>`;
      }
      card.innerHTML = `${deleteBtn}<div class="ad-image-container">${imgHtml}</div><div class="ad-info"><div class="ad-title">${escapeHtml(ad.title)}</div><div class="ad-price">${escapeHtml(ad.price)}</div><div class="ad-city">📍 ${escapeHtml(ad.city)}</div></div>`;
      return card;
    }

    function deleteAd(event, adId) {
      event.stopPropagation();
      if (confirm('Удалить это объявление?')) {
        const ads = loadAds();
        saveAds(ads.filter(ad => ad.id !== adId));
        renderAds();
        renderMyAds();
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      }
    }

    function renderMyAds() {
      const ads = loadAds();
      const grid = document.getElementById('myAdsGrid');
      const empty = document.getElementById('myAdsEmpty');
      grid.innerHTML = '';
      const myAds = ads.filter(ad => ad.userId === currentUser.id);
      if (myAds.length === 0) { empty.style.display = 'flex'; }
      else { empty.style.display = 'none'; myAds.forEach(ad => grid.appendChild(createAdCard(ad, true))); }
    }

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function (e) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => renderAds(e.target.value), 200);
    });

    let selectedPhotos = [];
    const bottomNav = document.getElementById('bottomNav');
    function hideBottomNav() { bottomNav.classList.add('hidden'); }
    function showBottomNav() { bottomNav.classList.remove('hidden'); }

    function openCreateModal() {
      selectedPhotos = [];
      resetPhotoSlots();
      document.getElementById('adTitle').value = '';
      document.getElementById('adPrice').value = '';
      document.getElementById('adCity').value = '';
      document.getElementById('createModal').classList.add('active');
      hideBottomNav();
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }
    function closeCreateModal() { document.getElementById('createModal').classList.remove('active'); showBottomNav(); }
    document.getElementById('openCreateBtn').addEventListener('click', openCreateModal);

    function resetPhotoSlots() {
      for (let i = 0; i < 4; i++) {
        const slot = document.getElementById('photoSlot' + i);
        slot.innerHTML = '<span class="add-icon">+</span>';
        slot.style.display = 'flex';
        slot.onclick = () => addPhoto(i);
      }
    }
    function addPhoto(index) { document.getElementById('photoInput').dataset.index = index; document.getElementById('photoInput').click(); }
    function handlePhotoSelect(event) {
      const files = event.target.files;
      if (!files || files.length === 0) return;
      const remainingSlots = 4 - selectedPhotos.length;
      const filesToProcess = Math.min(files.length, remainingSlots);
      for (let i = 0; i < filesToProcess; i++) {
        const file = files[i];
        const reader = new FileReader();
        reader.onload = function (e) {
          const slotIndex = selectedPhotos.length;
          if (slotIndex >= 4) return;
          selectedPhotos.push(e.target.result);
          updatePhotoSlot(slotIndex, e.target.result);
        };
        reader.readAsDataURL(file);
      }
      event.target.value = '';
    }
    function updatePhotoSlot(index, dataUrl) {
      const slot = document.getElementById('photoSlot' + index);
      slot.innerHTML = `<img src="${dataUrl}" alt="Photo"><button class="remove-btn" onclick="removePhoto(event, ${index})">✕</button>`;
      slot.onclick = null;
    }
    function removePhoto(event, index) {
      event.stopPropagation();
      selectedPhotos.splice(index, 1);
      resetPhotoSlots();
      selectedPhotos.forEach((photo, i) => updatePhotoSlot(i, photo));
    }
    function createAd() {
      const title = document.getElementById('adTitle').value.trim();
      const price = document.getElementById('adPrice').value.trim();
      const city = document.getElementById('adCity').value.trim();
      if (!title) { tg.showAlert('Введите название товара'); return; }
      if (!price) { tg.showAlert('Введите цену'); return; }
      if (!city) { tg.showAlert('Введите город'); return; }
      if (selectedPhotos.length === 0) { tg.showAlert('Добавьте хотя бы одну фотографию'); return; }
      const ads = loadAds();
      const newAd = {
        id: 'ad_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        userId: currentUser.id,
        userName: currentUser.firstName,
        userUsername: currentUser.username,
        userPhoto: currentUser.photoUrl,
        title, price, city,
        photos: selectedPhotos.slice(0, 4),
        createdAt: Date.now()
      };
      ads.unshift(newAd);
      saveAds(ads);
      closeCreateModal();
      renderAds();
      renderMyAds();
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      tg.showAlert('Объявление создано! ✅');
    }

    let currentCarouselIndex = 0;
    let currentAdForChat = null;

    function openDetailModal(ad) {
      const modal = document.getElementById('detailModal');
      document.getElementById('detailTitle').textContent = ad.title;
      document.getElementById('detailPrice').textContent = ad.price;
      document.getElementById('detailCity').textContent = '📍 ' + ad.city;
      document.getElementById('detailSellerName').textContent = ad.userName || 'Продавец';
      if (ad.userPhoto) {
        document.getElementById('detailSellerAvatar').innerHTML = `<img src="${ad.userPhoto}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">`;
      } else {
        document.getElementById('detailSellerAvatar').innerHTML = '👤';
      }
      const track = document.getElementById('carouselTrack');
      const dots = document.getElementById('carouselDots');
      track.innerHTML = '';
      dots.innerHTML = '';
      currentCarouselIndex = 0;
      ad.photos.forEach((photo, i) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.innerHTML = `<img src="${photo}" alt="Photo ${i + 1}">`;
        track.appendChild(slide);
        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goToSlide(i);
        dots.appendChild(dot);
      });
      modal.dataset.adId = ad.id;
      modal.classList.add('active');
      hideBottomNav();
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function goToSlide(index) {
      const track = document.getElementById('carouselTrack');
      track.style.transform = `translateX(-${index * 100}%)`;
      currentCarouselIndex = index;
      document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === index));
    }
    function closeDetailModal() { document.getElementById('detailModal').classList.remove('active'); showBottomNav(); }

    function contactSeller() {
      const modal = document.getElementById('detailModal');
      const adId = modal.dataset.adId;
      const ads = loadAds();
      const ad = ads.find(a => a.id === adId);
      if (!ad) return;
      currentAdForChat = ad;
      const chats = loadChats();
      let chat = chats.find(c => c.adId === adId && c.sellerId === ad.userId);
      if (!chat) {
        chat = {
          id: 'chat_' + Date.now(),
          adId, adTitle: ad.title,
          sellerId: ad.userId, sellerName: ad.userName, sellerPhoto: ad.userPhoto,
          buyerId: currentUser.id,
          messages: [],
          createdAt: Date.now(),
          updatedAt: Date.now()
        };
        chats.push(chat);
        saveChats(chats);
      }
      openChat(chat);
    }

    function openChat(chat) {
      const chatModal = document.getElementById('chatModal');
      document.getElementById('chatSellerName').textContent = chat.sellerName;
      document.getElementById('chatSellerAd').textContent = chat.adTitle;
      chatModal.dataset.chatId = chat.id;
      chatModal.classList.add('active');
      // Сбрасываем непрочитанные
      const chats = loadChats();
      const chatIdx = chats.findIndex(c => c.id === chat.id);
      if (chatIdx !== -1) {
        chats[chatIdx].unreadCount = 0;
        saveChats(chats);
        renderMessages();
      }
      renderChatMessages(chat);
      const messagesContainer = document.getElementById('chatMessages');
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function closeChat() {
      document.getElementById('chatModal').classList.remove('active');
      currentAdForChat = null;
    }

    function renderChatMessages(chat) {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      if (chat.messages.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px 20px;font-size:14px;">Напишите первое сообщение продавцу</div>';
        return;
      }
      chat.messages.forEach(msg => {
        const isSent = msg.senderId === currentUser.id;
        const messageDiv = document.createElement('div');
        messageDiv.className = `chat-message ${isSent ? 'sent' : 'received'}`;
        const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        messageDiv.innerHTML = `${escapeHtml(msg.text)}<div class="chat-message-time">${time}</div>`;
        container.appendChild(messageDiv);
      });
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;
      const chatModal = document.getElementById('chatModal');
      const chatId = chatModal.dataset.chatId;
      const chats = loadChats();
      const chat = chats.find(c => c.id === chatId);
      if (chat) {
        chat.messages.push({ id: 'msg_' + Date.now(), senderId: currentUser.id, text, timestamp: Date.now() });
        chat.updatedAt = Date.now();
        saveChats(chats);
        input.value = '';
        renderChatMessages(chat);
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        renderMessages();
      }
    }

    document.getElementById('chatInput')?.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    // ✅ СВАЙП ДЛЯ УДАЛЕНИЯ ЧАТА
    function initChatSwipe(item, chatId) {
      let startX = 0;
      let currentX = 0;
      let isSwiping = false;
      const deleteWidth = 120;
      
      item.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        currentX = 0;
        isSwiping = true;
        item.classList.add('swiping');
      }, { passive: true });
      
      item.addEventListener('touchmove', (e) => {
        if (!isSwiping) return;
        currentX = e.touches[0].clientX;
        const diff = startX - currentX;
        if (diff > 0) {
          const translateX = Math.min(diff, deleteWidth);
          item.style.transform = `translateX(-${translateX}px)`;
        } else {
          const translateX = Math.max(0, diff + deleteWidth);
          item.style.transform = `translateX(-${translateX}px)`;
        }
      }, { passive: true });
      
      item.addEventListener('touchend', (e) => {
        if (!isSwiping) return;
        isSwiping = false;
        item.classList.remove('swiping');
        const diff = startX - currentX;
        const deleteBg = item.closest('.message-item-wrapper').querySelector('.message-delete-bg');
        if (diff > deleteWidth / 2) {
          item.style.transform = `translateX(-${deleteWidth}px)`;
          if (deleteBg) deleteBg.classList.add('visible');
        } else {
          item.style.transform = 'translateX(0)';
          if (deleteBg) deleteBg.classList.remove('visible');
        }
      });
      
      document.addEventListener('click', (e) => {
        if (!item.contains(e.target)) {
          item.style.transform = 'translateX(0)';
          const deleteBg = item.closest('.message-item-wrapper')?.querySelector('.message-delete-bg');
          if (deleteBg) deleteBg.classList.remove('visible');
        }
      });
    }

    function deleteChat(chatId) {
      if (confirm('Удалить этот чат?')) {
        const chats = loadChats();
        saveChats(chats.filter(c => c.id !== chatId));
        renderMessages();
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      }
    }

    function renderMessages() {
      const chats = loadChats();
      const container = document.getElementById('messagesList');
      const userChats = chats.filter(c => c.buyerId === currentUser.id);
      
      if (userChats.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-text">У вас пока нет чатов</div></div>`;
        return;
      }
      
      userChats.sort((a, b) => b.updatedAt - a.updatedAt);
      container.innerHTML = '';
      
      userChats.forEach(chat => {
        const lastMessage = chat.messages[chat.messages.length - 1];
        const preview = lastMessage ? lastMessage.text : 'Нет сообщений';
        
        const wrapper = document.createElement('div');
        wrapper.className = 'message-item-wrapper';
        
        // ✅ КРАСНАЯ КНОПКА УДАЛЕНИЯ СЗАДИ
        const deleteBg = document.createElement('div');
        deleteBg.className = 'message-delete-bg';
        deleteBg.innerHTML = `
          <svg viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
          <span>Удалить</span>
        `;
        
        // ✅ КАРТОЧКА ЧАТА
        const messageItem = document.createElement('div');
        messageItem.className = 'message-item';
        messageItem.onclick = () => openChat(chat);
        
        const avatarHtml = chat.sellerPhoto 
          ? `<div class="message-avatar"><img src="${chat.sellerPhoto}" alt=""></div>`
          : '<div class="message-avatar">👤</div>';
        
        // ✅ СЧЁТЧИК НЕПРОЧИТАННЫХ
        const unreadBadge = chat.unreadCount > 0 ? `<div class="unread-badge">${chat.unreadCount}</div>` : '';
        
        messageItem.innerHTML = `
          ${avatarHtml}
          <div class="message-content">
            <div class="message-name">${escapeHtml(chat.sellerName)}</div>
            <div class="message-preview">${escapeHtml(preview)}</div>
          </div>
          ${unreadBadge}
        `;
        
        // ✅ СКРЫТАЯ КНОПКА УДАЛЕНИЯ
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'message-delete-btn';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          deleteChat(chat.id);
        };
        
        wrapper.appendChild(deleteBg);
        wrapper.appendChild(messageItem);
        wrapper.appendChild(deleteBtn);
        container.appendChild(wrapper);
        
        initChatSwipe(messageItem, chat.id);
      });
    }

    document.getElementById('createModal').addEventListener('click', function (e) {
      if (e.target === this) closeCreateModal();
    });

    let touchStartX = 0;
    let touchEndX = 0;
    document.getElementById('detailCarousel').addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    document.getElementById('detailCarousel').addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      const totalSlides = document.querySelectorAll('.carousel-slide').length;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && currentCarouselIndex < totalSlides - 1) goToSlide(currentCarouselIndex + 1);
        else if (diff < 0 && currentCarouselIndex > 0) goToSlide(currentCarouselIndex - 1);
      }
    }, { passive: true });

    let initialHeight = window.innerHeight;
    window.addEventListener('resize', () => {
      if (window.innerHeight < initialHeight - 100) hideBottomNav();
      else showBottomNav();
    });

    setRandomSearchPlaceholder();
    renderAds();
    renderMyAds();
  </script>
</body>
</html>
