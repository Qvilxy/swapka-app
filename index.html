<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marketplace</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --secondary-bg: #f5f5f5;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
            --button-bg: #3390ec;
            --button-text: #ffffff;
            --search-bg: #f0f0f0;
            --nav-active: #3390ec;
            --nav-inactive: #999999;
        }

        [data-theme="dark"] {
            --bg-color: #1c1c1e;
            --text-color: #ffffff;
            --secondary-bg: #2c2c2e;
            --card-bg: #2c2c2e;
            --border-color: #3a3a3c;
            --button-bg: #3390ec;
            --button-text: #ffffff;
            --search-bg: #3a3a3c;
            --nav-active: #3390ec;
            --nav-inactive: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 80px;
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 10px;
        }

        /* === SEARCH BAR === */
        .search-container {
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            padding: 10px;
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background-color: var(--search-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: background-color 0.3s;
        }

        .search-input::placeholder {
            color: #999;
        }

        /* === ADS GRID === */
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .ad-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .ad-card:active {
            transform: scale(0.98);
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .ad-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background-color: var(--secondary-bg);
        }

        .ad-info {
            padding: 10px;
        }

        .ad-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ad-city {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .ad-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--button-bg);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* === BOTTOM NAVIGATION === */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            cursor: pointer;
            color: var(--nav-inactive);
            transition: color 0.2s, transform 0.1s;
        }

        .nav-item.active {
            color: var(--nav-active);
        }

        .nav-item:active {
            transform: scale(0.95);
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 3px;
        }

        .nav-label {
            font-size: 12px;
            font-weight: 500;
        }

        /* === PROFILE PAGE === */
        .profile-page {
            display: none;
            padding: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            justify-content: space-between;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--secondary-bg);
            border: 2px solid var(--border-color);
        }

        .profile-details h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .profile-stats {
            font-size: 14px;
            color: #999;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--secondary-bg);
        }

        .menu-list {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .menu-item {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:active {
            background-color: var(--secondary-bg);
        }

        /* === CREATE AD MODAL === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 600px;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-color);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .close-btn:hover {
            background-color: var(--secondary-bg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--button-bg);
        }

        .photo-upload {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .photo-upload:hover {
            border-color: var(--button-bg);
            background-color: var(--secondary-bg);
        }

        .photo-upload.has-image {
            border-style: solid;
            padding: 10px;
        }

        .upload-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            object-fit: cover;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-btn:active {
            opacity: 0.8;
        }

        .hidden {
            display: none !important;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* === MESSAGES PAGE (Placeholder) === */
        .messages-page {
            display: none;
            padding: 20px;
            text-align: center;
            color: #999;
        }

        .messages-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- MAIN PAGE -->
    <div id="mainPage" class="page active">
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
        </div>
        
        <div class="ads-grid" id="adsGrid">
            <div class="empty-state">
                <div class="empty-state-icon">📦</div>
                <div>Пока нет объявлений</div>
                <div style="font-size: 14px; margin-top: 5px;">Создайте первое объявление!</div>
            </div>
        </div>
    </div>

    <!-- MESSAGES PAGE -->
    <div id="messagesPage" class="messages-page">
        <div class="messages-icon">💬</div>
        <h3>Сообщения</h3>
        <p>Здесь будут ваши чаты с продавцами</p>
    </div>

    <!-- PROFILE PAGE -->
    <div id="profilePage" class="profile-page">
        <div class="profile-header">
            <div class="profile-info">
                <img src="" alt="Avatar" class="profile-avatar" id="profileAvatar">
                <div class="profile-details">
                    <h2 id="profileName">Загрузка...</h2>
                    <div class="profile-stats">
                        <div>Рейтинг: <span id="userRating">4/5</span></div>
                        <div>Подписчики: <span id="userSubscribers">67</span></div>
                    </div>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>

        <div class="menu-list">
            <div class="menu-item" id="createAdBtn">
                <span>➕</span> Создать объявление
            </div>
            <div class="menu-item">
                <span>📢</span> Мои объявления
            </div>
            <div class="menu-item">
                <span>💬</span> Поддержка
            </div>
            <div class="menu-item">
                <span>📋</span> Правила
            </div>
        </div>
    </div>

    <!-- CREATE AD MODAL -->
    <div class="modal" id="createAdModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Новое объявление</h3>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            
            <form id="adForm">
                <div class="form-group">
                    <label class="form-label">Название товара</label>
                    <input type="text" class="form-input" id="adTitle" required placeholder="Например: iPhone 13">
                </div>

                <div class="form-group">
                    <label class="form-label">Фотография</label>
                    <div class="photo-upload" id="photoUpload">
                        <div id="uploadPlaceholder">
                            <div class="upload-icon">📷</div>
                            <div>Нажмите чтобы добавить фото</div>
                        </div>
                        <img id="imagePreview" class="upload-preview hidden">
                    </div>
                    <input type="file" id="adPhoto" accept="image/*" class="hidden">
                </div>

                <div class="form-group">
                    <label class="form-label">Цена (руб.)</label>
                    <input type="number" class="form-input" id="adPrice" required placeholder="500000">
                </div>

                <div class="form-group">
                    <label class="form-label">Город</label>
                    <input type="text" class="form-input" id="adCity" required placeholder="Москва">
                </div>

                <button type="submit" class="submit-btn">Опубликовать</button>
            </form>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-page="main">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">Главная</div>
        </div>
        <div class="nav-item" data-page="messages">
            <div class="nav-icon">💬</div>
            <div class="nav-label">Сообщения</div>
        </div>
        <div class="nav-item" data-page="profile">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Профиль</div>
        </div>
    </nav>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // State
        let ads = JSON.parse(localStorage.getItem('ads')) || [];
        let currentTheme = localStorage.getItem('theme') || 'light';
        let userData = null;

        // DOM Elements
        const mainPage = document.getElementById('mainPage');
        const messagesPage = document.getElementById('messagesPage');
        const profilePage = document.getElementById('profilePage');
        const adsGrid = document.getElementById('adsGrid');
        const searchInput = document.getElementById('searchInput');
        const createAdModal = document.getElementById('createAdModal');
        const createAdBtn = document.getElementById('createAdBtn');
        const closeModal = document.getElementById('closeModal');
        const adForm = document.getElementById('adForm');
        const photoUpload = document.getElementById('photoUpload');
        const adPhoto = document.getElementById('adPhoto');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const themeToggle = document.getElementById('themeToggle');
        const navItems = document.querySelectorAll('.nav-item');

        // Initialize App
        function init() {
            // Get Telegram user data
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userData = tg.initDataUnsafe.user;
                updateProfileUI();
            } else {
                // Demo data if not in Telegram
                userData = {
                    first_name: 'Тимур',
                    last_name: 'Артыков',
                    username: 'timur_art',
                    photo_url: ''
                };
                updateProfileUI();
            }

            // Apply theme
            applyTheme(currentTheme);

            // Render ads
            renderAds(ads);

            // Setup event listeners
            setupEventListeners();
        }

        function updateProfileUI() {
            const name = `${userData.first_name} ${userData.last_name || ''}`.trim();
            document.getElementById('profileName').textContent = name;
            
            if (userData.photo_url) {
                document.getElementById('profileAvatar').src = userData.photo_url;
            } else {
                // Fallback avatar with initials
                const initial = name.charAt(0).toUpperCase();
                document.getElementById('profileAvatar').src = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23ccc" width="100" height="100"/><text fill="%23666" font-size="40" x="50" y="60" text-anchor="middle">${initial}</text></svg>`;
            }
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeToggle.textContent = '🌙';
            }
            currentTheme = theme;
            localStorage.setItem('theme', theme);
        }

        function setupEventListeners() {
            // Navigation
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    switchPage(page);
                    
                    navItems.forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');
                });
            });

            // Search
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filteredAds = ads.filter(ad => 
                    ad.title.toLowerCase().includes(query) ||
                    ad.city.toLowerCase().includes(query)
                );
                renderAds(filteredAds);
            });

            // Create Ad Modal
            createAdBtn.addEventListener('click', () => {
                createAdModal.classList.add('active');
            });

            closeModal.addEventListener('click', () => {
                createAdModal.classList.remove('active');
                resetForm();
            });

            createAdModal.addEventListener('click', (e) => {
                if (e.target === createAdModal) {
                    createAdModal.classList.remove('active');
                    resetForm();
                }
            });

            // Photo Upload
            photoUpload.addEventListener('click', () => {
                adPhoto.click();
            });

            adPhoto.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        imagePreview.src = e.target.result;
                        imagePreview.classList.remove('hidden');
                        uploadPlaceholder.classList.add('hidden');
                        photoUpload.classList.add('has-image');
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Form Submit
            adForm.addEventListener('submit', (e) => {
                e.preventDefault();
                createAd();
            });

            // Theme Toggle
            themeToggle.addEventListener('click', () => {
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                applyTheme(newTheme);
            });
        }

        function switchPage(page) {
            // Hide all pages
            mainPage.classList.remove('active');
            messagesPage.classList.remove('active');
            profilePage.classList.remove('active');
            
            // Show selected page
            if (page === 'main') {
                mainPage.classList.add('active');
            } else if (page === 'messages') {
                messagesPage.classList.add('active');
            } else if (page === 'profile') {
                profilePage.classList.add('active');
            }
        }

        function createAd() {
            const title = document.getElementById('adTitle').value;
            const price = document.getElementById('adPrice').value;
            const city = document.getElementById('adCity').value;
            const photo = imagePreview.src || null;

            const newAd = {
                id: Date.now(),
                title,
                price: parseInt(price),
                city,
                photo,
                createdAt: new Date().toISOString(),
                userId: userData.id || 1
            };

            ads.unshift(newAd);
            localStorage.setItem('ads', JSON.stringify(ads));
            
            renderAds(ads);
            createAdModal.classList.remove('active');
            resetForm();
            
            // Show success message
            tg.showAlert('Объявление успешно создано!');
            
            // Switch to main page
            switchPage('main');
            navItems.forEach(nav => nav.classList.remove('active'));
            navItems[0].classList.add('active');
        }

        function resetForm() {
            adForm.reset();
            imagePreview.src = '';
            imagePreview.classList.add('hidden');
            uploadPlaceholder.classList.remove('hidden');
            photoUpload.classList.remove('has-image');
        }

        function renderAds(adsToRender) {
            if (adsToRender.length === 0) {
                adsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <div>Объявления не найдены</div>
                    </div>
                `;
                return;
            }

            adsGrid.innerHTML = adsToRender.map(ad => `
                <div class="ad-card" onclick="showAdDetails(${ad.id})">
                    <img src="${ad.photo || 'image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/><text fill=%22%23999%22 font-size=%2220%22 x=%2250%22 y=%2255%22 text-anchor=%22middle%22>Нет фото</text></svg>'}" 
                         alt="${ad.title}" 
                         class="ad-image">
                    <div class="ad-info">
                        <div class="ad-title">${escapeHtml(ad.title)}</div>
                        <div class="ad-city">📍 ${escapeHtml(ad.city)}</div>
                        <div class="ad-price">${ad.price.toLocaleString()} руб.</div>
                    </div>
                </div>
            `).join('');
        }

        function showAdDetails(id) {
            const ad = ads.find(a => a.id === id);
            if (ad) {
                tg.showAlert(`${ad.title}\nЦена: ${ad.price.toLocaleString()} руб.\nГород: ${ad.city}`);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start app
        init();
    </script>
</body>
</html>
