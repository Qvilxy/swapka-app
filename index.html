<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Swapka</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border-color: #e5e5e5;
            --accent-color: #007bff;
            --accent-green: #34c759;
            --accent-blue: #007bff;
            --search-bg: #f0f0f0;
            --bottom-nav-bg: #ffffff;
            --message-sent: #007bff;
            --message-received: #f0f0f0;
            --overlay-bg: rgba(0,0,0,0.5);
            --card-shadow: 0 2px 8px rgba(0,0,0,0.1);
            --star-empty: #ddd;
            --star-filled: #ffc107;
            --input-bg: #f0f0f0;
            --modal-bg: #ffffff;
            --badge-bg: #ff3b30;
        }

        .dark-theme {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2c2c2e;
            --bg-card: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-tertiary: #666666;
            --border-color: #3a3a3c;
            --accent-color: #0a84ff;
            --accent-green: #30d158;
            --accent-blue: #0a84ff;
            --search-bg: #2c2c2e;
            --bottom-nav-bg: #1a1a1a;
            --message-sent: #0a84ff;
            --message-received: #2c2c2e;
            --overlay-bg: rgba(0,0,0,0.7);
            --card-shadow: 0 2px 8px rgba(0,0,0,0.3);
            --star-empty: #444;
            --star-filled: #ffc107;
            --input-bg: #2c2c2e;
            --modal-bg: #2c2c2e;
            --badge-bg: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* ===== BOTTOM NAVIGATION ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--bottom-nav-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 1000;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 6px 20px;
            border-radius: 12px;
            transition: all 0.2s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-item:active {
            transform: scale(0.95);
        }

        .nav-item.active {
            background: var(--bg-secondary);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: var(--text-tertiary);
            transition: fill 0.2s;
        }

        .nav-item.active svg {
            fill: var(--accent-color);
        }

        .nav-item span {
            font-size: 10px;
            color: var(--text-tertiary);
            transition: color 0.2s;
        }

        .nav-item.active span {
            color: var(--accent-color);
            font-weight: 600;
        }

        .nav-badge {
            position: absolute;
            top: 0;
            right: 10px;
            background: var(--badge-bg);
            color: white;
            font-size: 10px;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        /* ===== PAGES ===== */
        .page {
            display: none;
            padding-bottom: 80px;
            min-height: 100vh;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== MAIN PAGE ===== */
        .search-container {
            padding: 12px 16px;
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 100;
            transition: background-color 0.3s;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--search-bg);
            border-radius: 12px;
            padding: 10px 14px;
            gap: 8px;
            transition: background-color 0.3s;
        }

        .search-bar svg {
            width: 20px;
            height: 20px;
            fill: var(--text-tertiary);
            flex-shrink: 0;
        }

        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            color: var(--text-primary);
            width: 100%;
            font-family: inherit;
        }

        .search-bar input::placeholder {
            color: var(--text-tertiary);
        }

        .categories-row {
            display: flex;
            gap: 8px;
            padding: 0 16px 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .categories-row::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.2s;
        }

        .category-chip.active {
            background: var(--accent-color);
            color: white;
        }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 0 12px;
        }

        .listing-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .listing-card:active {
            transform: scale(0.97);
        }

        .listing-card-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .listing-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .listing-card-image .placeholder-img {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-secondary), var(--border-color));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .listing-card-info {
            padding: 10px;
        }

        .listing-card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .listing-card-city {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .listing-card-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* ===== LISTING DETAIL PAGE ===== */
        .detail-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 2000;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .detail-page.open {
            transform: translateX(0);
        }

        .detail-page.closing {
            transform: translateX(100%);
        }

        .detail-back-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--overlay-bg);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2001;
        }

        .detail-back-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .detail-image-container {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .detail-images-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .detail-images-slider::-webkit-scrollbar {
            display: none;
        }

        .detail-image-slide {
            min-width: 100%;
            aspect-ratio: 1;
            scroll-snap-align: start;
        }

        .detail-image-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-counter {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .detail-content {
            padding: 20px 16px;
        }

        .detail-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .detail-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .detail-city {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .detail-seller-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .detail-seller-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-secondary);
        }

        .detail-seller-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .detail-seller-rating {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .detail-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .detail-action-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .detail-action-btn:active {
            transform: scale(0.98);
        }

        .btn-message {
            background: var(--accent-blue);
            color: white;
        }

        .btn-message svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* ===== MESSAGES PAGE ===== */
        .page-header {
            padding: 16px;
            font-size: 20px;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 50;
        }

        .chat-list {
            padding: 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            border-bottom: 1px solid var(--border-color);
        }

        .chat-item:active {
            background: var(--bg-secondary);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .chat-last-message {
            font-size: 13px;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            text-align: right;
            flex-shrink: 0;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .chat-unread {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-blue);
            color: white;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
        }

        .empty-chats {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-chats svg {
            width: 64px;
            height: 64px;
            fill: var(--text-tertiary);
            margin-bottom: 16px;
        }

        .empty-chats p {
            color: var(--text-tertiary);
            font-size: 14px;
        }

        /* ===== CHAT VIEW ===== */
        .chat-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-view.open {
            transform: translateX(0);
        }

        .chat-view.closing {
            transform: translateX(100%);
        }

        .chat-view-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
        }

        .chat-back-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .chat-back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .chat-view-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-view-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent {
            align-self: flex-end;
            background: var(--message-sent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: var(--message-received);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-primary);
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }

        .chat-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: var(--accent-color);
        }

        .chat-send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-blue);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* ===== PROFILE PAGE ===== */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 16px;
        }

        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .profile-rating-container {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 4px 0;
        }

        .profile-rating-stars {
            display: flex;
            gap: 2px;
        }

        .profile-rating-stars svg {
            width: 16px;
            height: 16px;
        }

        .profile-rating-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--bg-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            fill: var(--text-primary);
            transition: fill 0.3s;
        }

        .theme-toggle:active {
            transform: scale(0.9);
        }

        .profile-section {
            padding: 0 16px;
            margin-bottom: 16px;
        }

        .profile-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .profile-menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--bg-card);
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--card-shadow);
        }

        .profile-menu-item:active {
            transform: scale(0.98);
            opacity: 0.8;
        }

        .profile-menu-item svg {
            width: 22px;
            height: 22px;
            fill: var(--accent-color);
            flex-shrink: 0;
        }

        .profile-menu-item span {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
        }

        .profile-menu-item .arrow {
            width: 20px;
            height: 20px;
            fill: var(--text-tertiary);
        }

        .create-listing-btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 2px dashed var(--accent-color);
            background: transparent;
            color: var(--accent-color);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .create-listing-btn:active {
            background: var(--accent-color);
            color: white;
        }

        .create-listing-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        /* ===== MY LISTINGS ===== */
        .my-listings-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 2000;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .my-listings-page.open {
            transform: translateX(0);
        }

        .my-listings-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .my-listings-back {
            width: 36px;
            height: 36px;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .my-listings-back svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        .my-listings-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .my-listings-content {
            padding: 16px;
        }

        .my-listing-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 14px;
            margin-bottom: 10px;
            box-shadow: var(--card-shadow);
        }

        .my-listing-thumb {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .my-listing-info {
            flex: 1;
            min-width: 0;
        }

        .my-listing-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .my-listing-price {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 4px;
        }

        .my-listing-city {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .my-listing-delete {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-start;
        }

        .my-listing-delete svg {
            width: 20px;
            height: 20px;

            font-weight: 700;

            font-family: inherit;
            margin-top: 8px;
            transition: all 0.2s;

            transform: scale(0.98);
        }

        .form-submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== RATING MODAL ===== */
        .rating-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);

            align-items: center;
            justify-content: center;

        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .rating-modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .rating-stars-input {

        .rating-star-btn {
            background: none;
            border: none;

            padding: 4px;

        }

        .rating-star-btn:active {

        /* ===== SWIPE HINT ===== */
        .swipe-hint {

            width: 0;

            if (tg?.initDataUnsafe?.user) {

            const letter = name.charAt(0).toUpperCase();

        function generateListingPlaceholder(title) {
            const colors = ['#e8f5e9', '#e3f2fd', '#fff3e0', '#fce4ec', '#f3e5f5', '#e0f7fa', '#fffde7'];
            const color = colors[title.charCodeAt(0) % colors.length];
            const letter = title.charAt(0).toUpperCase();
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
                <rect width="400" height="400" fill="${color}"/>
                <text x="200" y="210" font-family="Arial" font-size="64" fill="#999" text-anchor="middle" font-weight="bold">${letter}</text>
            </svg>`;
            return 'data:image/svg+xml;base64,' + btoa(svg);

        function formatPrice(price) {
            return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');

            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openListing(id) {
            const listing = state.listings.find(l => l.id === id);
            if (!listing) return;

            state.currentListingId = id;
            const detailPage = document.getElementById('detail-page');
            const seller = sampleUsers.find(u => u.id === listing.sellerId);
            const sellerName = seller ? seller.name : 'Продавец';

            const slider = document.getElementById('detail-images-slider');
            const images = listing.images && listing.images.length > 0 ? listing.images : [generateListingPlaceholder(listing.title)];

                <div class="detail-image-slide">

        // ===== SWIPE TO CLOSE =====
        function setupSwipeListener(element) {
            let startX = 0;
            let currentX = 0;
            let isDragging = false;
            const threshold = 80;

            element.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                isDragging = true;
                element.style.transition = 'none';
            }, { passive: true });

            element.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                currentX = e.touches[0].clientX;
                const diff = currentX - startX;

                if (diff > 0 && diff < 200) {
                    element.style.transform = `translateX(${diff}px)`;
                    const opacity = Math.min(diff / 200, 0.5);
                    document.getElementById('swipe-hint').classList.add('visible');
                }
            }, { passive: true });

            element.addEventListener('touchend', () => {
                if (!isDragging) return;
                isDragging = false;
                const diff = currentX - startX;
                element.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                document.getElementById('swipe-hint').classList.remove('visible');

                if (diff > threshold) {
                    closeListing();
                } else {
                    element.style.transform = 'translateX(0)';
                }
                currentX = 0;
            });
        }

        // ===== CHAT SYSTEM =====
        function openChatWithSeller(sellerId, listingId) {
            // Find or create chat
            let chatId = Object.keys(state.chats).find(
                key => state.chats[key].userId === sellerId && state.chats[key].listingId === listingId
            );

            if (!chatId) {
                chatId = 'chat_' + Date.now();
                const seller = sampleUsers.find(u => u.id === sellerId);
                state.chats[chatId] = {
                    id: chatId,
                    userId: sellerId,
                    listingId: listingId,
                    messages: [
                        { sender: 'system', text: `Чат по объявлению "${state.listings.find(l => l.id === listingId)?.title}"`, time: getCurrentTime() }
                    ]
                };
                saveChats();
            }

            // Close detail page
            closeListing();

            setTimeout(() => {
                openChat(chatId);
            }, 350);
        }

        function openChat(chatId) {
            const chat = state.chats[chatId];
            if (!chat) return;

            state.currentChatId = chatId;
            const chatView = document.getElementById('chat-view');
            const seller = sampleUsers.find(u => u.id === chat.userId);
            const sellerName = seller ? seller.name : 'Продавец';

            document.getElementById('chat-view-name').textContent = sellerName;
            const avatarSrc = seller?.avatar || generateAvatarURL(sellerName);
            document.getElementById('chat-view-avatar').src = avatarSrc;

            renderMessages(chat);

            chatView.classList.add('open');
            chatView.classList.remove('closing');
            document.body.style.overflow = 'hidden';

            // Scroll to bottom
            setTimeout(() => {
                const msgs = document.getElementById('chat-messages');
                msgs.scrollTop = msgs.scrollHeight;
            }, 100);
        }

        function renderMessages(chat) {
            const container = document.getElementById('chat-messages');
            container.innerHTML = chat.messages.map(msg => {
                if (msg.sender === 'system') {
                    return `<div style="text-align:center; color:var(--text-tertiary); font-size:12px; padding:8px;">${escapeHtml(msg.text)}</div>`;
                }
                const isSent = msg.sender === 'user';
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        ${escapeHtml(msg.text)}
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
            }).join('');
        }

        function closeChat() {
            const chatView = document.getElementById('chat-view');
            chatView.classList.add('closing');
            chatView.classList.remove('open');

            setTimeout(() => {
                document.body.style.overflow = '';
                state.currentChatId = null;
            }, 300);
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !state.currentChatId) return;

            const chat = state.chats[state.currentChatId];
            chat.messages.push({
                sender: 'user',
                text: text,
                time: getCurrentTime()
            });

            saveChats();
            renderMessages(chat);
            input.value = '';

            const msgs = document.getElementById('chat-messages');
            msgs.scrollTop = msgs.scrollHeight;

            // Simulate reply
            setTimeout(() => {
                const replies = [
                    'Спасибо за сообщение!',
                    'Хорошо, договорились!',
                    'Можете подъехать посмотреть?',
                    'Да, товар ещё в наличии.',
                    'Отправлю вам фото подробнее.',
                    'Цена ещё актуальна.',
                ];
                const reply = replies[Math.floor(Math.random() * replies.length)];
                chat.messages.push({
                    sender: 'seller',
                    text: reply,
                    time: getCurrentTime()
                });
                saveChats();
                if (state.currentChatId) {
                    renderMessages(chat);
                    msgs.scrollTop = msgs.scrollHeight;
                }
                renderChats();
                updateMessagesBadge();
            }, 1500);

            renderChats();
            updateMessagesBadge();
        }

            const list = document.getElementById('chat-list');
            const chatEntries = Object.values(state.chats);

            if (chatEntries.length === 0) {
                list.innerHTML = `

                    </div>

                const sellerName = seller ? seller.name : 'Продавец';
                const avatarSrc = seller?.avatar || generateAvatarURL(sellerName);
                const lastMsg = chat.messages[chat.messages.length - 1];
                const lastText = lastMsg ? (lastMsg.text.length > 40 ? lastMsg.text.substring(0, 40) + '...' : lastMsg.text) : '';
                const lastTime = lastMsg ? lastMsg.time : '';

        // ===== PROFILE =====
        function updateUserRating() {
            if (!state.currentUser?.ratings?.length) {
                state.currentUser.rating = 0;
            } else {
                const sum = state.currentUser.ratings.reduce((a, b) => a + b, 0);
                state.currentUser.rating = (sum / state.currentUser.ratings.length);
            }

            const ratingText = document.getElementById('profile-rating-text');
            ratingText.textContent = state.currentUser.rating.toFixed(1);

            renderStars('profile-stars', state.currentUser.rating);
        }

        function renderStars(containerId, rating, editable = false) {
            const container = document.getElementById(containerId);
            if (!container) return;

            let html = '';
            for (let i = 1; i <= 5; i++) {
                const filled = i <= Math.round(rating);
                const color = filled ? 'var(--star-filled)' : 'var(--star-empty)';
                if (editable) {
                    html += `<button class="rating-star-btn" data-value="${i}">
                        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" fill="${color}"/></svg>
                    </button>`;
                } else {
                    html += `<svg viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" fill="${color}"/></svg>`;
                }
            }
            container.innerHTML = html;
        }

            state.selectedRating = 0;
            renderStars('rating-stars-input', 0, true);
            modal.classList.add('open');

                    state.selectedRating = parseInt(star.dataset.value);
                    renderStars('rating-stars-input', state.selectedRating, true);
                });
            });

        function hideRatingModal() {
            document.getElementById('rating-modal').classList.remove('open');

        function confirmRating() {
            if (state.selectedRating > 0 && state.currentUser) {

                state.currentUser.ratings.push(state.selectedRating);
                localStorage.setItem('swapka-my-ratings', JSON.stringify(state.currentUser.ratings));
                updateUserRating();

            hideRatingModal();

            state.myListingImages = [];

            document.getElementById('listing-city-input').value = '';
            document.getElementById('listing-price-input').value = '';

        function updatePhotoUploadArea() {
            const area = document.getElementById('photo-upload-area');
            const addBtn = document.getElementById('photo-add-btn');

            // Remove existing thumbs (not the add button)
            area.querySelectorAll('.photo-thumb').forEach(t => t.remove());
            area.querySelectorAll('.photo-remove-btn').forEach(b => b.remove());

            // Add existing image thumbs
            state.myListingImages.forEach((img, idx) => {
                const thumb = document.createElement('img');
                thumb.className = 'photo-thumb';
                thumb.src = img;
                thumb.style.position = 'relative';
                area.insertBefore(thumb, addBtn);

                // Add remove button overlay
                const removeBtn = document.createElement('button');
                removeBtn.className = 'photo-remove-btn';
                removeBtn.style.cssText = `
                    position:absolute; top:-4px; right:-4px; width:20px; height:20px;
                    border-radius:50%; background:#ff3b30; border:none; color:white;
                    font-size:12px; cursor:pointer; display:flex; align-items:center;
                    justify-content:center; z-index:1;
                `;
                removeBtn.textContent = '×';
                removeBtn.style.position = 'relative';
                removeBtn.style.marginLeft = '-88px';
                removeBtn.style.marginTop = '-72px';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    state.myListingImages.splice(idx, 1);
                    updatePhotoUploadArea();
                };
                area.insertBefore(removeBtn, addBtn);
            });

            // Disable add button if max reached
            if (state.myListingImages.length >= 10) {
                addBtn.classList.add('disabled');
            } else {
                addBtn.classList.remove('disabled');
            }

            // Update submit button
            const title = document.getElementById('listing-title-input').value.trim();
            const city = document.getElementById('listing-city-input').value.trim();
            const price = document.getElementById('listing-price-input').value.trim();
            const hasPhotos = state.myListingImages.length >= 1;
            document.getElementById('listing-submit-btn').disabled = !(title && city && price && hasPhotos);
        }

        function addPhotos(files) {
            const remaining = 10 - state.myListingImages.length;
            const toAdd = Array.from(files).slice(0, remaining);

            toAdd.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.myListingImages.push(e.target.result);
                    updatePhotoUploadArea();
                };
                reader.readAsDataURL(file);
            });
        }

        function submitListing() {
            const title = document.getElementById('listing-title-input').value.trim();
            const city = document.getElementById('listing-city-input').value.trim();
            const price = parseInt(document.getElementById('listing-price-input').value);

            if (!title || !city || !price || state.myListingImages.length < 1) return;

            const newListing = {
                id: 'l_' + Date.now(),
                title: title,
                price: price,
                city: city,
                category: 'other',
                images: [...state.myListingImages],
                sellerId: 'current',
                description: '',
            };

            state.listings.unshift(newListing);
            saveListings();
            renderListings();
            closeCreateListing();
        }

        // ===== NAVIGATION =====
        function switchPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById('page-' + pageName).classList.add('active');
            document.querySelector(`.nav-item[data-page="${pageName}"]`).classList.add('active');

            if (pageName === 'messages') {
                renderChats();
            }
        }

        // ===== EVENT LISTENERS =====
        function setupEventListeners() {
            // Navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => switchPage(item.dataset.page));
            });

            // Search
            document.getElementById('search-input').addEventListener('input', (e) => {
                state.searchQuery = e.target.value;
                renderListings();
            });

            // Categories
            document.getElementById('categories-row').addEventListener('click', (e) => {
                if (e.target.classList.contains('category-chip')) {
                    document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                    e.target.classList.add('active');
                    state.activeCategory = e.target.dataset.category;
                    renderListings();
                }
            });

            // Detail page back button
            document.getElementById('detail-back-btn').addEventListener('click', closeListing);

            // Chat back button
            document.getElementById('chat-back-btn').addEventListener('click', closeChat);

            // Chat send
            document.getElementById('chat-send-btn').addEventListener('click', sendMessage);
            document.getElementById('chat-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // My listings
            document.getElementById('my-listings-btn').addEventListener('click', openMyListings);
            document.getElementById('my-listings-back').addEventListener('click', closeMyListings);

            // Create listing
            document.getElementById('create-listing-btn').addEventListener('click', openCreateListing);

            // Close modal on overlay click
            document.getElementById('create-listing-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeCreateListing();
            });

            // Photo upload
            document.getElementById('photo-add-btn').addEventListener('click', () => {
                document.getElementById('photo-input').click();
            });

            document.getElementById('photo-input').addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    addPhotos(e.target.files);
                }
                e.target.value = '';
            });

            // Form inputs validation
            ['listing-title-input', 'listing-city-input', 'listing-price-input'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePhotoUploadArea);
            });

            // Submit listing
            document.getElementById('listing-submit-btn').addEventListener('click', submitListing);

            // Theme toggle
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

            // Rating
            document.getElementById('rating-container').addEventListener('click', showRatingModal);
            document.getElementById('rating-confirm-btn').addEventListener('click', confirmRating);
            document.getElementById('rating-cancel-btn').addEventListener('click', hideRatingModal);
            document.getElementById('rating-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) hideRatingModal();
            });

            // Telegram back button
            if (tg) {
                tg.BackButton.onClick(() => {
                    const detailPage = document.getElementById('detail-page');
                    const chatView = document.getElementById('chat-view');
                    const myListingsPage = document.getElementById('my-listings-page');

                    if (detailPage.classList.contains('open')) {
                        closeListing();
                    } else if (chatView.classList.contains('open')) {
                        closeChat();
                    } else if (myListingsPage.classList.contains('open')) {
                        closeMyListings();
                    }
                });
            }
        }

        // ===== START APP =====
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
