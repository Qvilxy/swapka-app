  <input type="file" id="photoInput" accept="image/*" multiple style="display:none;" onchange="handlePhotoSelect(event)">

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    if (window.innerWidth > 430) {
      document.body.style.width = '430px';
    } else {
      document.body.style.width = '100%';
    }

    const user = tg.initDataUnsafe?.user;
    const currentUser = {
      id: user?.id || 'guest_' + Date.now(),
      firstName: user?.first_name || 'Гость',
      lastName: user?.last_name || '',
      username: user?.username || '',
      photoUrl: user?.photo_url || ''
    };

    const ADS_KEY = 'swapka_ads';
    const THEME_KEY = 'swapka_theme';
    const CHATS_KEY = 'swapka_chats';

    // --- NAVIGATION STACK LOGIC ---
    let navStack = []; 
    const mainTabs = ['home', 'messages', 'profile'];

    // Инициализация кнопки Назад Telegram
    tg.BackButton.onClick(() => {
      goBack();
    });

    function updateTelegramBackButton() {
      const currentScreen = getCurrentScreenId();
      if (!currentScreen || mainTabs.includes(currentScreen)) {
        tg.BackButton.hide();
      } else {
        tg.BackButton.show();
      }
    }

    function navigateTo(screenId, data = null) {
      const currentScreen = getCurrentScreenId();
      
      if (currentScreen) {
        navStack.push(currentScreen);
      }

      document.querySelectorAll('.page, .chat-screen, .detail-modal').forEach(el => {
        el.classList.remove('active');
      });

      let targetEl;
      if (screenId === 'home') targetEl = document.getElementById('pageHome');
      else if (screenId === 'messages') targetEl = document.getElementById('pageMessages');
      else if (screenId === 'profile') targetEl = document.getElementById('pageProfile');
      else if (screenId === 'chat') targetEl = document.getElementById('chatScreen');
      else if (screenId === 'detail') targetEl = document.getElementById('detailModal');

      if (targetEl) {
        targetEl.classList.add('active');
        
        if (navStack.length > 0) {
           navStack.pop(); 
        }
        navStack.push(screenId);
      }

      if (mainTabs.includes(screenId)) {
        document.getElementById('bottomNav').classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-tab="${screenId}"]`);
        if(activeNav) activeNav.classList.add('active');
        
        const index = mainTabs.indexOf(screenId);
        updateIndicatorPosition(index, false);
        indicatorPhysics.currentIndex = index;
      } else {
        document.getElementById('bottomNav').classList.add('hidden');
      }

      updateTelegramBackButton();

      if (screenId === 'messages') renderMessages();
      if (screenId === 'profile') renderMyAds();
      if (screenId === 'home') renderAds();
      
      const mainContent = document.getElementById('mainContent');
      if(mainContent) mainContent.scrollTop = 0;
    }

    function getCurrentScreenId() {
      const activePage = document.querySelector('.page.active');
      if (activePage) return activePage.dataset.screenId;
      
      const activeChat = document.querySelector('.chat-screen.active');
      if (activeChat) return activeChat.dataset.screenId;
      
      const activeDetail = document.querySelector('.detail-modal.active');
      if (activeDetail) return activeDetail.dataset.screenId;
      
      return null;
    }

    function goBack() {
      // Закрываем меню настроек если открыто
      closeSettingsMenu();

      if (navStack.length <= 1) {
        navigateTo('home');
        navStack = ['home'];
        return;
      }

      navStack.pop();
      const previousScreen = navStack[navStack.length - 1];
      
      document.querySelectorAll('.page, .chat-screen, .detail-modal').forEach(el => {
        el.classList.remove('active');
      });

      let targetEl;
      if (previousScreen === 'home') targetEl = document.getElementById('pageHome');
      else if (previousScreen === 'messages') targetEl = document.getElementById('pageMessages');
      else if (previousScreen === 'profile') targetEl = document.getElementById('pageProfile');
      else if (previousScreen === 'chat') targetEl = document.getElementById('chatScreen');
      else if (previousScreen === 'detail') targetEl = document.getElementById('detailModal');

      if (targetEl) targetEl.classList.add('active');

      if (mainTabs.includes(previousScreen)) {
        document.getElementById('bottomNav').classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-tab="${previousScreen}"]`);
        if(activeNav) activeNav.classList.add('active');
        const index = mainTabs.indexOf(previousScreen);
        updateIndicatorPosition(index, false);
        indicatorPhysics.currentIndex = index;
      } else {
        document.getElementById('bottomNav').classList.add('hidden');
      }

      updateTelegramBackButton();
      
      const mainContent = document.getElementById('mainContent');
      if(mainContent) mainContent.scrollTop = 0;
    }

    // --- END NAVIGATION STACK LOGIC ---


    function loadAds() {
      try { const data = localStorage.getItem(ADS_KEY); return data ? JSON.parse(data) : []; } catch (e) { return []; }
    }
    function saveAds(ads) {
      try { localStorage.setItem(ADS_KEY, JSON.stringify(ads)); } catch (e) {
        console.error("Storage error:", e);
        tg.showAlert("Ошибка памяти");
        throw e;
      }
    }
    function loadChats() {
      try { const data = localStorage.getItem(CHATS_KEY); return data ? JSON.parse(data) : []; } catch (e) { return []; }
    }
    function saveChats(chats) {
      try { localStorage.setItem(CHATS_KEY, JSON.stringify(chats)); } catch (e) {}
    }
    function loadTheme() { return localStorage.getItem(THEME_KEY); }
    function saveTheme(theme) { localStorage.setItem(THEME_KEY, theme); }

    function applyTheme(theme) {
      const body = document.body;
      const iconMoon = document.getElementById('iconMoon');
      const iconSun = document.getElementById('iconSun');
      if (theme === 'dark') {
        body.classList.add('dark-theme');
        if (iconMoon) iconMoon.style.display = 'none';
        if (iconSun) iconSun.style.display = 'block';
      } else {
        body.classList.remove('dark-theme');
        if (iconMoon) iconMoon.style.display = 'block';
        if (iconSun) iconSun.style.display = 'none';
      }
    }

    const savedTheme = loadTheme();
    if (savedTheme === 'dark' || savedTheme === 'light') {
      applyTheme(savedTheme);
    } else {
      applyTheme(tg.colorScheme === 'dark' ? 'dark' : 'light');
    }

    const themeBtn = document.getElementById('themeToggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', function() {
        const isDark = document.body.classList.contains('dark-theme');
        if (isDark) { applyTheme('light'); saveTheme('light'); }
        else { applyTheme('dark'); saveTheme('dark'); }
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      });
    }

    function setupProfile() {
      const avatarContainer = document.getElementById('profileAvatarContainer');
      if (currentUser.photoUrl) {
        avatarContainer.innerHTML = `<img src="${currentUser.photoUrl}" class="profile-avatar" alt="Avatar">`;
      } else {
        avatarContainer.innerHTML = `<div class="profile-avatar-placeholder">👤</div>`;
      }
      document.getElementById('profileName').textContent = currentUser.firstName + (currentUser.lastName ? ' ' + currentUser.lastName : '');
      document.getElementById('profileUsername').textContent = currentUser.username ? '@' + currentUser.username : '';
    }
    setupProfile();

    function setRandomSearchPlaceholder() {
      const searchInput = document.getElementById('searchInput');
      const rand = Math.random();
      if (rand < 0.1) searchInput.placeholder = 'Свиной навоз оптом';
      else if (rand < 0.55) searchInput.placeholder = 'Что ищем?';
      else searchInput.placeholder = 'Погнали за покупками!';
    }

    const navPill = document.getElementById('navPill');
    const navIndicator = document.getElementById('navIndicator');
    const navItems = document.querySelectorAll('.nav-item');
    let indicatorPhysics = { isDragging: false, currentTransformX: 0, touchOffsetX: 0, velocity: 0, lastX: 0, lastTime: 0, currentIndex: 0, cachedItemWidth: 0 };

    function initIndicatorPhysics() {
      indicatorPhysics.cachedItemWidth = navItems[0].offsetWidth;
      updateIndicatorPosition(0, false);
      window.addEventListener('resize', () => {
        indicatorPhysics.cachedItemWidth = navItems[0].offsetWidth;
        updateIndicatorPosition(indicatorPhysics.currentIndex, false);
      });
    }

    function updateIndicatorPosition(index, isDragging = false) {
      if (!indicatorPhysics.cachedItemWidth || indicatorPhysics.cachedItemWidth === 0) {
        const navItem = navItems[index] || navItems[0];
        if (navItem) {
          indicatorPhysics.cachedItemWidth = navItem.offsetWidth;
        }
      }
      
      if (indicatorPhysics.cachedItemWidth === 0) {
        const navItem = navItems[0];
        if (navItem) {
          indicatorPhysics.cachedItemWidth = navItem.offsetWidth;
        }
      }
      
      const targetX = index * indicatorPhysics.cachedItemWidth;
      indicatorPhysics.currentTransformX = targetX;
      indicatorPhysics.currentIndex = index;
      if (isDragging) return;
      navIndicator.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease';
      navIndicator.style.transform = `translate3d(${targetX}px, 0, 0) scale(1)`;
      navIndicator.style.width = `calc(33.33% - 8px)`;
      navIndicator.style.borderRadius = '24px';
    }

    function switchTab(tab, index) {
      navigateTo(tab);
    }

    navPill.addEventListener('touchstart', (e) => {
      indicatorPhysics.isDragging = true;
      indicatorPhysics.lastX = e.touches[0].clientX;
      indicatorPhysics.lastTime = Date.now();
      indicatorPhysics.velocity = 0;
      navItems.forEach((item, idx) => { if(item.classList.contains('active')) indicatorPhysics.currentIndex = idx; });
      indicatorPhysics.touchOffsetX = e.touches[0].clientX - indicatorPhysics.currentTransformX;
      navIndicator.style.transition = 'none';
    }, { passive: true });

    navPill.addEventListener('touchmove', (e) => {
      if (!indicatorPhysics.isDragging) return;
      const touchX = e.touches[0].clientX;
      const currentTime = Date.now();
      const dt = currentTime - indicatorPhysics.lastTime;
      if (dt > 10) { indicatorPhysics.velocity = (touchX - indicatorPhysics.lastX) / dt; indicatorPhysics.lastX = touchX; indicatorPhysics.lastTime = currentTime; }
      let newX = touchX - indicatorPhysics.touchOffsetX;
      const maxIndex = navItems.length - 1;
      const minX = 0;
      const maxX = maxIndex * indicatorPhysics.cachedItemWidth;
      const limit = indicatorPhysics.cachedItemWidth * 0.4;
      if (newX < minX - limit) newX = (minX - limit) + (newX - (minX - limit)) * 0.15;
      else if (newX > maxX + limit) newX = (maxX + limit) + (newX - (maxX + limit)) * 0.15;
      const diffFromCenter = Math.abs(newX - (indicatorPhysics.currentIndex * indicatorPhysics.cachedItemWidth));
      const stretch = Math.min(diffFromCenter / 100, 0.25);
      navIndicator.style.transform = `translate3d(${newX}px, 0, 0) scale(1.2)`;
      navIndicator.style.width = `calc(33.33% - 8px + ${stretch * 15}px)`;
      navIndicator.style.borderRadius = `${24 - stretch * 8}px`;
      indicatorPhysics.currentTransformX = newX;
    }, { passive: true });

    navPill.addEventListener('touchend', (e) => {
      if (!indicatorPhysics.isDragging) return;
      indicatorPhysics.isDragging = false;
      const momentum = indicatorPhysics.velocity * 15;
      let finalX = indicatorPhysics.currentTransformX + momentum;
      finalX = Math.max(0, Math.min(finalX, 2 * indicatorPhysics.cachedItemWidth));
      let targetIndex = Math.round(finalX / indicatorPhysics.cachedItemWidth);
      targetIndex = Math.max(0, Math.min(2, targetIndex));
      const newTab = navItems[targetIndex].getAttribute('data-tab');
      const currentTab = navItems[indicatorPhysics.currentIndex].getAttribute('data-tab');
      if (newTab !== currentTab) switchTab(newTab, targetIndex);
      else updateIndicatorPosition(indicatorPhysics.currentIndex, false);
      navIndicator.style.width = `calc(33.33% - 8px)`;
      navIndicator.style.borderRadius = '24px';
    });

    navItems.forEach((btn, index) => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const tab = this.getAttribute('data-tab');
        if (tab) switchTab(tab, index);
      });
    });

    setTimeout(() => { initIndicatorPhysics(); }, 100);

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderAds(filter = '') {
      const ads = loadAds();
      const grid = document.getElementById('adsGrid');
      const empty = document.getElementById('homeEmpty');
      grid.innerHTML = '';
      let filteredAds = ads;
      if (filter.trim()) {
        const q = filter.toLowerCase().trim();
        filteredAds = ads.filter(ad => ad.title.toLowerCase().includes(q));
      }
      if (filteredAds.length === 0) {
        empty.style.display = 'flex';
        if (filter.trim() && ads.length > 0) empty.querySelector('.empty-state-text').textContent = 'Ничего не найдено';
        else empty.querySelector('.empty-state-text').textContent = 'Пока нет объявлений';
      } else {
        empty.style.display = 'none';
        filteredAds.forEach(ad => grid.appendChild(createAdCard(ad)));
      }
    }

    function createAdCard(ad, isMyAd = false) {
      const card = document.createElement('div');
      card.className = 'ad-card';
      card.onclick = () => {
        window.currentAdData = ad;
        renderDetailModalContent(ad);
        navigateTo('detail');
      };
      
      const imgHtml = ad.photos && ad.photos.length > 0
        ? `<img class="ad-image" src="${ad.photos[0]}" alt="${escapeHtml(ad.title)}">`
        : `<div class="ad-image-placeholder">📷</div>`;
      let deleteBtn = '';
      if (isMyAd) {
        deleteBtn = `<button class="ad-delete-btn" onclick="deleteAd(event, '${ad.id}')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>`;
      }
      card.innerHTML = `${deleteBtn}<div class="ad-image-container">${imgHtml}</div><div class="ad-info"><div class="ad-title">${escapeHtml(ad.title)}</div><div class="ad-price">${escapeHtml(ad.price)}</div><div class="ad-city">📍 ${escapeHtml(ad.city)}</div></div>`;
      return card;
    }

    function deleteAd(event, adId) {
      event.stopPropagation();
      if (confirm('Удалить это объявление?')) {
        const ads = loadAds();
        saveAds(ads.filter(ad => ad.id !== adId));
        renderAds();
        renderMyAds();
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      }
    }

    function renderMyAds() {
      const ads = loadAds();
      const grid = document.getElementById('myAdsGrid');
      const empty = document.getElementById('myAdsEmpty');
      grid.innerHTML = '';
      const myAds = ads.filter(ad => ad.userId === currentUser.id);
      if (myAds.length === 0) { empty.style.display = 'flex'; }
      else { empty.style.display = 'none'; myAds.forEach(ad => grid.appendChild(createAdCard(ad, true))); }
    }

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function (e) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => renderAds(e.target.value), 200);
    });

    let selectedPhotos = [];
    const bottomNav = document.getElementById('bottomNav');
    function hideBottomNav() { bottomNav.classList.add('hidden'); }
    function showBottomNav() { bottomNav.classList.remove('hidden'); }

    function openCreateModal() {
      selectedPhotos = [];
      resetPhotoSlots();
      document.getElementById('adTitle').value = '';
      document.getElementById('adPrice').value = '';
      document.getElementById('adCity').value = '';
      document.getElementById('adDesc').value = '';
      updateDescCounter();
      document.getElementById('createModal').classList.add('active');
      hideBottomNav();
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }
    function closeCreateModal() {
      document.getElementById('createModal').classList.remove('active');
      showBottomNav();
    }
    document.getElementById('openCreateBtn').addEventListener('click', openCreateModal);

    // Логика счетчика описания
    const descInput = document.getElementById('adDesc');
    const descCounter = document.getElementById('descCounter');
    
    function updateDescCounter() {
      if(descInput && descCounter) {
        descCounter.textContent = descInput.value.length;
      }
    }
    
    if(descInput) {
      descInput.addEventListener('input', updateDescCounter);
    }

    function resetPhotoSlots() {
      for (let i = 0; i < 4; i++) {
        const slot = document.getElementById('photoSlot' + i);
        slot.innerHTML = '<span class="add-icon">+</span>';
        slot.style.display = 'flex';
        slot.onclick = () => addPhoto(i);
      }
    }
    function addPhoto(index) { document.getElementById('photoInput').dataset.index = index; document.getElementById('photoInput').click(); }
    
    function handlePhotoSelect(event) {
      const files = event.target.files;
      if (!files || files.length === 0) return;
      const remainingSlots = 4 - selectedPhotos.length;
      if (remainingSlots <= 0) {
        tg.showAlert('Максимум 4 фотографии');
        event.target.value = '';
        return;
      }
      const filesToProcess = Array.from(files).slice(0, remainingSlots);
      let processedCount = 0;
      filesToProcess.forEach(file => {
        compressImage(file, (compressedDataUrl) => {
          selectedPhotos.push(compressedDataUrl);
          processedCount++;
          const slotIndex = selectedPhotos.length - 1;
          updatePhotoSlot(slotIndex, compressedDataUrl);
          if (processedCount === filesToProcess.length) {
             event.target.value = '';
          }
        });
      });
    }

    function compressImage(file, callback) {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const MAX_WIDTH = 800;
          const MAX_HEIGHT = 800;
          let width = img.width;
          let height = img.height;
          if (width > height) {
            if (width > MAX_WIDTH) {
              height *= MAX_WIDTH / width;
              width = MAX_WIDTH;
            }
          } else {
            if (height > MAX_HEIGHT) {
              width *= MAX_HEIGHT / height;
              height = MAX_HEIGHT;
            }
          }
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          callback(dataUrl);
        }
      }
    }
    
    function updatePhotoSlot(index, dataUrl) {
      const slot = document.getElementById('photoSlot' + index);
      slot.innerHTML = `<img src="${dataUrl}" alt="Photo"><button class="remove-btn" onclick="removePhoto(event, ${index})">✕</button>`;
      slot.onclick = null;
    }
    function removePhoto(event, index) {
      event.stopPropagation();
      selectedPhotos.splice(index, 1);
      resetPhotoSlots();
      selectedPhotos.forEach((photo, i) => updatePhotoSlot(i, photo));
    }
    
    function createAd() {
      const title = document.getElementById('adTitle').value.trim();
      const price = document.getElementById('adPrice').value.trim();
      const city = document.getElementById('adCity').value.trim();
      const desc = document.getElementById('adDesc').value.trim();
      
      if (!title) { tg.showAlert('Введите название товара'); return; }
      if (!price) { tg.showAlert('Введите цену'); return; }
      if (!city) { tg.showAlert('Введите город'); return; }
      if (selectedPhotos.length === 0) { tg.showAlert('Добавьте хотя бы одну фотографию'); return; }
      
      const ads = loadAds();
      const newAd = {
        id: 'ad_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        userId: currentUser.id,
        userName: currentUser.firstName + (currentUser.lastName ? ' ' + currentUser.lastName : ''),
        userUsername: currentUser.username,
        userPhoto: currentUser.photoUrl,
        title, price, city,
        description: desc, // Сохраняем описание
        photos: selectedPhotos.slice(0, 4),
        createdAt: Date.now()
      };
      
      try {
        ads.unshift(newAd);
        saveAds(ads);
        selectedPhotos = [];
        resetPhotoSlots();
        document.getElementById('adTitle').value = '';
        document.getElementById('adPrice').value = '';
        document.getElementById('adCity').value = '';
        document.getElementById('adDesc').value = '';
        closeCreateModal();
        renderAds();
        renderMyAds();
        switchTab('home', 0);
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert('Объявление создано! ✅');
      } catch (e) {
        ads.shift();
        console.error(e);
      }
    }

    let currentCarouselIndex = 0;
    let currentAdForChat = null;

    function renderDetailModalContent(ad) {
      document.getElementById('detailTitle').textContent = ad.title;
      document.getElementById('detailPrice').textContent = ad.price;
      document.getElementById('detailCity').textContent = '📍 ' + ad.city;
      
      // Отображение описания
      const descEl = document.getElementById('detailDesc');
      if (ad.description && ad.description.trim() !== '') {
        descEl.textContent = ad.description;
        descEl.style.display = 'block';
      } else {
        descEl.style.display = 'none';
      }

      document.getElementById('detailSellerName').textContent = ad.userName || 'Продавец';
      if (ad.userPhoto) {
        document.getElementById('detailSellerAvatar').innerHTML = `<img src="${ad.userPhoto}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">`;
      } else {
        document.getElementById('detailSellerAvatar').innerHTML = '👤';
      }
      
      // Показываем шестеренку только если это мое объявление
      const settingsContainer = document.getElementById('detailSettingsContainer');
      if (ad.userId === currentUser.id) {
        settingsContainer.classList.add('visible');
      } else {
        settingsContainer.classList.remove('visible');
      }
      closeSettingsMenu(); // Сброс состояния меню

      const track = document.getElementById('carouselTrack');
      const dots = document.getElementById('carouselDots');
      track.innerHTML = '';
      dots.innerHTML = '';
      currentCarouselIndex = 0;
      ad.photos.forEach((photo, i) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.innerHTML = `<img src="${photo}" alt="Photo ${i + 1}">`;
        track.appendChild(slide);
        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goToSlide(i);
        dots.appendChild(dot);
      });
    }

    // --- SETTINGS GEAR LOGIC ---
    function toggleSettingsMenu() {
      const btn = document.getElementById('settingsGearBtn');
      btn.classList.toggle('active');
    }

    function closeSettingsMenu() {
      const btn = document.getElementById('settingsGearBtn');
      if(btn) btn.classList.remove('active');
    }

    function editCurrentAd() {
      tg.showAlert('Редактирование скоро будет доступно!');
      closeSettingsMenu();
    }

    function deleteCurrentAdFromDetail() {
      const ad = window.currentAdData;
      if (!ad) return;
      
      if (confirm('Удалить это объявление?')) {
        const ads = loadAds();
        saveAds(ads.filter(a => a.id !== ad.id));
        closeSettingsMenu();
        goBack(); // Возвращаемся назад
        renderAds();
        renderMyAds();
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      }
    }
    // --- END SETTINGS GEAR LOGIC ---

    function goToSlide(index) {
      const track = document.getElementById('carouselTrack');
      track.style.transform = `translateX(-${index * 100}%)`;
      currentCarouselIndex = index;
      document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === index));
    }

    function contactSeller() {
      const ad = window.currentAdData;
      if (!ad) return;
      
      currentAdForChat = ad;
      const chats = loadChats();
      
      // Ищем существующий чат
      let chat = chats.find(c => c.adId === ad.id && c.sellerId === ad.userId);
      
      if (!chat) {
        // Создаем новый чат, используя ТОЧНЫЕ данные из объявления
        chat = {
          id: 'chat_' + Date.now(),
          adId: ad.id, 
          adTitle: ad.title,
          sellerId: ad.userId, 
          sellerName: ad.userName || 'Пользователь', // Фоллбэк если имя пустое
          sellerPhoto: ad.userPhoto || '',           // Фото может быть пустым, это нормально
          sellerUsername: ad.userUsername || '',
          buyerId: currentUser.id,
          messages: [],
          createdAt: Date.now(),
          updatedAt: Date.now(),
          lastActive: Date.now()
        };
        chats.push(chat);
        saveChats(chats);
      } else {
        // ВАЖНОЕ ИСПРАВЛЕНИЕ:
        // Если чат уже есть, но в нем нет фото или имени (например, старые данные),
        // обновляем их данными из текущего просматриваемого объявления.
        if ((!chat.sellerPhoto && ad.userPhoto) || chat.sellerName !== ad.userName) {
             chat.sellerPhoto = ad.userPhoto || chat.sellerPhoto;
             chat.sellerName = ad.userName || chat.sellerName;
             chat.sellerUsername = ad.userUsername || chat.sellerUsername;
             saveChats(chats);
        }
      }
      
      openChat(chat);
    }

    function formatLastSeen(lastActiveTimestamp) {
      if (!lastActiveTimestamp) return 'Был(а) недавно';
      const now = Date.now();
      const diff = now - lastActiveTimestamp;
      if (diff < 5 * 60 * 1000) {
        return 'В сети';
      }
      const minutes = Math.floor(diff / (60 * 1000));
      const hours = Math.floor(diff / (60 * 60 * 1000));
      const days = Math.floor(diff / (24 * 60 * 60 * 1000));
      if (minutes < 60) {
        return `Был(а) ${minutes} мин. назад`;
      } else if (hours < 24) {
        return `Был(а) ${hours} ч. назад`;
      } else {
        return `Был(а) ${days} дн. назад`;
      }
    }

    function updateChatHeaderStatus(chat) {
      const statusEl = document.getElementById('chatHeaderStatus');
      const statusText = formatLastSeen(chat.lastActive);
      statusEl.textContent = statusText;
      if (statusText === 'В сети') {
        statusEl.classList.add('online');
      } else {
        statusEl.classList.remove('online');
      }
    }

    function openChat(chat) {
      const chatScreen = document.getElementById('chatScreen');
      document.getElementById('chatHeaderName').textContent = chat.sellerName;
      const avatarEl = document.getElementById('chatHeaderAvatar');
      if (chat.sellerPhoto) {
        avatarEl.innerHTML = `<img src="${chat.sellerPhoto}" alt="">`;
      } else {
        avatarEl.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#ddd;color:#555;font-size:16px;">👤</div>`;
      }
      chatScreen.dataset.chatId = chat.id;
      
      navigateTo('chat');
      
      updateChatHeaderStatus(chat);
      const chats = loadChats();
      const chatIdx = chats.findIndex(c => c.id === chat.id);
      if (chatIdx !== -1) {
        chats[chatIdx].unreadCount = 0;
        saveChats(chats);
        renderMessages();
      }
      renderChatMessages(chat);
      setTimeout(() => {
        const messagesContainer = document.getElementById('chatMessages');
        messagesContainer.scrollTop = 0;
      }, 100);
    }

    function renderStars(containerId, ratingValue) {
      const container = document.getElementById(containerId);
      if(!container) return;
      container.innerHTML = '';
      const maxStars = 3;
      const filledCount = 0; 

      for(let i=0; i<maxStars; i++) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        if(i < filledCount) svg.classList.add('filled');
        
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", "M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z");
        
        svg.appendChild(path);
        container.appendChild(svg);
      }
    }

    function renderChatMessages(chat) {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      
      if (chat.messages.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-text">Напишите свое первое сообщение</div></div>';
        return;
      }
      
      [...chat.messages].reverse().forEach(msg => {
        const isSent = msg.senderId === currentUser.id;
        const messageDiv = document.createElement('div');
        messageDiv.className = `chat-message ${isSent ? 'sent' : 'received'}`;
        
        let contentHtml = '';
        if (msg.image) {
          contentHtml += `<img src="${msg.image}" alt="Photo">`;
        }
        if (msg.text) {
          contentHtml += `<div>${escapeHtml(msg.text)}</div>`;
        }
        
        const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        messageDiv.innerHTML = `${contentHtml}<div class="chat-message-time">${time}</div>`;
        container.appendChild(messageDiv);
      });
    }

    let attachedChatPhoto = null;

    function handleChatPhotoSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      compressImage(file, (dataUrl) => {
        attachedChatPhoto = dataUrl;
        document.getElementById('attachedPhotoImg').src = dataUrl;
        document.getElementById('attachedPhotoPreview').classList.add('active');
        document.getElementById('chatInput').focus();
      });
      event.target.value = '';
    }

    function removeAttachedPhoto() {
      attachedChatPhoto = null;
      document.getElementById('attachedPhotoPreview').classList.remove('active');
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      
      if (!text && !attachedChatPhoto) return;
      
      const chatScreen = document.getElementById('chatScreen');
      const chatId = chatScreen.dataset.chatId;
      const chats = loadChats();
      const chat = chats.find(c => c.id === chatId);
      
      if (chat) {
        const newMessage = {
          id: 'msg_' + Date.now(),
          senderId: currentUser.id,
          text: text,
          image: attachedChatPhoto,
          timestamp: Date.now()
        };
        
        chat.messages.push(newMessage);
        chat.updatedAt = Date.now();
        chat.lastActive = Date.now();
        
        saveChats(chats);
        
        input.value = '';
        removeAttachedPhoto();
        
        renderChatMessages(chat);
        updateChatHeaderStatus(chat);
        
        setTimeout(() => {
          const messagesContainer = document.getElementById('chatMessages');
          messagesContainer.scrollTop = 0;
        }, 50);
        
        renderMessages();
      }
    }

    document.getElementById('chatInput')?.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    function initChatSwipe(item, chatId) {
      let startX = 0;
      let currentX = 0;
      let isSwiping = false;
      const deleteWidth = 120;
      
      item.addEventListener('touchstart', (e) => {
        document.querySelectorAll('.message-item').forEach(el => {
          if (el !== item) {
            el.style.transform = 'translateX(0)';
            const wrapper = el.closest('.message-item-wrapper');
            if(wrapper) {
                const bg = wrapper.querySelector('.message-delete-bg');
                const btn = wrapper.querySelector('.message-delete-btn');
                if(bg) bg.classList.remove('visible');
                if(btn) btn.classList.remove('visible');
            }
          }
        });

        startX = e.touches[0].clientX;
        currentX = startX;
        isSwiping = true;
        item.classList.add('swiping');
      }, { passive: true });
      
      item.addEventListener('touchmove', (e) => {
        if (!isSwiping) return;
        const touchX = e.touches[0].clientX;
        const diff = startX - touchX;
        if (diff > 0) {
          currentX = touchX;
          const translateX = Math.min(diff, deleteWidth);
          item.style.transform = `translateX(-${translateX}px)`;
        }
      }, { passive: true });
      
      item.addEventListener('touchend', (e) => {
        if (!isSwiping) return;
        isSwiping = false;
        item.classList.remove('swiping');
        
        const diff = startX - currentX;
        const wrapper = item.closest('.message-item-wrapper');
        const deleteBg = wrapper.querySelector('.message-delete-bg');
        const deleteBtn = wrapper.querySelector('.message-delete-btn');
        
        if (diff > deleteWidth / 2) {
          item.style.transform = `translateX(-${deleteWidth}px)`;
          if (deleteBg) deleteBg.classList.add('visible');
          if (deleteBtn) deleteBtn.classList.add('visible');
        } else {
          item.style.transform = 'translateX(0)';
          if (deleteBg) deleteBg.classList.remove('visible');
          if (deleteBtn) deleteBtn.classList.remove('visible');
        }
      });
    }

    function deleteChat(chatId) {
      if (confirm('Удалить этот чат?')) {
        const chats = loadChats();
        saveChats(chats.filter(c => c.id !== chatId));
        renderMessages();
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      }
    }

    function renderMessages() {
      const chats = loadChats();
      const container = document.getElementById('messagesList');
      const userChats = chats.filter(c => c.buyerId === currentUser.id);
      
      if (userChats.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-text">У вас пока нет чатов</div></div>`;
        return;
      }
      
      userChats.sort((a, b) => b.updatedAt - a.updatedAt);
      container.innerHTML = '';
      
      userChats.forEach(chat => {
        const lastMessage = chat.messages[chat.messages.length - 1];
        let preview = 'Нет сообщений';
        if (lastMessage) {
          if (lastMessage.image) preview = '📷 Фотография';
          else preview = lastMessage.text;
        }
        
        const wrapper = document.createElement('div');
        wrapper.className = 'message-item-wrapper';
        
        const deleteBg = document.createElement('div');
        deleteBg.className = 'message-delete-bg';
        deleteBg.innerHTML = `
          <svg viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
          <span>Удалить</span>
        `;
        
        const messageItem = document.createElement('div');
        messageItem.className = 'message-item';
        messageItem.onclick = function() {
          const style = window.getComputedStyle(this);
          const matrix = new WebKitCSSMatrix(style.transform);
          if (matrix.m41 !== 0) {
             this.style.transform = 'translateX(0)';
             const wrapper = this.closest('.message-item-wrapper');
             if(wrapper) {
                const bg = wrapper.querySelector('.message-delete-bg');
                const btn = wrapper.querySelector('.message-delete-btn');
                if(bg) bg.classList.remove('visible');
                if(btn) btn.classList.remove('visible');
             }
             return;
          }
          openChat(chat);
        };
        
        const avatarHtml = chat.sellerPhoto
          ? `<div class="message-avatar"><img src="${chat.sellerPhoto}" alt=""></div>`
          : '<div class="message-avatar">👤</div>';
        
        const unreadBadge = chat.unreadCount > 0 ? `<div class="unread-badge">${chat.unreadCount}</div>` : '';
        
        messageItem.innerHTML = `
          ${avatarHtml}
          <div class="message-content">
            <div class="message-name">${escapeHtml(chat.sellerName)}</div>
            <div class="message-preview">${escapeHtml(preview)}</div>
          </div>
          ${unreadBadge}
        `;
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'message-delete-btn';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          deleteChat(chat.id);
        };
        
        wrapper.appendChild(deleteBg);
        wrapper.appendChild(messageItem);
        wrapper.appendChild(deleteBtn);
        container.appendChild(wrapper);
        
        initChatSwipe(messageItem, chat.id);
      });
    }

    document.getElementById('createModal').addEventListener('click', function (e) {
      if (e.target === this) closeCreateModal();
    });

    let touchStartX = 0;
    let touchEndX = 0;
    document.getElementById('detailCarousel').addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    document.getElementById('detailCarousel').addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      const totalSlides = document.querySelectorAll('.carousel-slide').length;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && currentCarouselIndex < totalSlides - 1) goToSlide(currentCarouselIndex + 1);
        else if (diff < 0 && currentCarouselIndex > 0) goToSlide(currentCarouselIndex - 1);
      }
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        if (window.innerHeight - window.visualViewport.height > 150) {
           hideBottomNav();
        } else {
           if (!document.getElementById('createModal').classList.contains('active')) {
             showBottomNav();
           }
        }
      });
    }

    // Инициализация стека
    navStack = ['home'];
    updateTelegramBackButton();

    setRandomSearchPlaceholder();
    renderAds();
    renderMyAds();
  </script>
