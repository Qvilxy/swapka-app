<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flower Shop TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-color: #000000;
            --secondary-text: #8e8e93;
            --card-bg: #ffffff;
            --input-bg: #e3e3e8;
            --nav-bg: rgba(255, 255, 255, 0.85);
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --green-tile: #a8e6cf;
            --blue-accent: #007aff;
        }

        body.dark-mode {
            --bg-color: #000000;
            --text-color: #ffffff;
            --secondary-text: #98989d;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
            --nav-bg: rgba(28, 28, 30, 0.85);
            --shadow: 0 2px 8px rgba(0,0,0,0.2);
            --green-tile: #1c3a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* ГЛАВНОЕ ИЗМЕНЕНИЕ: Отступ 120px сверху */
        .app-container {
            padding-top: 120px; 
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* --- Headers --- */
        .page-header {
            padding: 0 16px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 { font-size: 28px; font-weight: 700; }
        .icon-btn { background: none; border: none; font-size: 22px; color: var(--text-color); cursor: pointer; }

        /* --- Tabs --- */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- TAB 1: GIFTS --- */
        .search-row { padding: 0 16px 12px; display: flex; gap: 12px; align-items: center; }
        .search-box { flex-grow: 1; position: relative; }
        .search-input { width: 100%; padding: 10px 10px 10px 38px; border-radius: 10px; border: none; background-color: var(--input-bg); color: var(--text-color); font-size: 16px; outline: none; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--secondary-text); font-size: 14px; }
        
        .cart-btn { background-color: var(--card-bg); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); border: none; color: var(--text-color); font-size: 18px; position: relative; }
        .cart-badge { position: absolute; top: -4px; right: -4px; background: #ff3b30; color: white; font-size: 10px; font-weight: bold; padding: 2px 5px; border-radius: 10px; display: none; }

        .filters-row { padding: 0 16px 16px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .filters-row::-webkit-scrollbar { display: none; }
        .filter-pill { background-color: var(--card-bg); color: var(--text-color); border: none; padding: 8px 14px; border-radius: 18px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow); white-space: nowrap; }

        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
        .product-card { background-color: var(--card-bg); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .tile-image { width: 100%; aspect-ratio: 1 / 1; background-color: var(--green-tile); display: flex; align-items: center; justify-content: center; }
        .tile-image.has-img { background-color: transparent; }
        .tile-image img { width: 100%; height: 100%; object-fit: cover; }
        .p-info { padding: 10px; }
        .p-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .p-price { font-size: 13px; color: var(--secondary-text); margin-bottom: 8px; }
        .add-btn { width: 100%; padding: 8px; background-color: var(--bg-color); color: var(--text-color); border: 1px solid var(--input-bg); border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }

        /* --- TAB 2: PROFILE --- */
        .profile-top { padding: 0 16px 10px; display: flex; align-items: center; justify-content: space-between; }
        .user-block { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 56px; height: 56px; border-radius: 50%; background-color: #ccc; object-fit: cover; }
        .u-name { font-size: 18px; font-weight: 600; }
        .u-tag { font-size: 14px; color: var(--secondary-text); }

        .info-card { background-color: var(--card-bg); margin: 0 16px 12px; border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
        .card-head { font-size: 12px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--secondary-text); text-transform: uppercase; letter-spacing: 0.5px; }
        .card-head i { color: var(--text-color); font-size: 14px; }

        /* Calendar Specifics */
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 600; font-size: 16px; cursor: pointer; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .d-name { font-size: 11px; color: var(--secondary-text); margin-bottom: 6px; }
        
        .d-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
        }

        /* Черный круг для сегодня */
        .d-cell.today {
            background-color: var(--text-color);
            color: var(--bg-color);
            font-weight: 600;
        }

        /* Красный круг для события */
        .d-cell.event {
            background-color: #ff3b30;
            color: white;
            font-weight: 600;
        }
        
        /* Если день и сегодня, и событие (приоритет у события или смешивание? Обычно событие важнее визуально, но сделаем красный) */
        .d-cell.today.event {
            background-color: #ff3b30;
            color: white;
        }

        .list-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--input-bg); font-size: 15px; }
        .list-row:last-child { border-bottom: none; }
        .row-label { color: var(--text-color); }
        .row-val { color: var(--secondary-text); }
        .row-action { color: var(--blue-accent); }

        /* --- TAB 3: COURIER --- */
        .order-card { background-color: var(--card-bg); margin: 0 16px 16px; border-radius: 14px; padding: 16px; box-shadow: var(--shadow); }
        .o-head { font-size: 16px; font-weight: 700; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--input-bg); }
        .o-scroll { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 4px; }
        .o-thumb { width: 70px; height: 70px; border-radius: 10px; background-color: var(--green-tile); flex-shrink: 0; }
        .o-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .o-detail { font-size: 14px; margin-bottom: 6px; line-height: 1.3; }
        .o-detail b { display: block; color: var(--text-color); margin-bottom: 2px; }
        .o-detail span { color: var(--secondary-text); }
        .o-phone { color: var(--blue-accent) !important; font-weight: 500; }

        /* --- BOTTOM NAV --- */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; background: var(--nav-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px; z-index: 100; border-top: 0.5px solid rgba(128,128,128, 0.1); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--secondary-text); font-size: 10px; font-weight: 500; width: 25%; cursor: pointer; }
        .nav-item i { font-size: 24px; margin-bottom: 2px; transition: transform 0.1s; }
        .nav-item:active i { transform: scale(0.9); }
        .nav-item.active { color: var(--blue-accent); }
        .nav-item.active i { font-weight: 900; }

        /* --- MODALS & SHEETS --- */
        .modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200; display: none; opacity: 0; transition: opacity 0.2s; }
        .modal-bg.open { display: block; opacity: 1; }

        .sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); border-radius: 16px 16px 0 0; padding: 20px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 201; max-height: 70vh; overflow-y: auto; }
        .sheet.open { transform: translateY(0); }
        .handle { width: 36px; height: 4px; background: var(--secondary-text); border-radius: 2px; margin: 0 auto 20px; opacity: 0.3; }

        /* Date Picker Widget Styles */
        .date-picker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .dp-item { padding: 12px; background: var(--input-bg); border-radius: 8px; text-align: center; font-weight: 500; cursor: pointer; }
        .dp-item.selected { background: var(--blue-accent); color: white; }
        
        .year-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
        .year-item { padding: 10px 20px; background: var(--input-bg); border-radius: 20px; white-space: nowrap; cursor: pointer; }
        .year-item.selected { background: var(--blue-accent); color: white; }

        /* Event Input Widget */
        .event-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--input-bg); background: var(--bg-color); color: var(--text-color); font-size: 16px; margin-bottom: 15px; outline: none; }
        .btn-full { width: 100%; padding: 14px; background: var(--blue-accent); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; margin-top: 5px; cursor: pointer; opacity: 1; transition: opacity 0.2s; }
        .btn-full:disabled { background: var(--input-bg); color: var(--secondary-text); cursor: not-allowed; opacity: 0.7; }
        
        .cat-btn { width: 100%; padding: 14px; text-align: left; background: none; border: none; border-bottom: 1px solid var(--input-bg); font-size: 16px; color: var(--text-color); }

    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- === TAB 1: GIFTS === -->
        <div id="tab-gifts" class="tab-content active">
            <header class="page-header">
                <h1>Цветы</h1>
            </header>

            <div class="search-row">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Поиск..." id="searchInput">
                </div>
                <button class="cart-btn" onclick="openCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartBadge">0</span>
                </button>
            </div>

            <div class="filters-row">
                <button class="filter-pill" onclick="openCategoryModal()">
                    Категория <i class="fas fa-chevron-down" style="font-size:10px;"></i>
                </button>
                <button class="filter-pill" onclick="openPriceModal()">
                    Цена <i class="fas fa-chevron-down" style="font-size:10px;"></i>
                </button>
            </div>

            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- === TAB 2: PROFILE === -->
        <div id="tab-profile" class="tab-content">
            <div class="profile-top">
                <div class="user-block">
                    <img src="https://via.placeholder.com/60" alt="" class="avatar" id="userAvatar">
                    <div>
                        <div class="u-name" id="userName">Name</div>
                        <div class="u-tag" id="userUsername">@username</div>
                    </div>
                </div>
                <button class="icon-btn" onclick="toggleTheme()">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>

            <div class="info-card">
                <div class="card-head"><i class="far fa-flag"></i> Важные даты</div>
                <!-- Клик по этому блоку открывает виджет выбора даты -->
                <div class="cal-nav" onclick="openDatePicker()">
                    <i class="fas fa-chevron-left" style="color:var(--secondary-text)"></i>
                    <span id="calendarTitle">Апрель 2026</span>
                    <i class="fas fa-chevron-right" style="color:var(--secondary-text)"></i>
                </div>
                <div class="cal-grid" id="calendarGrid"></div>
            </div>

            <div class="info-card">
                <div class="card-head"><i class="fas fa-map-marker-alt"></i> Адрес доставки</div>
                <div class="list-row">
                    <span class="row-label">Енисейская 33, кв 16</span>
                </div>
                <div class="list-row">
                    <span class="row-action">+ Добавить адрес</span>
                </div>
            </div>

            <div class="info-card">
                <div class="card-head"><i class="far fa-credit-card"></i> Оплата</div>
                <div class="list-row">
                    <span class="row-label">•••• 4242</span>
                    <span class="row-val">Visa</span>
                </div>
            </div>

            <div class="info-card">
                <div class="card-head"><i class="far fa-clock"></i> История заказов</div>
                <div class="list-row">
                    <span class="row-label">Нет активных заказов</span>
                    <span class="row-val" id="orderCountBadge">0</span>
                </div>
            </div>
        </div>

        <!-- === TAB 3: COURIER === -->
        <div id="tab-courier" class="tab-content">
            <header class="page-header">
                <h1>Заказы</h1>
            </header>
            <div id="courierOrdersList"></div>
        </div>

    </div>

    <!-- === NAVIGATION === -->
    <nav class="bottom-bar">
        <div class="nav-item active" onclick="switchTab('gifts', this)">
            <i class="fas fa-gift"></i>
            <span>Подарки</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="switchTab('courier', this)">
            <i class="fas fa-truck"></i>
            <span>Курьер</span>
        </div>
        <div class="nav-item" onclick="alert('Admin')">
            <i class="fas fa-crown" style="color: gold;"></i>
            <span>Админ</span>
        </div>
    </nav>

    <!-- === MODALS === -->
    <div class="modal-bg" id="modalOverlay" onclick="closeAllModals()"></div>
    
    <!-- Category Sheet -->
    <div class="sheet" id="catSheet">
        <div class="handle"></div>
        <button class="cat-btn" onclick="setCat('all')">Все</button>
        <button class="cat-btn" onclick="setCat('flowers')">Цветы</button>
        <button class="cat-btn" onclick="setCat('sweets')">Сладкое</button>
        <button class="cat-btn" onclick="setCat('toys')">Игрушки</button>
    </div>

    <!-- Price Sheet -->
    <div class="sheet" id="priceSheet">
        <div class="handle"></div>
        <h3 style="margin-bottom:15px;">Цена</h3>
        <input type="range" style="width:100%" oninput="document.getElementById('pVal').innerText=this.value+' ₽'">
        <div style="text-align:center; margin:10px 0;" id="pVal">5000 ₽</div>
        <div style="display:flex; gap:10px;">
            <input type="number" placeholder="От" style="width:50%; padding:10px; border-radius:8px; border:1px solid var(--input-bg); background:var(--bg-color); color:var(--text-color);">
            <input type="number" placeholder="До" style="width:50%; padding:10px; border-radius:8px; border:1px solid var(--input-bg); background:var(--bg-color); color:var(--text-color);">
        </div>
        <button class="btn-full" onclick="closeAllModals()">Готово</button>
    </div>

    <!-- Cart Sheet -->
    <div class="sheet" id="cartSheet">
        <div class="handle"></div>
        <h3 style="margin-bottom:15px;">Корзина</h3>
        <div id="cartItems"></div>
        <div style="text-align:right; font-size:18px; font-weight:bold; margin-top:15px;" id="cartTotal">0 ₽</div>
        <button class="btn-full" onclick="checkout()">Оформить</button>
    </div>

    <!-- Date Picker Sheet (New) -->
    <div class="sheet" id="datePickerSheet">
        <div class="handle"></div>
        <h3 style="margin-bottom:15px;">Выберите дату</h3>
        
        <div style="margin-bottom:10px; font-weight:600; font-size:14px; color:var(--secondary-text);">Месяц</div>
        <div class="date-picker-grid" id="monthGrid">
            <!-- Months injected via JS -->
        </div>

        <div style="margin-bottom:10px; font-weight:600; font-size:14px; color:var(--secondary-text);">Год</div>
        <div class="year-scroll" id="yearScroll">
            <!-- Years injected via JS -->
        </div>

        <button class="btn-full" onclick="applyDateSelection()">Применить</button>
    </div>

    <!-- Add Event Sheet (New) -->
    <div class="sheet" id="eventSheet">
        <div class="handle"></div>
        <h3 style="margin-bottom:15px;">Добавить событие</h3>
        <p style="margin-bottom:10px; color:var(--secondary-text);" id="eventDateLabel">Дата: ...</p>
        <input type="text" class="event-input" id="eventNameInput" placeholder="Название события (например, День рождения)" oninput="checkEventInput()">
        <button class="btn-full" id="saveEventBtn" disabled onclick="saveEvent()">Сохранить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Theme Init
        if (tg.colorScheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
        }

        // User Data
        const user = tg.initDataUnsafe.user || { first_name: "Name", username: "username" };
        document.getElementById('userName').innerText = user.first_name;
        document.getElementById('userUsername').innerText = user.username ? '@'+user.username : '';

        // --- CALENDAR LOGIC ---
        // Текущая дата по ТЗ: 17 Апреля 2026
        const MOCK_TODAY = new Date(2026, 3, 17); // Месяцы 0-11, 3 = Апрель
        
        let currentViewMonth = MOCK_TODAY.getMonth(); // 3 (Апрель)
        let currentViewYear = MOCK_TODAY.getFullYear(); // 2026
        
        // Хранилище событий: ключ "YYYY-M-D", значение "Текст"
        let events = {}; 
        
        // Временные переменные для выбора в виджете
        let tempSelectMonth = currentViewMonth;
        let tempSelectYear = currentViewYear;
        let selectedEventDay = null;

        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        function renderCalendar() {
            const g = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            
            title.innerText = `${monthNames[currentViewMonth]} ${currentViewYear}`;
            g.innerHTML = '';

            // Дни недели
            ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d => {
                g.innerHTML += `<div class="d-name">${d}</div>`;
            });

            const firstDayOfMonth = new Date(currentViewYear, currentViewMonth, 1).getDay(); // 0=Вс, 1=Пн
            // Корректировка, чтобы неделя начиналась с Понедельника (для RU локали)
            // getDay(): Вс=0, Пн=1... Сб=6. Нам нужно: Пн=0... Вс=6
            let startOffset = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;

            // Пустые ячейки до начала месяца
            for(let i=0; i<startOffset; i++) {
                g.innerHTML += `<div></div>`;
            }

            const daysInMonth = new Date(currentViewYear, currentViewMonth + 1, 0).getDate();

            for(let d=1; d<=daysInMonth; d++) {
                let cls = 'd-cell';
                
                // Проверка на сегодня (черный круг)
                if (d === MOCK_TODAY.getDate() && 
                    currentViewMonth === MOCK_TODAY.getMonth() && 
                    currentViewYear === MOCK_TODAY.getFullYear()) {
                    cls += ' today';
                }

                // Проверка на событие (красный круг)
                const eventKey = `${currentViewYear}-${currentViewMonth}-${d}`;
                if (events[eventKey]) {
                    cls += ' event';
                }

                // Клик по дате
                g.innerHTML += `<div class="${cls}" onclick="openEventModal(${d})">${d}</div>`;
            }
        }

        // --- DATE PICKER WIDGET ---
        function openDatePicker() {
            tempSelectMonth = currentViewMonth;
            tempSelectYear = currentViewYear;
            renderDatePickerUI();
            openModal('datePickerSheet');
        }

        function renderDatePickerUI() {
            // Рендер месяцев
            const mGrid = document.getElementById('monthGrid');
            mGrid.innerHTML = '';
            monthNames.forEach((m, index) => {
                const div = document.createElement('div');
                div.className = `dp-item ${index === tempSelectMonth ? 'selected' : ''}`;
                div.innerText = m;
                div.onclick = () => { tempSelectMonth = index; renderDatePickerUI(); };
                mGrid.appendChild(div);
            });

            // Рендер годов (2026-2030)
            const yScroll = document.getElementById('yearScroll');
            yScroll.innerHTML = '';
            for(let y=2026; y<=2030; y++) {
                const div = document.createElement('div');
                div.className = `year-item ${y === tempSelectYear ? 'selected' : ''}`;
                div.innerText = y;
                div.onclick = () => { tempSelectYear = y; renderDatePickerUI(); };
                yScroll.appendChild(div);
            }
        }

        function applyDateSelection() {
            currentViewMonth = tempSelectMonth;
            currentViewYear = tempSelectYear;
            renderCalendar();
            closeAllModals();
        }

        // --- EVENT WIDGET ---
        function openEventModal(day) {
            selectedEventDay = day;
            const dateStr = `${day} ${monthNames[currentViewMonth]} ${currentViewYear}`;
            document.getElementById('eventDateLabel').innerText = `Дата: ${dateStr}`;
            
            // Если событие уже есть, можно предзаполнить (опционально), но по ТЗ просто добавление
            // Очищаем поле
            const input = document.getElementById('eventNameInput');
            input.value = '';
            checkEventInput(); // Блокируем кнопку
            
            openModal('eventSheet');
            setTimeout(() => input.focus(), 300); // Фокус на поле
        }

        function checkEventInput() {
            const val = document.getElementById('eventNameInput').value.trim();
            const btn = document.getElementById('saveEventBtn');
            btn.disabled = val.length === 0;
        }

        function saveEvent() {
            const val = document.getElementById('eventNameInput').value.trim();
            if (!val) return;

            const key = `${currentViewYear}-${currentViewMonth}-${selectedEventDay}`;
            events[key] = val; // Сохраняем событие
            
            renderCalendar(); // Перерисовываем календарь (появится красный круг)
            closeAllModals();
            
            // Вибрация успеха
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }


        // --- PRODUCTS & CART (Standard Logic) ---
        const products = [
            { id: 1, title: "Букет роз", price: 3500, cat: "flowers", img: null },
            { id: 2, title: "Мишка", price: 1200, cat: "toys", img: null },
            { id: 3, title: "Шоколад", price: 800, cat: "sweets", img: null },
            { id: 4, title: "Тюльпаны", price: 2500, cat: "flowers", img: null },
            { id: 5, title: "Рафаэлло", price: 600, cat: "sweets", img: null },
            { id: 6, title: "Зайка", price: 1500, cat: "toys", img: null },
        ];

        let cart = [];
        let currentCat = 'all';

        function renderProducts(q = '') {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            products.filter(p => {
                return (currentCat === 'all' || p.cat === currentCat) && 
                       p.title.toLowerCase().includes(q.toLowerCase());
            }).forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-card';
                const imgHtml = p.img 
                    ? `<div class="tile-image has-img"><img src="${p.img}"></div>` 
                    : `<div class="tile-image"><i class="fas fa-image" style="opacity:0.3"></i></div>`;
                
                div.innerHTML = `
                    ${imgHtml}
                    <div class="p-info">
                        <div class="p-title">${p.title}</div>
                        <div class="p-price">${p.price} ₽</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">В корзину</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function renderOrders() {
            const c = document.getElementById('courierOrdersList');
            const orders = [
                { date: "25 марта 15:00", addr: "Ленина 1", phone: "+7900...", items: [1,2] },
                { date: "25 марта 18:30", addr: "Мира 10", phone: "+7999...", items: [3], expired: true }
            ];

            orders.forEach(o => {
                let thumbs = o.items.map(id => {
                    const p = products.find(x=>x.id===id);
                    return p.img 
                        ? `<div class="o-thumb"><img src="${p.img}"></div>` 
                        : `<div class="o-thumb"></div>`;
                }).join('');

                c.innerHTML += `
                    <div class="order-card" style="${o.expired?'opacity:0.5':''}">
                        <div class="o-head">Содержимое</div>
                        <div class="o-scroll">${thumbs}</div>
                        <div class="o-detail"><b>Адрес:</b> <span>${o.addr}</span></div>
                        <div class="o-detail"><b>Дата:</b> <span>${o.date}</span></div>
                        <div class="o-detail"><b>Телефон:</b> <span class="o-phone">${o.phone}</span></div>
                    </div>
                `;
            });
        }

        function switchTab(name, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+name).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            if(document.body.classList.contains('dark-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        document.getElementById('searchInput').addEventListener('input', e => renderProducts(e.target.value));

        // Modals Generic
        function openModal(id) {
            document.getElementById('modalOverlay').classList.add('open');
            document.getElementById(id).classList.add('open');
        }
        function closeAllModals() {
            document.getElementById('modalOverlay').classList.remove('open');
            document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
        }
        function openCategoryModal() { openModal('catSheet'); }
        function openPriceModal() { openModal('priceSheet'); }
        function setCat(c) { currentCat = c; renderProducts(); closeAllModals(); }

        // Cart
        function addToCart(id) {
            cart.push(products.find(p=>p.id===id));
            updateCart();
            if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }
        function updateCart() {
            document.getElementById('cartBadge').innerText = cart.length;
            document.getElementById('cartBadge').style.display = cart.length ? 'block' : 'none';
            
            const list = document.getElementById('cartItems');
            list.innerHTML = '';
            let sum = 0;
            cart.forEach((item, idx) => {
                sum += item.price;
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--input-bg);">
                        <span>${item.title}</span>
                        <span>${item.price} ₽ <i class="fas fa-times" style="color:red; margin-left:10px;" onclick="rmFromCart(${idx})"></i></span>
                    </div>
                `;
            });
            document.getElementById('cartTotal').innerText = sum + ' ₽';
            document.getElementById('orderCountBadge').innerText = cart.length;
        }
        function rmFromCart(idx) { cart.splice(idx,1); updateCart(); }
        function openCart() { openModal('cartSheet'); }
        function checkout() { alert('Заказ оформлен'); cart=[]; updateCart(); closeAllModals(); }

        // Init
        renderProducts();
        renderCalendar(); // Запуск календаря с датой 17.04.2026
        renderOrders();

    </script>
</body>
</html>
