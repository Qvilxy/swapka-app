<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swapka</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f2f2f7;
      --text-primary: #000000;
      --text-secondary: #8e8e93;
      --border-color: #e5e5ea;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --card-bg: #ffffff;
      --search-bg: #ffffff;
      --tab-bg: #ffffff;
      --tab-active: #e8e8e8;
      --modal-overlay: rgba(0,0,0,0.5);
      --chat-bg: #f0f0f0;
      --input-bg: #f2f2f7;
    }

    .dark-theme {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2c2c2e;
      --text-primary: #ffffff;
      --text-secondary: #8e8e93;
      --border-color: #3a3a3c;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --card-bg: #2c2c2e;
      --search-bg: #2c2c2e;
      --tab-bg: #1a1a1a;
      --tab-active: #3a3a3c;
      --modal-overlay: rgba(0,0,0,0.7);
      --chat-bg: #3a3a3c;
      --input-bg: #3a3a3c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      transition: background 0.3s, color 0.3s;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 100px;
      pointer-events: none;
    }

    .main-content {
      position: fixed;
      top: 100px;
      left: 0;
      right: 0;
      bottom: 70px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .page {
      display: none;
      min-height: 100%;
      padding-bottom: 20px;
    }

    .page.active {
      display: block;
    }

    .search-container {
      padding: 12px 16px;
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.3s;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--search-bg);
      border-radius: 100px;
      padding: 10px 14px;
      box-shadow: 0 3px 18px rgba(0,0,0,0.12);
      transition: box-shadow 0.2s, background 0.3s;
    }

    .search-bar:focus-within {
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }

    .search-icon {
      color: var(--text-secondary);
      font-size: 18px;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .search-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
      color: var(--text-primary);
      width: 100%;
      font-family: inherit;
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .ads-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px 16px;
    }

    .ad-card {
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, background 0.3s;
      cursor: pointer;
    }

    .ad-card:active {
      transform: scale(0.97);
    }

    .ad-image-container {
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      position: relative;
    }

    .ad-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--text-secondary);
    }

    .ad-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ad-info {
      padding: 10px;
    }

    .ad-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ad-price {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
      transform: translateY(-2px);
    }

    .ad-city {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .messages-list {
      padding: 8px 16px;
    }

    .message-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: var(--chat-bg);
      border-radius: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .message-item:active {
      opacity: 0.7;
    }

    .message-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-secondary);
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .message-content {
      flex: 1;
      min-width: 0;
    }

    .message-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .message-preview {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .message-badge {
      background: #ff3b30;
      color: white;
      font-size: 12px;
      font-weight: 700;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 16px;
      color: var(--text-secondary);
    }

    /* ===== PROFILE PAGE STYLES ===== */
    .profile-moon-wrapper {
      position: relative;
      height: 50px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 16px;
    }

    .moon-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      padding: 8px;
      transition: transform 0.3s;
      pointer-events: auto;
    }

    .moon-btn:active {
      transform: scale(0.85);
    }

    .profile-shifted-content {
      transform: translateY(-120px);
    }

    .profile-user-info {
      padding: 20px 16px;
      text-align: center;
      transform: translateY(60px);
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 12px;
      display: block;
      background: var(--bg-secondary);
    }

    .profile-avatar-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--bg-secondary);
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .profile-username {
      font-size: 15px;
      color: var(--text-secondary);
      margin-top: 4px;
      transform: translateY(-5px);
    }

    .profile-rating {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 8px;
      font-size: 18px;
      transform: translateY(-10px);
    }

    /* ===== ANIMATED GRADIENT BUTTON ===== */
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .create-ad-btn {
      display: block;
      margin: 0 auto 20px;
      padding: 14px 15px;
      width: fit-content;
      min-width: 200px;
      background: linear-gradient(270deg, #87CEEB, #B0E0E6, #9370DB, #BA55D3, #87CEEB);
      background-size: 400% 400%;
      animation: gradientShift 6s ease infinite;
      color: white;
      border: none;
      border-radius: 100px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, opacity 0.2s;
      transform: translateY(38px);
      box-shadow: 0 4px 20px rgba(135, 206, 235, 0.4);
    }

    .create-ad-btn:active {
      transform: translateY(38px) scale(0.97);
      opacity: 0.9;
    }

    .my-ads-title {
      font-size: 18px;
      font-weight: 700;
      padding: 0 16px 12px;
      color: var(--text-primary);
      transform: translateY(30px);
    }

    .my-ads-grid-wrapper {
      transform: translateY(30px);
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--tab-bg);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px 16px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 1000;
      /* Убран backdrop-filter, который мог блокировать события */
      transition: background 0.3s;
    }

    .nav-pill {
      display: flex;
      background: var(--card-bg);
      border-radius: 28px;
      padding: 4px;
      /* Тень со всех сторон по краям */
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 360px;
      pointer-events: auto; /* Гарантируем, что клики проходят */
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      background: transparent;
      gap: 2px;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto; /* Гарантируем кликабельность */
      touch-action: manipulation; /* Оптимизация для тач-устройств */
      -webkit-user-select: none;
      user-select: none;
    }

    .nav-item.active {
      background: var(--tab-active);
    }

    .nav-item.active .nav-icon {
      color: #4a9eff;
    }

    .nav-item.active .nav-label {
      color: #4a9eff;
      font-weight: 600;
    }

    .nav-icon {
      font-size: 22px;
      color: var(--text-secondary);
      transition: color 0.3s;
      pointer-events: none; /* Чтобы клик проходил на кнопку */
    }

    .nav-label {
      font-size: 11px;
      color: var(--text-secondary);
      transition: color 0.3s;
      pointer-events: none; /* Чтобы клик проходил на кнопку */
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--modal-overlay);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-primary);
      width: 100%;
      max-height: 92vh;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      overflow-y: auto;
      animation: slideUp 0.3s ease;
      transition: background 0.3s;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .modal-close {
      background: var(--bg-secondary);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 16px;
      color: var(--text-primary);
      background: var(--input-bg);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.3s;
    }

    .form-input:focus {
      border-color: #4a9eff;
    }

    .photos-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .photo-slot {
      aspect-ratio: 1;
      border: 2px dashed var(--border-color);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      background: var(--input-bg);
      transition: border-color 0.2s;
    }

    .photo-slot:hover {
      border-color: #4a9eff;
    }

    .photo-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-slot .add-icon {
      font-size: 28px;
      color: var(--text-secondary);
    }

    .photo-slot .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .submit-btn {
      width: auto;
      margin: 10px auto 0;
      display: block;
      padding: 16px 15px;
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 100px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s, opacity 0.2s;
    }

    .submit-btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== AD DETAIL MODAL ===== */
    .detail-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary);
      z-index: 200;
      display: none;
      overflow-y: auto;
    }

    .detail-modal.active {
      display: block;
    }

    .detail-header {
      position: sticky;
      top: 0;
      background: var(--bg-primary);
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      border-bottom: 1px solid var(--border-color);
    }

    .detail-back {
      background: var(--bg-secondary);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .image-carousel {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg-secondary);
    }

    .carousel-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.3s ease;
    }

    .carousel-slide {
      min-width: 100%;
      height: 100%;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .carousel-dots {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .carousel-dot.active {
      background: white;
    }

    .detail-info {
      padding: 20px 16px;
    }

    .detail-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .detail-price {
      font-size: 24px;
      font-weight: 800;
      color: #ff6b35;
      margin-bottom: 8px;
    }

    .detail-city {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .detail-seller {
      display: flex;
      align-items: center;
      padding: 14px;
      background: var(--bg-secondary);
      border-radius: 14px;
    }

    .detail-seller-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--border-color);
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .detail-seller-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .detail-contact-btn {
      width: 100%;
      padding: 16px;
      background: var(--btn-gradient);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 20px;
    }

    .main-content::-webkit-scrollbar {
      width: 0;
    }
  </style>
</head>
<body>

  <div class="header"></div>

  <div class="main-content" id="mainContent">

    <!-- HOME PAGE -->
    <div class="page active" id="pageHome">
      <div class="search-container">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="searchInput" placeholder="Поиск...">
        </div>
      </div>
      <div class="ads-grid" id="adsGrid"></div>
      <div class="empty-state" id="homeEmpty" style="display:none;">
        <div class="empty-state-icon">🏷️</div>
        <div class="empty-state-text">Пока нет объявлений</div>
      </div>
    </div>

    <!-- MESSAGES PAGE -->
    <div class="page" id="pageMessages">
      <div class="messages-list" id="messagesList">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div class="empty-state-text">У вас пока нет чатов</div>
        </div>
      </div>
    </div>

    <!-- PROFILE PAGE -->
    <div class="page" id="pageProfile">
      <div class="profile-moon-wrapper">
        <button class="moon-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>
      </div>
      
      <div class="profile-shifted-content">
        
        <div class="profile-user-info">
          <div id="profileAvatarContainer"></div>
          <div class="profile-name" id="profileName">Загрузка...</div>
          <div class="profile-username" id="profileUsername">@loading</div>
          <div class="profile-rating">
            <span>☆</span><span>☆</span><span>☆</span>
          </div>
        </div>

        <button class="create-ad-btn" onclick="openCreateModal()">Создать объявление</button>

        <div class="my-ads-title">Мои объявления</div>
        <div class="my-ads-grid-wrapper">
          <div class="ads-grid" id="myAdsGrid"></div>
          <div class="empty-state" id="myAdsEmpty">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">У вас пока нет объявлений</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-pill">
      <button class="nav-item active" data-tab="home" id="navHome">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Главная</span>
      </button>
      <button class="nav-item" data-tab="messages" id="navMessages">
        <span class="nav-icon">💬</span>
        <span class="nav-label">Сообщения</span>
      </button>
      <button class="nav-item" data-tab="profile" id="navProfile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Профиль</span>
      </button>
    </div>
  </div>

  <!-- CREATE AD MODAL -->
  <div class="modal-overlay" id="createModal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Новое объявление</span>
        <button class="modal-close" onclick="closeCreateModal()">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label">Фотографии (1–4)</label>
        <div class="photos-grid" id="photosGrid">
          <div class="photo-slot" onclick="addPhoto(0)" id="photoSlot0">
            <span class="add-icon">+</span>
          </div>
          <div class="photo-slot" onclick="addPhoto(1)" id="photoSlot1">
            <span class="add-icon">+</span>
          </div>
          <div class="photo-slot" onclick="addPhoto(2)" id="photoSlot2">
            <span class="add-icon">+</span>
          </div>
          <div class="photo-slot" onclick="addPhoto(3)" id="photoSlot3">
            <span class="add-icon">+</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Название товара</label>
        <input type="text" class="form-input" id="adTitle" placeholder="Введите название">
      </div>

      <div class="form-group">
        <label class="form-label">Цена</label>
        <input type="text" class="form-input" id="adPrice" placeholder="Введите цену">
      </div>

      <div class="form-group">
        <label class="form-label">Город</label>
        <input type="text" class="form-input" id="adCity" placeholder="Введите город">
      </div>

      <button class="submit-btn" id="submitAdBtn" onclick="createAd()">Создать</button>
    </div>
  </div>

  <!-- AD DETAIL MODAL -->
  <div class="detail-modal" id="detailModal">
    <div class="detail-header">
      <button class="detail-back" onclick="closeDetailModal()">←</button>
      <div style="width:30px;height:30px;"></div>
      <button class="detail-back" style="visibility:hidden">←</button>
    </div>
    <div class="image-carousel" id="detailCarousel">
      <div class="carousel-track" id="carouselTrack"></div>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>
    <div class="detail-info">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-price" id="detailPrice"></div>
      <div class="detail-city" id="detailCity"></div>
      <div class="detail-seller">
        <div class="detail-seller-avatar" id="detailSellerAvatar">👤</div>
        <div>
          <div class="detail-seller-name" id="detailSellerName"></div>
        </div>
      </div>
      <button class="detail-contact-btn" onclick="contactSeller()">Написать продавцу</button>
    </div>
  </div>

  <!-- HIDDEN FILE INPUT -->
  <input type="file" id="photoInput" accept="image/*" multiple style="display:none;" onchange="handlePhotoSelect(event)">

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const currentUser = {
      id: user?.id || 'guest_' + Date.now(),
      firstName: user?.first_name || 'Гость',
      lastName: user?.last_name || '',
      username: user?.username || '',
      photoUrl: user?.photo_url || ''
    };

    const ADS_KEY = 'swapka_ads';
    const THEME_KEY = 'swapka_theme';

    function loadAds() {
      try {
        const data = localStorage.getItem(ADS_KEY);
        return data ? JSON.parse(data) : [];
      } catch (e) {
        return [];
      }
    }

    function saveAds(ads) {
      try {
        localStorage.setItem(ADS_KEY, JSON.stringify(ads));
      } catch (e) {
        console.error('Failed to save ads:', e);
      }
    }

    function loadTheme() {
      return localStorage.getItem(THEME_KEY);
    }

    function saveTheme(theme) {
      localStorage.setItem(THEME_KEY, theme);
    }

    function applyTheme(theme) {
      const body = document.body;
      const btn = document.getElementById('themeToggle');
      
      if (theme === 'dark') {
        body.classList.add('dark-theme');
        if (btn) btn.textContent = '☀️';
      } else {
        body.classList.remove('dark-theme');
        if (btn) btn.textContent = '🌙';
      }
    }

    const savedTheme = loadTheme();
    if (savedTheme === 'dark' || savedTheme === 'light') {
      applyTheme(savedTheme);
    } else {
      applyTheme(tg.colorScheme === 'dark' ? 'dark' : 'light');
    }

    function toggleTheme() {
      const body = document.body;
      if (body.classList.contains('dark-theme')) {
        applyTheme('light');
        saveTheme('light');
      } else {
        applyTheme('dark');
        saveTheme('dark');
      }
    }

    function setupProfile() {
      const avatarContainer = document.getElementById('profileAvatarContainer');
      if (currentUser.photoUrl) {
        avatarContainer.innerHTML = `<img src="${currentUser.photoUrl}" class="profile-avatar" alt="Avatar">`;
      } else {
        avatarContainer.innerHTML = `<div class="profile-avatar-placeholder">👤</div>`;
      }

      document.getElementById('profileName').textContent =
        currentUser.firstName + (currentUser.lastName ? ' ' + currentUser.lastName : '');
      document.getElementById('profileUsername').textContent =
        currentUser.username ? '@' + currentUser.username : '';
    }

    setupProfile();

    // ===== ИСПРАВЛЕННАЯ НАВИГАЦИЯ =====
    function switchTab(tab) {
      // Скрываем все страницы
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      // Убираем активный класс со всех кнопок
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

      // Показываем нужную страницу
      switch (tab) {
        case 'home':
          document.getElementById('pageHome').classList.add('active');
          document.getElementById('navHome').classList.add('active');
          break;
        case 'messages':
          document.getElementById('pageMessages').classList.add('active');
          document.getElementById('navMessages').classList.add('active');
          break;
        case 'profile':
          document.getElementById('pageProfile').classList.add('active');
          document.getElementById('navProfile').classList.add('active');
          renderMyAds();
          break;
      }

      // Скроллим вверх
      document.getElementById('mainContent').scrollTop = 0;
    }

    // Навешиваем обработчики событий на кнопки навигации
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        const tab = this.getAttribute('data-tab');
        if (tab) {
          switchTab(tab);
          // Вибрация при переключении
          if (tg.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('light');
          }
        }
      });
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderAds(filter = '') {
      const ads = loadAds();
      const grid = document.getElementById('adsGrid');
      const empty = document.getElementById('homeEmpty');
      grid.innerHTML = '';

      let filteredAds = ads;
      if (filter.trim()) {
        const q = filter.toLowerCase().trim();
        filteredAds = ads.filter(ad => ad.title.toLowerCase().includes(q));
      }

      if (filteredAds.length === 0) {
        empty.style.display = 'flex';
        if (filter.trim() && ads.length > 0) {
          empty.querySelector('.empty-state-icon').textContent = '🔍';
          empty.querySelector('.empty-state-text').textContent = 'Ничего не найдено';
        } else {
          empty.querySelector('.empty-state-icon').textContent = '🏷️';
          empty.querySelector('.empty-state-text').textContent = 'Пока нет объявлений';
        }
      } else {
        empty.style.display = 'none';
        filteredAds.forEach(ad => {
          grid.appendChild(createAdCard(ad));
        });
      }
    }

    function createAdCard(ad) {
      const card = document.createElement('div');
      card.className = 'ad-card';
      card.onclick = () => openDetailModal(ad);

      const imgHtml = ad.photos && ad.photos.length > 0
        ? `<img class="ad-image" src="${ad.photos[0]}" alt="${escapeHtml(ad.title)}">`
        : `<div class="ad-image-placeholder">📷</div>`;

      card.innerHTML = `
        <div class="ad-image-container">${imgHtml}</div>
        <div class="ad-info">
          <div class="ad-title">${escapeHtml(ad.title)}</div>
          <div class="ad-price">${escapeHtml(ad.price)}</div>
          <div class="ad-city">📍 ${escapeHtml(ad.city)}</div>
        </div>
      `;

      return card;
    }

    function renderMyAds() {
      const ads = loadAds();
      const grid = document.getElementById('myAdsGrid');
      const empty = document.getElementById('myAdsEmpty');
      grid.innerHTML = '';

      const myAds = ads.filter(ad => ad.userId === currentUser.id);

      if (myAds.length === 0) {
        empty.style.display = 'flex';
      } else {
        empty.style.display = 'none';
        myAds.forEach(ad => {
          grid.appendChild(createAdCard(ad));
        });
      }
    }

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function (e) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        renderAds(e.target.value);
      }, 200);
    });

    let selectedPhotos = [];

    function openCreateModal() {
      selectedPhotos = [];
      resetPhotoSlots();
      document.getElementById('adTitle').value = '';
      document.getElementById('adPrice').value = '';
      document.getElementById('adCity').value = '';
      document.getElementById('createModal').classList.add('active');
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    function closeCreateModal() {
      document.getElementById('createModal').classList.remove('active');
    }

    function resetPhotoSlots() {
      for (let i = 0; i < 4; i++) {
        const slot = document.getElementById('photoSlot' + i);
        slot.innerHTML = '<span class="add-icon">+</span>';
        slot.style.display = 'flex';
        slot.onclick = () => addPhoto(i);
      }
    }

    function addPhoto(index) {
      document.getElementById('photoInput').dataset.index = index;
      document.getElementById('photoInput').click();
    }

    function handlePhotoSelect(event) {
      const files = event.target.files;
      if (!files || files.length === 0) return;

      const remainingSlots = 4 - selectedPhotos.length;
      const filesToProcess = Math.min(files.length, remainingSlots);

      for (let i = 0; i < filesToProcess; i++) {
        const file = files[i];
        const reader = new FileReader();
        reader.onload = function (e) {
          const dataUrl = e.target.result;
          const slotIndex = selectedPhotos.length;
          if (slotIndex >= 4) return;

          selectedPhotos.push(dataUrl);
          updatePhotoSlot(slotIndex, dataUrl);
        };
        reader.readAsDataURL(file);
      }

      event.target.value = '';
    }

    function updatePhotoSlot(index, dataUrl) {
      const slot = document.getElementById('photoSlot' + index);
      slot.innerHTML = `
        <img src="${dataUrl}" alt="Photo">
        <button class="remove-btn" onclick="removePhoto(event, ${index})">✕</button>
      `;
      slot.onclick = null;
    }

    function removePhoto(event, index) {
      event.stopPropagation();
      selectedPhotos.splice(index, 1);
      resetPhotoSlots();
      selectedPhotos.forEach((photo, i) => {
        updatePhotoSlot(i, photo);
      });
    }

    function createAd() {
      const title = document.getElementById('adTitle').value.trim();
      const price = document.getElementById('adPrice').value.trim();
      const city = document.getElementById('adCity').value.trim();

      if (!title) {
        tg.showAlert('Введите название товара');
        return;
      }
      if (!price) {
        tg.showAlert('Введите цену');
        return;
      }
      if (!city) {
        tg.showAlert('Введите город');
        return;
      }
      if (selectedPhotos.length === 0) {
        tg.showAlert('Добавьте хотя бы одну фотографию');
        return;
      }

      const ads = loadAds();
      const newAd = {
        id: 'ad_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        userId: currentUser.id,
        userName: currentUser.firstName,
        userUsername: currentUser.username,
        userPhoto: currentUser.photoUrl,
        title: title,
        price: price,
        city: city,
        photos: selectedPhotos.slice(0, 4),
        createdAt: Date.now()
      };

      ads.unshift(newAd);
      saveAds(ads);

      closeCreateModal();
      renderAds();
      renderMyAds();
      if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      tg.showAlert('Объявление создано! ✅');
    }

    let currentCarouselIndex = 0;

    function openDetailModal(ad) {
      const modal = document.getElementById('detailModal');
      document.getElementById('detailTitle').textContent = ad.title;
      document.getElementById('detailPrice').textContent = ad.price;
      document.getElementById('detailCity').textContent = '📍 ' + ad.city;
      document.getElementById('detailSellerName').textContent = ad.userName || 'Продавец';

      if (ad.userPhoto) {
        document.getElementById('detailSellerAvatar').innerHTML = `<img src="${ad.userPhoto}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">`;
      } else {
        document.getElementById('detailSellerAvatar').innerHTML = '👤';
      }

      const track = document.getElementById('carouselTrack');
      const dots = document.getElementById('carouselDots');
      track.innerHTML = '';
      dots.innerHTML = '';
      currentCarouselIndex = 0;

      ad.photos.forEach((photo, i) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.innerHTML = `<img src="${photo}" alt="Photo ${i + 1}">`;
        track.appendChild(slide);

        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goToSlide(i);
        dots.appendChild(dot);
      });

      modal.dataset.adId = ad.id;
      modal.classList.add('active');
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function goToSlide(index) {
      const track = document.getElementById('carouselTrack');
      track.style.transform = `translateX(-${index * 100}%)`;
      currentCarouselIndex = index;

      document.querySelectorAll('.carousel-dot').forEach((d, i) => {
        d.classList.toggle('active', i === index);
      });
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('active');
    }

    function contactSeller() {
      const modal = document.getElementById('detailModal');
      const adId = modal.dataset.adId;
      const ads = loadAds();
      const ad = ads.find(a => a.id === adId);
      if (ad && ad.userUsername) {
        tg.openTelegramLink(`https://t.me/${ad.userUsername}`);
      } else {
        tg.showAlert('Контакты продавца недоступны');
      }
    }

    document.getElementById('createModal').addEventListener('click', function (e) {
      if (e.target === this) closeCreateModal();
    });

    let touchStartX = 0;
    let touchEndX = 0;

    document.getElementById('detailCarousel').addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.getElementById('detailCarousel').addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      const totalSlides = document.querySelectorAll('.carousel-slide').length;

      if (Math.abs(diff) > 50) {
        if (diff > 0 && currentCarouselIndex < totalSlides - 1) {
          goToSlide(currentCarouselIndex + 1);
        } else if (diff < 0 && currentCarouselIndex > 0) {
          goToSlide(currentCarouselIndex - 1);
        }
      }
    }, { passive: true });

    renderAds();
    renderMyAds();
  </script>
</body>
</html>
