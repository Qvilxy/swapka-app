<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const currentUser = {
      id: user?.id || 'guest_' + Date.now(),
      firstName: user?.first_name || 'Гость',
      lastName: user?.last_name || '',
      username: user?.username || '',
      photoUrl: user?.photo_url || ''
    };

    const ADS_KEY = 'swapka_ads';
    const THEME_KEY = 'swapka_theme';

    function loadAds() { try { const d = localStorage.getItem(ADS_KEY); return d ? JSON.parse(d) : []; } catch (e) { return []; } }
    function saveAds(a) { try { localStorage.setItem(ADS_KEY, JSON.stringify(a)); } catch (e) {} }
    function loadTheme() { return localStorage.getItem(THEME_KEY); }
    function saveTheme(t) { localStorage.setItem(THEME_KEY, t); }

    function applyTheme(theme) {
      const body = document.body;
      const btn = document.getElementById('themeToggle');
      if (theme === 'dark') { body.classList.add('dark-theme'); if (btn) btn.textContent = '☀️'; }
      else { body.classList.remove('dark-theme'); if (btn) btn.textContent = '🌙'; }
    }

    const savedTheme = loadTheme();
    if (savedTheme === 'dark' || savedTheme === 'light') applyTheme(savedTheme);
    else applyTheme(tg.colorScheme === 'dark' ? 'dark' : 'light');

    document.getElementById('themeToggle').addEventListener('click', function() {
      const isDark = document.body.classList.contains('dark-theme');
      applyTheme(isDark ? 'light' : 'dark');
      saveTheme(isDark ? 'light' : 'dark');
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    });

    function setupProfile() {
      const ac = document.getElementById('profileAvatarContainer');
      if (currentUser.photoUrl) ac.innerHTML = `<img src="${currentUser.photoUrl}" class="profile-avatar" alt="Avatar">`;
      else ac.innerHTML = `<div class="profile-avatar-placeholder">👤</div>`;
      document.getElementById('profileName').textContent = currentUser.firstName + (currentUser.lastName ? ' ' + currentUser.lastName : '');
      document.getElementById('profileUsername').textContent = currentUser.username ? '@' + currentUser.username : '';
    }
    setupProfile();

    // ===== TAB NAVIGATION LOGIC (FIXED) =====
    const navPill = document.getElementById('navPill');
    const navIndicator = document.getElementById('navIndicator');
    const navItems = document.querySelectorAll('.nav-item');
    
    let currentIndex = 0;
    let isDragging = false;
    let startX = 0;
    let dragStartX = 0;
    let dragged = false; 

    // Physics variables
    let lastX = 0;
    let lastTime = 0;
    let velocity = 0;
    let accumulatedSquash = 0;
    let squashX = 1;
    let squashY = 1;
    let rotation = 0;

    // Helper to get exact pixel position relative to the pill container
    function getItemCenter(index) {
        const item = navItems[index];
        // Используем offsetLeft для более стабильного позиционирования внутри relative контейнера
        // Это быстрее и надежнее чем getBoundingClientRect при скролле/ресайзе
        return item.offsetLeft + (item.offsetWidth / 2);
    }

    function setTransform(x, sx, sy, r) {
      // Центрируем индикатор относительно центра элемента
      // Ширина индикатора примерно равна ширине элемента минус отступы, но мы использу
