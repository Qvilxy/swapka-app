<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flower Shop TMA</title>
    <!-- Подключение Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Иконки FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Светлая тема (по умолчанию) */
            --bg-color: #f5f5f7;
            --text-color: #000000;
            --secondary-text: #8e8e93;
            --card-bg: #ffffff;
            --accent-green: #34c759;
            --nav-bg: rgba(255, 255, 255, 0.7);
            --nav-border: rgba(0, 0, 0, 0.1);
            --input-bg: #e3e3e8;
            --modal-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --tile-placeholder: transparent; /* Прозрачные плитки по ТЗ */
        }

        body.dark-mode {
            /* Темная тема */
            --bg-color: #000000;
            --text-color: #ffffff;
            --secondary-text: #98989d;
            --card-bg: #1c1c1e;
            --nav-bg: rgba(28, 28, 30, 0.7);
            --nav-border: rgba(255, 255, 255, 0.1);
            --input-bg: #2c2c2e;
            --modal-bg: rgba(28, 28, 30, 0.95);
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            padding-bottom: 90px; /* Отступ под навбар */
            overflow-x: hidden;
        }

        /* --- Header & Common --- */
        .page-header {
            padding: 15px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-color); /* Чтобы контент не просвечивал при скролле */
            transition: background-color 0.3s;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-color);
            cursor: pointer;
            padding: 8px;
        }

        /* --- Tabs Logic --- */
        .tab-content {
            display: none;
            animation: fadeIn 0.2s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TAB 1: GIFTS --- */
        .search-container {
            padding: 0 16px 10px;
            display: flex;
            gap: 10px;
        }

        .search-wrapper {
            flex-grow: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            border-radius: 12px;
            border: none;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-text);
        }

        .cart-btn-header {
            background-color: var(--card-bg);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            position: relative;
        }
        
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            display: none;
        }

        .filters-row {
            padding: 0 16px 15px;
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 16px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Зеленые плитки становятся прозрачными, если нет фото -> делаем фон карточки прозрачным, но оставляем тень/рамку или просто пустое место? 
           По ТЗ: "Все зеленые плитки если там нет фото, то они становятся прозрачными". 
           Интерпретация: Если есть фото - показываем фото. Если нет - блок прозрачный (виден фон приложения). 
           Но чтобы карточка не исчезла совсем, оставим минимальную высоту или рамку, если нужно. 
           На скриншоте просто цветные блоки. Сделаем так: если нет картинки, фон блока = transparent. */
        
        .product-image-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #a8e6cf; /* Тот самый зеленый с фото */
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0,0,0,0.2);
            font-size: 24px;
        }
        
        .product-image-placeholder.has-photo {
            background-color: transparent;
        }
        
        .product-image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 10px;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 14px;
            color: var(--secondary-text);
        }

        .add-to-cart-btn {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* --- TAB 2: PROFILE --- */
        .profile-header-block {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #ccc;
            object-fit: cover;
        }

        .user-details h2 {
            font-size: 18px;
            margin-bottom: 2px;
        }

        .user-details p {
            font-size: 14px;
            color: var(--secondary-text);
        }

        .section-card {
            background-color: var(--card-bg);
            margin: 0 16px 12px;
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Calendar Styles */
        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .month-year-select {
            font-weight: 600;
            cursor: pointer;
            padding: 5px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day-name {
            font-size: 12px;
            color: var(--secondary-text);
            margin-bottom: 5px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .day-cell.today {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .day-cell.event {
            background-color: #ff3b30; /* Красный квадрат */
            color: white;
        }
        
        .day-cell.empty {
            pointer-events: none;
        }

        /* List Items in Profile */
        .list-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--nav-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .item-label {
            font-size: 14px;
        }
        .item-value {
            font-size: 14px;
            color: var(--secondary-text);
            text-align: right;
            max-width: 60%;
        }

        /* --- TAB 3: COURIER --- */
        .order-card {
            background-color: var(--card-bg);
            margin: 0 16px 16px;
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .order-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--nav-border);
            padding-bottom: 8px;
        }

        .order-products-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 12px;
            padding-bottom: 5px;
        }

        .order-product-thumb {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background-color: #a8e6cf; /* Зеленый плейсхолдер */
            flex-shrink: 0;
        }
        
        .order-product-thumb img {
             width: 100%;
             height: 100%;
             object-fit: cover;
             border-radius: 12px;
        }

        .order-details p {
            font-size: 14px;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .order-details strong {
            color: var(--text-color);
        }
        
        .order-details span {
            color: var(--secondary-text);
        }

        .expired {
            opacity: 0.6;
        }

        /* --- BOTTOM NAVIGATION (Liquid Glass) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--nav-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: 15px; /* Учет safe area на iPhone */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--secondary-text);
            font-size: 10px;
            gap: 4px;
            cursor: pointer;
            width: 25%;
            transition: color 0.2s;
        }

        .nav-item i {
            font-size: 22px;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #007aff; /* Стандартный синий iOS/Telegram */
        }
        
        .nav-item.admin-active {
             color: #ffcc00; /* Золотой для админа, если нужно, но в ТЗ не указано, оставим синим или стандартным */
        }

        /* --- MODALS / WIDGETS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.open {
            display: block;
            opacity: 1;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--modal-bg);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 2001;
            max-height: 60vh;
            overflow-y: auto;
        }

        .bottom-sheet.open {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 5px;
            background-color: var(--secondary-text);
            border-radius: 3px;
            margin: 0 auto 20px;
            opacity: 0.5;
        }

        .category-list button {
            width: 100%;
            padding: 15px;
            text-align: left;
            background: none;
            border: none;
            border-bottom: 1px solid var(--nav-border);
            font-size: 16px;
            color: var(--text-color);
        }

        .price-slider-container {
            padding: 10px 0;
        }
        
        .price-inputs {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .price-inputs input {
            width: 50%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--nav-border);
            background: var(--input-bg);
            color: var(--text-color);
        }

        /* Cart Modal Specifics */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--nav-border);
        }
        .cart-total {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: right;
        }
        .checkout-btn {
            width: 100%;
            padding: 15px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
        }

    </style>
</head>
<body>

    <!-- === TAB 1: GIFTS === -->
    <div id="tab-gifts" class="tab-content active">
        <header class="page-header">
            <h1>Цветы</h1>
        </header>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Поиск..." id="searchInput">
            </div>
            <button class="cart-btn-header" onclick="openCart()">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>

        <div class="filters-row">
            <button class="filter-btn" onclick="openCategoryModal()">
                Категория <i class="fas fa-chevron-down"></i>
            </button>
            <button class="filter-btn" onclick="openPriceModal()">
                Цена <i class="fas fa-chevron-down"></i>
            </button>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products will be injected here via JS -->
        </div>
    </div>

    <!-- === TAB 2: PROFILE === -->
    <div id="tab-profile" class="tab-content">
        <header class="page-header">
            <h1>Профиль</h1>
            <button class="icon-btn" onclick="toggleTheme()">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </header>

        <div class="profile-header-block">
            <div class="user-info">
                <img src="https://via.placeholder.com/60" alt="Avatar" class="avatar" id="userAvatar">
                <div class="user-details">
                    <h2 id="userName">Name</h2>
                    <p id="userUsername">@username</p>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title"><i class="far fa-flag"></i> Важные даты</div>
            <div class="calendar-controls">
                <i class="fas fa-chevron-left" style="color:var(--secondary-text)"></i>
                <div class="month-year-select" id="currentMonthYear">Март 2026</div>
                <i class="fas fa-chevron-right" style="color:var(--secondary-text)"></i>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- Calendar days injected via JS -->
            </div>
        </div>

        <div class="section-card">
            <div class="section-title"><i class="fas fa-map-marker-alt"></i> Адрес доставки</div>
            <div class="list-item">
                <span class="item-label">Енисейская 33, кв 16</span>
            </div>
            <div class="list-item" style="color: #007aff;">
                <span class="item-label">+ Добавить адрес</span>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title"><i class="far fa-credit-card"></i> Способы оплаты</div>
            <div class="list-item">
                <span class="item-label">•••• 4242</span>
                <span class="item-value">Visa</span>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">
                <i class="far fa-clock"></i> История заказов 
                <span style="margin-left:auto; color: var(--secondary-text);" id="orderCountBadge">0</span>
            </div>
            <div id="orderHistoryList">
                <!-- History items -->
            </div>
        </div>
    </div>

    <!-- === TAB 3: COURIER === -->
    <div id="tab-courier" class="tab-content">
        <header class="page-header">
            <h1>Заказы</h1>
        </header>

        <div id="courierOrdersList">
            <!-- Orders injected via JS -->
        </div>
    </div>

    <!-- === BOTTOM NAVIGATION === -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('gifts', this)">
            <i class="fas fa-gift"></i>
            <span>Подарки</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <i class="fas fa-user"></i>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="switchTab('courier', this)" id="navCourier">
            <i class="fas fa-truck"></i>
            <span>Курьер</span>
        </div>
        <div class="nav-item" onclick="alert('Админ панель в разработке')">
            <i class="fas fa-crown" style="color: gold;"></i>
            <span>Админ</span>
        </div>
    </nav>

    <!-- === MODALS === -->
    
    <!-- Category Modal -->
    <div class="modal-overlay" id="categoryOverlay" onclick="closeModals()"></div>
    <div class="bottom-sheet" id="categorySheet">
        <div class="sheet-handle"></div>
        <div class="category-list">
            <button onclick="filterByCategory('all')">Все</button>
            <button onclick="filterByCategory('flowers')">Цветы</button>
            <button onclick="filterByCategory('sweets')">Сладкое</button>
            <button onclick="filterByCategory('toys')">Игрушки</button>
        </div>
    </div>

    <!-- Price Modal -->
    <div class="modal-overlay" id="priceOverlay" onclick="closeModals()"></div>
    <div class="bottom-sheet" id="priceSheet">
        <div class="sheet-handle"></div>
        <h3>Фильтр по цене</h3>
        <div class="price-slider-container">
            <input type="range" min="0" max="10000" value="10000" style="width:100%" oninput="document.getElementById('priceMaxDisplay').innerText = this.value + ' ₽'">
            <div style="text-align:center; margin-top:5px;" id="priceMaxDisplay">10000 ₽</div>
        </div>
        <div class="price-inputs">
            <input type="number" placeholder="От">
            <input type="number" placeholder="До">
        </div>
        <button class="checkout-btn" style="margin-top:20px;" onclick="closeModals()">Применить</button>
    </div>

    <!-- Cart Modal -->
    <div class="modal-overlay" id="cartOverlay" onclick="closeCart()"></div>
    <div class="bottom-sheet" id="cartSheet">
        <div class="sheet-handle"></div>
        <h3>Корзина</h3>
        <div id="cartItemsContainer"></div>
        <div class="cart-total" id="cartTotal">Итого: 0 ₽</div>
        <button class="checkout-btn" onclick="checkout()">Оформить заказ</button>
    </div>

    <script>
        // --- INITIALIZATION & TELEGRAM SDK ---
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрыть на весь экран

        // Данные пользователя из Telegram
        const user = tg.initDataUnsafe.user || {
            first_name: "Name",
            username: "username",
            photo_url: "https://via.placeholder.com/60"
        };

        document.getElementById('userName').innerText = user.first_name;
        document.getElementById('userUsername').innerText = user.username ? '@' + user.username : '';
        if(user.photo_url) {
            document.getElementById('userAvatar').src = user.photo_url;
        }

        // Тема
        if (tg.colorScheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
        }

        // --- DATA MOCKS ---
        const products = [
            { id: 1, title: "Букет роз", price: 3500, category: "flowers", image: null }, // null = прозрачный/зеленый
            { id: 2, title: "Мишка Тедди", price: 1200, category: "toys", image: null },
            { id: 3, title: "Шоколад ручной работы", price: 800, category: "sweets", image: null },
            { id: 4, title: "Тюльпаны микс", price: 2500, category: "flowers", image: null },
            { id: 5, title: "Конфеты Рафаэлло", price: 600, category: "sweets", image: null },
            { id: 6, title: "Зайка плюшевая", price: 1500, category: "toys", image: null },
        ];

        let cart = [];
        let currentCategory = 'all';

        // --- RENDER FUNCTIONS ---

        function renderProducts(filterText = '') {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            const filtered = products.filter(p => {
                const matchesCategory = currentCategory === 'all' || p.category === currentCategory;
                const matchesSearch = p.title.toLowerCase().includes(filterText.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                // Логика отображения картинки/плейсхолдера
                let imageHtml = '';
                if (product.image) {
                    imageHtml = `<div class="product-image-placeholder has-photo"><img src="${product.image}" alt="${product.title}"></div>`;
                } else {
                    // Если нет фото, плитка прозрачная (фон body просвечивает), но можно добавить иконку для красоты
                    imageHtml = `<div class="product-image-placeholder"><i class="fas fa-image"></i></div>`;
                }

                card.innerHTML = `
                    ${imageHtml}
                    <div class="product-info">
                        <div class="product-title">${product.title}</div>
                        <div class="product-price">${product.price} ₽</div>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id})">В корзину</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const daysOfWeek = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            daysOfWeek.forEach(day => {
                const el = document.createElement('div');
                el.className = 'day-name';
                el.innerText = day;
                grid.appendChild(el);
            });

            // Симуляция марта 2026
            // 1 марта 2026 - Воскресенье. Значит первые 6 ячеек пустые (Пн-Сб)
            for(let i=0; i<6; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell empty';
                grid.appendChild(empty);
            }

            const today = 17; // По скриншоту сегодня 16, но в ТЗ время 2026 год. Пусть будет 17 как на часах? На скриншоте профиля выделено 16 черным.
            const eventDay = 25; // Красный квадрат

            for (let i = 1; i <= 31; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerText = i;
                
                if (i === 16) cell.classList.add('today'); // Черный квадрат
                if (i === 25) cell.classList.add('event'); // Красный квадрат
                
                grid.appendChild(cell);
            }
        }

        function renderCourierOrders() {
            const container = document.getElementById('courierOrdersList');
            container.innerHTML = '';

            // Моковые заказы
            const orders = [
                {
                    id: 101,
                    date: "25 марта 15:00",
                    address: "ул. Ленина 1, кв 5",
                    phone: "+79000000000",
                    items: [1, 2], // IDs товаров
                    expired: false
                },
                {
                    id: 102,
                    date: "25 марта 18:30",
                    address: "пр. Мира 10",
                    phone: "+79991112233",
                    items: [3],
                    expired: true // Просрочен для примера
                }
            ];

            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = `order-card ${order.expired ? 'expired' : ''}`;
                
                let itemsHtml = '';
                order.items.forEach(itemId => {
                    const prod = products.find(p => p.id === itemId);
                    if(prod) {
                         // Если есть фото - показываем, иначе зеленый квадрат
                         const bgStyle = prod.image ? `background-image: url(${prod.image}); background-size: cover;` : 'background-color: #a8e6cf;';
                         itemsHtml += `<div class="order-product-thumb" style="${bgStyle}"></div>`;
                    }
                });

                card.innerHTML = `
                    <div class="order-header">Содержимое</div>
                    <div class="order-products-scroll">
                        ${itemsHtml}
                    </div>
                    <div class="order-details">
                        <p><strong>Адрес доставки:</strong><br><span>${order.address}</span></p>
                        <p><strong>Дата и время:</strong><br><span>${order.date}</span></p>
                        <p><strong>Номер телефона клиента:</strong><br><span style="color:#007aff">${order.phone}</span></p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- LOGIC FUNCTIONS ---

        function switchTab(tabName, navElement) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Show target tab
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            // Update Nav Icons
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            navElement.classList.add('active');

            // Special logic for Courier tab visibility could be added here based on user role
            if(tabName === 'courier') {
                // В реальном приложении проверка роли
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('themeIcon');
            if(document.body.classList.contains('dark-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderProducts(e.target.value);
        });

        // Filters
        function openCategoryModal() {
            document.getElementById('categoryOverlay').classList.add('open');
            document.getElementById('categorySheet').classList.add('open');
        }

        function openPriceModal() {
            document.getElementById('priceOverlay').classList.add('open');
            document.getElementById('priceSheet').classList.add('open');
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('open'));
            document.querySelectorAll('.bottom-sheet').forEach(el => el.classList.remove('open'));
        }

        function filterByCategory(cat) {
            currentCategory = cat;
            renderProducts(document.getElementById('searchInput').value);
            closeModals();
        }

        // Cart Logic
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
            tg.HapticFeedback.selectionChanged();
        }

        function updateCartUI() {
            const badge = document.getElementById('cartBadge');
            badge.innerText = cart.length;
            badge.style.display = cart.length > 0 ? 'block' : 'none';

            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <span>${item.title}</span>
                    <span>${item.price} ₽ <i class="fas fa-trash" style="color:red; margin-left:10px;" onclick="removeFromCart(${index})"></i></span>
                `;
                container.appendChild(div);
            });

            document.getElementById('cartTotal').innerText = `Итого: ${total} ₽`;
            document.getElementById('orderCountBadge').innerText = cart.length; // Обновляем счетчик в профиле для демо
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function openCart() {
            document.getElementById('cartOverlay').classList.add('open');
            document.getElementById('cartSheet').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cartOverlay').classList.remove('open');
            document.getElementById('cartSheet').classList.remove('open');
        }

        function checkout() {
            if(cart.length === 0) return;
            alert('Заказ оформлен! (Демо)');
            cart = [];
            updateCartUI();
            closeCart();
            // Здесь можно отправить данные боту через tg.sendData
        }

        // --- STARTUP ---
        renderProducts();
        renderCalendar();
        renderCourierOrders();

    </script>
