<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAPKA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --secondary-bg: #f5f5f5;
            --button-color: #3390ec;
            --hint-color: #999999;
            --border-color: #e0e0e0;
            --tile-bg: transparent;
            --orange-btn: #ff9500;
        }

        [data-theme="dark"] {
            --bg-color: #1c1c1e;
            --text-color: #ffffff;
            --secondary-bg: #2c2c2e;
            --button-color: #3390ec;
            --hint-color: #8e8e93;
            --border-color: #38383a;
            --tile-bg: transparent;
            --orange-btn: #ff9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 80px;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--bg-color);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .close-btn {
            background: var(--secondary-bg);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .header-right {
            width: 80px;
            display: flex;
            justify-content: flex-end;
        }

        .search-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            padding: 10px 15px;
            background: var(--bg-color);
            z-index: 999;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            background: var(--secondary-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
        }

        .search-bar::placeholder {
            color: var(--hint-color);
        }

        .tab-content {
            display: none;
            padding-top: 110px;
            min-height: 100vh;
        }

        .tab-content.active {
            display: block;
        }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
        }

        .listing-card {
            background: var(--tile-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .listing-card:active {
            transform: scale(0.98);
        }

        .listing-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: var(--secondary-bg);
        }

        .listing-info {
            padding: 10px;
        }

        .listing-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .listing-city {
            font-size: 12px;
            color: var(--hint-color);
            margin-bottom: 5px;
        }

        .listing-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
        }

        .messages-list {
            padding: 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:active {
            background: var(--secondary-bg);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .chat-last-message {
            font-size: 14px;
            color: var(--hint-color);
        }

        .profile-header {
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .profile-name {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .profile-stats {
            color: var(--hint-color);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .theme-toggle {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }

        .profile-menu {
            padding: 0 20px;
        }

        .menu-item {
            padding: 15px;
            font-size: 18px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .create-ad-btn {
            width: calc(100% - 40px);
            margin: 20px;
            padding: 15px;
            background: var(--orange-btn);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: block;
        }

        .user-listings {
            padding: 0 10px;
        }

        .user-listings-title {
            padding: 15px 20px 10px;
            font-size: 20px;
            font-weight: 600;
        }

        .user-listing-item {
            position: relative;
            margin-bottom: 10px;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff3b30;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
        }

        .detail-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-color);
            z-index: 2000;
            overflow-y: auto;
            padding-bottom: 100px;
        }

        .detail-page.active {
            display: block;
        }

        .detail-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: var(--secondary-bg);
        }

        .detail-info {
            padding: 20px;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .detail-city {
            font-size: 16px;
            color: var(--hint-color);
            margin-bottom: 10px;
        }

        .detail-price {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .dealer-info {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            padding: 0 20px;
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
        }

        .btn-primary {
            flex: 1;
            padding: 15px;
            background: #34c759;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-secondary {
            flex: 1;
            padding: 15px;
            background: var(--button-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px;
            cursor: pointer;
            color: var(--hint-color);
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--button-color);
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .nav-label {
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 3000;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-color);
            width: 100%;
            max-height: 90vh;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--secondary-bg);
            color: var(--text-color);
            font-size: 16px;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
        }

        .photo-upload {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .photo-preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .photo-preview img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--orange-btn);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .chat-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-color);
            z-index: 2500;
            flex-direction: column;
        }

        .chat-view.active {
            display: flex;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 15px;
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
        }

        .message.sent {
            background: var(--button-color);
            color: white;
            margin-left: auto;
        }

        .message.received {
            background: var(--secondary-bg);
            color: var(--text-color);
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: var(--secondary-bg);
            color: var(--text-color);
            outline: none;
        }

        .send-btn {
            background: var(--button-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="header" id="mainHeader">
        <button class="close-btn" onclick="Telegram.WebApp.close()">✕ Закрыть</button>
        <div class="app-title">SWAPKA</div>
        <div class="header-right"></div>
    </div>

    <div class="header hidden" id="detailHeader">
        <button class="close-btn" onclick="closeDetail()">← Назад</button>
        <div class="app-title">SWAPKA</div>
        <div class="header-right"></div>
    </div>

    <div class="search-container" id="searchContainer">
        <input type="text" class="search-bar" id="searchInput" placeholder="Поиск..." oninput="searchListings()">
    </div>
