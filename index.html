<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Swapka</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f2f2f7;
      --text-primary: #000000;
      --text-secondary: #8e8e93;
      --border-color: #e5e5ea;
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --card-bg: #ffffff;
      --search-bg: #ffffff;
      --chat-pill-bg: #f9f9f9;
      --glass-bg: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      --indicator-bg: #d0d0d0;
      --indicator-glow: rgba(208, 208, 208, 0.5);
      --icon-inactive: #8e8e93;
      --icon-active: #007AFF;
      --chat-header-bg: rgba(249, 249, 249, 0.85);
    }

    .dark-theme {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2c2c2e;
      --text-primary: #ffffff;
      --text-secondary: #8e8e93;
      --border-color: #3a3a3c;
      --shadow: 0 4px 16px rgba(0,0,0,0.4);
      --card-bg: #2c2c2e;
      --search-bg: #2c2c2e;
      --chat-pill-bg: #3a3a3c;
      --glass-bg: rgba(30, 30, 30, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      --indicator-bg: #4a4a4a;
      --indicator-glow: rgba(74, 74, 74, 0.5);
      --icon-inactive: #8e8e93;
      --icon-active: #0A84FF;
      --chat-header-bg: rgba(44, 44, 46, 0.85);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      transition: background 0.3s, color 0.3s;
      user-select: none;
      -webkit-user-select: none;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 0 50px rgba(0,0,0,0.1);
    }

    @media (min-width: 431px) {
      body {
        border-left: 1px solid var(--border-color);
        border-right: 1px solid var(--border-color);
        background: var(--bg-primary);
      }
      html {
        background: #e5e5ea;
      }
      .dark-theme html {
        background: #1a0b2e; 
      }
    }

    /* --- СТИЛИ ДЛЯ ШАПКИ --- */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 122px;
      /* ИЗМЕНЕНИЕ: Новый градиент (Фиолетовый -> Белый/Голубой -> Темно-фиолетовый). Зеленого и яркого синего нет. */
      background: linear-gradient(-45deg, #8A2BE2, #FFFFFF, #87CEEB, #4B0082);
      background-size: 300% 300%;
      animation: gradientShift 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center; 
      pointer-events: none;
      overflow: hidden;
      max-width: 430px;
      margin: 0 auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .header-logo {
      width: 160px;
      height: auto;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
      z-index: 2;
      pointer-events: auto;
      margin-top: 63px;
    }
    /* ----------------------------- */

    .main-content {
      position: fixed;
      top: 122px;
      left: 0;
      right: 0;
      bottom: 90px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      will-change: scroll-position;
      max-width: 430px;
      margin: 0 auto;
    }

    .page {
      display: none;
      min-height: 100%;
      padding-bottom: 20px;
      opacity: 0;
      transform: translateY(10px);
      position: relative;
    }

    .page.active {
      display: block;
      animation: fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .search-container {
      padding: 12px 16px;
      background: var(--bg-primary);
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.3s;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--search-bg);
      border-radius: 100px;
      padding: 10px 14px;
      box-shadow: 0 3px 18px rgba(0,0,0,0.12);
      transition: box-shadow 0.2s, background 0.3s;
    }

    .search-bar:focus-within {
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }

    .search-icon {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .search-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--icon-inactive);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .search-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
      color: var(--text-primary);
      width: 100%;
      font-family: inherit;
    }

    .search-input::placeholder { color: #C8C8C8; }
    .dark-theme .search-input::placeholder { color: #6b6b6b; }

    .ads-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px 16px;
    }

    .ad-card {
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, background 0.3s;
      cursor: pointer;
      will-change: transform;
      position: relative;
    }

    .ad-card:active { transform: scale(0.97); }

    .ad-delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(255, 59, 48, 0.9);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .ad-delete-btn:active {
      transform: scale(0.9);
      background: rgba(255, 59, 48, 1);
    }

    .ad-delete-btn svg {
      width: 16px;
      height: 16px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ad-image-container {
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      position: relative;
    }

    .ad-image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--text-secondary);
    }

    .ad-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ad-info { padding: 10px; }

    .ad-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ad-price {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 2px;
      transform: translateY(-2px);
    }

    .ad-city {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .messages-list { padding: 16px; }
    
    .message-item-wrapper {
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
      border-radius: 100px;
    }
    
    .message-delete-bg {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 120px;
      background: rgba(255, 59, 48, 0.65);
      border-radius: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.3s;
      gap: 4px;
    }
    
    .message-delete-bg.visible {
      opacity: 1;
    }
    
    .message-delete-bg svg {
      width: 28px;
      height: 28px;
      stroke: white;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    .message-delete-bg span {
      font-size: 12px;
      color: white;
      font-weight: 600;
    }
    
    .message-delete-btn {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 120px;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 3;
      display: none;
    }
    
    .message-delete-btn.visible {
      display: block;
    }

    .message-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      padding-right: 20px;
      background: var(--chat-pill-bg);
      border-radius: 100px;
      cursor: pointer;
      transition: transform 0.2s ease-out, background 0.2s;
      position: relative;
      z-index: 2;
      touch-action: pan-y;
      box-shadow: none;
    }
    
    .message-item.swiping {
      transition: none;
    }
    
    .message-item:hover { background: var(--bg-secondary); }
    
    .message-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      margin-right: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--bg-secondary);
    }
    
    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .message-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .message-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .message-preview {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    
    .unread-badge {
      width: 24px;
      height: 24px;
      background: #FF3B30;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-left: 12px;
      line-height: 1;
    }

    .chat-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary);
      z-index: 150;
      display: none;
      flex-direction: column;
      max-width: 430px;
      margin: 0 auto;
    }
    .chat-modal.active { display: flex; }

    .chat-modal.active ~ .bottom-nav {
      display: none !important;
    }
    
    .chat-header-pill-container {
      position: absolute;
      top: 90px;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 0 10px;
      pointer-events: none;
    }

    .chat-back-btn {
      pointer-events: auto;
      background: rgba(120, 120, 128, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-right: 8px;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .chat-back-btn:active { transform: scale(0.9); }
    .chat-back-btn svg {
      width: 20px;
      height: 20px;
      stroke: var(--icon-active);
      stroke-width: 2.5;
      fill: none;
    }

    .chat-profile-pill {
      pointer-events: auto;
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--chat-header-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 100px;
      padding: 6px 12px 6px 6px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
      max-width: 85%;
    }
    .chat-profile-pill:active {
      transform: scale(0.98);
      background: var(--bg-secondary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .chat-pill-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-secondary);
      margin-right: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-pill-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-pill-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .chat-pill-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-pill-status {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .chat-pill-status.online {
      color: #34C759;
      font-weight: 500;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 50px 16px calc(20px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      background: var(--bg-primary);
      scroll-behavior: smooth;
    }

    .chat-message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
      position: relative;
      animation: messagePopIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes messagePopIn {
      from { opacity: 0; transform: scale(0.9) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .chat-message img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 4px;
      display: block;
    }

    .chat-message.received {
      background: var(--bg-secondary);
      color: var(--text-primary);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .chat-message.sent {
      background: #007AFF;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .chat-message-time {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
      text-align: right;
    }
    
    .chat-input-area {
      padding: 10px 16px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--bg-primary);
      border-top: none;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-add-photo-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--icon-active);
      transition: transform 0.1s;
    }
    .chat-add-photo-btn:active { transform: scale(0.9); }
    .chat-add-photo-btn svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .chat-input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .chat-input {
      width: 100%;
      padding: 10px 45px 10px 16px;
      border: 1px solid var(--border-color);
      border-radius: 24px;
      background: var(--bg-secondary);
      font-size: 16px;
      outline: none;
      color: var(--text-primary);
      transition: border-color 0.2s;
    }
    .chat-input:focus {
      border-color: var(--icon-active);
    }

    .chat-send-btn {
      position: absolute;
      right: 4px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .chat-send-btn:active { transform: scale(0.9); }
    .chat-send-btn svg {
      width: 16px;
      height: 16px;
      fill: white;
      margin-left: 2px;
    }
    
    .attached-photo-preview {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: var(--bg-primary);
      display: none;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
    }
    .attached-photo-preview.active { display: flex; }
    .attached-photo-thumb {
      height: 60px;
      border-radius: 8px;
      overflow: hidden;
    }
    .attached-photo-thumb img {
      height: 100%;
      width: auto;
    }
    .remove-attachment-btn {
      background: rgba(120, 120, 128, 0.12);
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .remove-attachment-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.5;
    }


    .empty-state {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      pointer-events: none;
    }
    
    #myAdsEmpty {
      transform: translateY(calc(-50% + 80px));
    }
    
    .empty-state-text {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .profile-moon-wrapper {
      position: relative; height: 50px; display: flex;
      justify-content: flex-end; align-items: center; padding: 0 16px; z-index: 10;
    }
    
    .moon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      transition: transform 0.3s;
      pointer-events: auto;
      z-index: 1001;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
    }
    
    .moon-btn svg {
      width: 24px;
      height: 24px;
      transition: transform 0.3s ease;
    }
    
    .moon-btn svg path,
    .moon-btn svg circle {
      fill: var(--text-primary);
    }
    
    .moon-btn svg line {
      stroke: var(--text-primary);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .moon-btn:active { transform: scale(0.85); }
    .moon-btn:active svg { transform: rotate(15deg); }

    .profile-shifted-content { transform: translateY(-120px); }
    .profile-user-info { padding: 20px 16px; text-align: center; transform: translateY(60px); }
    
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 12px;
      display: block; background: var(--bg-secondary);
    }
    .profile-avatar-placeholder {
      width: 80px; height: 80px; border-radius: 50%; background: var(--bg-secondary);
      margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 36px;
    }
    .profile-name { font-size: 22px; font-weight: 700; color: var(--text-primary); }
    .profile-username { font-size: 15px; color: var(--text-secondary); margin-top: 4px; transform: translateY(-5px); }
    .profile-rating { display: flex; justify-content: center; gap: 4px; margin-top: 8px; font-size: 18px; transform: translateY(-10px); }

    /* ИЗМЕНЕННЫЕ СТИЛИ КНОПКИ "СОЗДАТЬ ОБЪЯВЛЕНИЕ" */
    .create-ad-btn {
      display: block; margin: 0 auto 20px; padding: 14px 15px; width: fit-content; min-width: 200px;
      /* Статичный градиент: Голубой -> Бирюзовый -> Белый */
      background: linear-gradient(135deg, #87CEEB, #40E0D0, #FFFFFF);
      color: #000000; /* Темный текст для контраста на светлом фоне */
      border: none; border-radius: 100px; font-size: 17px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: transform 0.2s, opacity 0.2s;
      transform: translateY(38px); box-shadow: 0 4px 20px rgba(135, 206, 235, 0.4);
    }
    .create-ad-btn:active { transform: translateY(38px) scale(0.97); opacity: 0.9; }

    /* Стили для темной темы */
    .dark-theme .create-ad-btn {
      /* Фиолетовый -> Розовый */
      background: linear-gradient(135deg, #8A2BE2, #FF69B4);
      color: #ffffff; /* Белый текст для контраста */
      box-shadow: 0 4px 20px rgba(138, 43, 226, 0.4);
    }

    .my-ads-title { font-size: 18px; font-weight: 700; padding: 0 16px 12px; color: var(--text-primary); transform: translateY(30px); }
    .my-ads-grid-wrapper { transform: translateY(30px); }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: auto;
      z-index: 1000;
      display: flex;
      justify-content: center;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-top: 8px;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      will-change: transform;
      max-width: 430px;
      margin: 0 auto;
    }

    .bottom-nav.hidden { transform: translateY(150%); }

    .nav-pill {
      pointer-events: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 380px;
      height: 64px;
      
      background: var(--glass-bg);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      
      border-radius: 32px;
      padding: 0 8px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      border-radius: 24px;
      cursor: pointer;
      z-index: 2;
      position: relative;
      border: none;
      background: transparent;
      gap: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }

    .nav-item.active { background: transparent; box-shadow: none; }

    .nav-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    
    .nav-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--icon-inactive);
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .nav-item.active .nav-icon svg {
      stroke: var(--icon-active);
      transform: scale(1.1);
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 2;
      opacity: 0.8;
    }

    .nav-item.active .nav-label {
      color: var(--icon-active);
      font-weight: 700;
      opacity: 1;
    }

    .nav-indicator {
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 8px;
      width: calc(33.33% - 8px);
      
      background: var(--indicator-bg);
      border-radius: 24px;
      z-index: 1;
      
      will-change: transform, width, border-radius, scale;
      transform: translateZ(0) scale(1);
      transform-origin: center center;
      
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.3s ease;
      
      box-shadow: 0 4px 20px var(--indicator-glow);
      pointer-events: none;
      overflow: visible;
    }

    .nav-indicator::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 60%);
      opacity: 0.4;
      pointer-events: none;
    }

    .dark-theme .nav-indicator::after {
      background: transparent;
      opacity: 0;
    }

    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 200; display: none;
      align-items: flex-end; justify-content: center;
      backdrop-filter: blur(5px);
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg-primary); width: 100%; max-height: 92vh;
      border-radius: 20px 20px 0 0; padding: 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      overflow-y: auto; animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
    .modal-close {
      background: var(--bg-secondary); border: none; border-radius: 50%; width: 36px; height: 36px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
    }
    
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: block; }
    .form-input {
      width: 100%; padding: 12px 16px; border: 2px solid var(--border-color); border-radius: 12px;
      font-size: 16px; color: var(--text-primary); background: var(--bg-secondary); font-family: inherit; outline: none;
    }
    .photos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .photo-slot {
      aspect-ratio: 1; border: 2px dashed var(--border-color); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative; background: var(--bg-secondary);
    }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    .photo-slot .add-icon { font-size: 28px; color: var(--text-secondary); }
    .photo-slot .remove-btn {
      position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; border: none;
      border-radius: 50%; width: 22px; height: 22px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .submit-btn {
      width: auto; margin: 10px auto 0; display: block; padding: 16px 15px; background: #000000; color: #ffffff;
      border: none; border-radius: 100px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .detail-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary);
      z-index: 200; display: none; overflow-y: auto;
      max-width: 430px;
      margin: 0 auto;
    }
    .detail-modal.active { display: block; animation: fadeInDetail 0.3s ease; }
    
    @keyframes fadeInDetail {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .detail-header {
      position: sticky; top: 0; background: var(--bg-primary); padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top)); display: flex; justify-content: space-between; align-items: center; z-index: 10;
      border-bottom: 1px solid var(--border-color);
    }
    .detail-back {
      background: var(--bg-secondary); border: none; border-radius: 50%; width: 36px; height: 36px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
    }
    .detail-back svg {
      width: 18px;
      height: 18px;
      stroke: var(--text-secondary);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .image-carousel { width: 100%; aspect-ratio: 1; position: relative; overflow: hidden; background: var(--bg-secondary); }
    .carousel-track { display: flex; width: 100%; height: 100%; transition: transform 0.3s ease; }
    .carousel-slide { min-width: 100%; height: 100%; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
    .carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); border: none; cursor: pointer; padding: 0; }
    .carousel-dot.active { background: white; }
    .detail-info { padding: 20px 16px; }
    .detail-title { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .detail-price { font-size: 24px; font-weight: 800; color: #ff6b35; margin-bottom: 8px; }
    .detail-city { font-size: 15px; color: var(--text-secondary); margin-bottom: 20px; }
    .detail-seller { display: flex; align-items: center; padding: 14px; background: var(--bg-secondary); border-radius: 14px; margin-bottom: 16px; }
    .detail-seller-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--border-color); margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; }
    .detail-seller-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .detail-seller-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .detail-contact-btn {
      width: 100%; padding: 16px; background: linear-gradient(270deg, #87CEEB, #B0E0E6, #9370DB, #BA55D3, #87CEEB);
      background-size: 400% 400%; animation: gradientShift 6s ease infinite; color: white; border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 20px;
    }
    .main-content::-webkit-scrollbar { width: 0; }

    .other-profile-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary);
      z-index: 160; display: none; overflow-y: auto;
      max-width: 430px;
      margin: 0 auto;
    }
    .other-profile-modal.active { display: block; animation: slideUp 0.3s ease; }
    
    .other-profile-header {
      position: sticky; top: 0; background: var(--bg-primary); padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top)); display: flex; align-items: center; z-index: 10;
      border-bottom: 1px solid var(--border-color);
    }
    .other-profile-back {
      background: var(--bg-secondary); border: none; border-radius: 50%; width: 36px; height: 36px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
      margin-right: 12px;
    }
    .other-profile-back svg {
      width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none;
    }
    .other-profile-title {
      font-size: 18px; font-weight: 600; color: var(--text-primary);
    }
    
    .other-profile-content {
      padding: 20px 16px;
      text-align: center;
    }
    .other-profile-avatar {
      width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin: 0 auto 16px;
      display: block; background: var(--bg-secondary);
    }
    .other-profile-name { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .other-profile-username { font-size: 16px; color: var(--text-secondary); margin-bottom: 12px; }
    .other-profile-rating { display: flex; justify-content: center; gap: 4px; font-size: 20px; color: #FFD700; margin-bottom: 20px; }
    
    .other-profile-stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 16px 0;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 20px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .stat-label { font-size: 12px; color: var(--text-secondary); }

  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <!-- Логотип SWAPKA по центру -->
    <img src="logocherry.png" alt="Swapka Logo" class="header-logo">
  </div>

  <div class="main-content" id="mainContent">

    <!-- HOME PAGE -->
    <div class="page active" id="pageHome">
      <div class="search-container">
        <div class="search-bar">
          <div class="search-icon">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </div>
          <input type="text" class="search-input" id="searchInput" placeholder="Загрузка...">
        </div>
      </div>
      <div class="ads-grid" id="adsGrid"></div>
      <div class="empty-state" id="homeEmpty" style="display:none;">
        <div class="empty-state-text">Пока нет объявлений</div>
      </div>
    </div>

    <!-- MESSAGES PAGE -->
    <div class="page" id="pageMessages">
      <div class="messages-list" id="messagesList">
        <div class="empty-state">
          <div class="empty-state-text">У вас пока нет чатов</div>
        </div>
      </div>
    </div>

    <!-- PROFILE PAGE -->
    <div class="page" id="pageProfile">
      <div class="profile-moon-wrapper">
        <button class="moon-btn" id="themeToggle">
          <svg id="iconMoon" viewBox="0 0 24 24" style="display:block">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg id="iconSun" viewBox="0 0 24 24" style="display:none">
            <circle cx="12" cy="12" r="4"></circle>
            <line x1="12" y1="2" x2="12" y2="6"></line>
            <line x1="12" y1="18" x2="12" y2="22"></line>
            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
            <line x1="2" y1="12" x2="6" y2="12"></line>
            <line x1="18" y1="12" x2="22" y2="12"></line>
            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
            <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
          </svg>
        </button>
      </div>
      
      <div class="profile-shifted-content">
        <div class="profile-user-info">
          <div id="profileAvatarContainer"></div>
          <div class="profile-name" id="profileName">Загрузка...</div>
          <div class="profile-username" id="profileUsername">@loading</div>
          <div class="profile-rating">
            <span>☆</span><span>☆</span><span>☆</span>
          </div>
        </div>

        <button class="create-ad-btn" id="openCreateBtn">Создать объявление</button>

        <div class="my-ads-title">Мои объявления</div>
        <div class="my-ads-grid-wrapper">
          <div class="ads-grid" id="myAdsGrid"></div>
          <div class="empty-state" id="myAdsEmpty">
            <div class="empty-state-text">У вас пока нет объявлений</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAT MODAL -->
  <div class="chat-modal" id="chatModal">
    
    <div class="chat-header-pill-container">
      <button class="chat-back-btn" onclick="closeChat()">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      
      <div class="chat-profile-pill" onclick="openOtherProfile()">
        <div class="chat-pill-avatar" id="chatHeaderAvatar"></div>
        <div class="chat-pill-info">
          <div class="chat-pill-name" id="chatHeaderName">Имя</div>
          <div class="chat-pill-status" id="chatHeaderStatus">В сети</div>
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>
    
    <div class="attached-photo-preview" id="attachedPhotoPreview">
      <div class="attached-photo-thumb">
        <img id="attachedPhotoImg" src="" alt="">
      </div>
      <button class="remove-attachment-btn" onclick="removeAttachedPhoto()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <div class="chat-input-area">
      <button class="chat-add-photo-btn" onclick="document.getElementById('chatPhotoInput').click()">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <input type="file" id="chatPhotoInput" accept="image/*" style="display:none;" onchange="handleChatPhotoSelect(event)">
      
      <div class="chat-input-wrapper">
        <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение...">
        <button class="chat-send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО ПРОФИЛЯ СОБЕСЕДНИКА -->
  <div class="other-profile-modal" id="otherProfileModal">
    <div class="other-profile-header">
      <button class="other-profile-back" onclick="closeOtherProfile()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <div class="other-profile-title">Профиль</div>
    </div>
    <div class="other-profile-content">
      <img src="" alt="" class="other-profile-avatar" id="otherProfileAvatar">
      <div class="other-profile-name" id="otherProfileName">Имя</div>
      <div class="other-profile-username" id="otherProfileUsername">@username</div>
      <div class="other-profile-rating">
        <span>★</span><span>★</span><span>★</span><span>★</span><span>☆</span>
      </div>
      
      <div class="other-profile-stats">
        <div class="stat-item">
          <div class="stat-value" id="otherProfileAdsCount">0</div>
          <div class="stat-label">Объявлений</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">4.8</div>
          <div class="stat-label">Рейтинг</div>
        </div>
      </div>
      
      <p style="color:var(--text-secondary); font-size:14px; line-height:1.5;">
        Пользователь Swapka. Предпочитает безопасные сделки и быстрые ответы.
      </p>
    </div>
  </div>

  <!-- IOS 26 LIQUID GLASS BOTTOM NAV -->
  <div class="bottom-nav" id="bottomNav">
    <div class="nav-pill" id="navPill">
      <div class="nav-indicator" id="navIndicator"></div>

      <button class="nav-item active" data-tab="home" id="navHome">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </div>
        <span class="nav-label">Главная</span>
      </button>
      
      <button class="nav-item" data-tab="messages" id="navMessages">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <span class="nav-label">Сообщения</span>
      </button>
      
      <button class="nav-item" data-tab="profile" id="navProfile">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <span class="nav-label">Профиль</span>
      </button>
    </div>
  </div>

  <!-- CREATE AD MODAL -->
  <div class="modal-overlay" id="createModal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title">Новое объявление</span>
        <button class="modal-close" onclick="closeCreateModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" style="stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="form-group">
        <label class="form-label">Фотографии (1–4)</label>
        <div class="photos-grid" id="photosGrid">
          <div class="photo-slot" onclick="addPhoto(0)" id="photoSlot0"><span class="add-icon">+</span></div>
          <div class="photo-slot" onclick="addPhoto(1)" id="photoSlot1"><span class="add-icon">+</span></div>
          <div class="photo-slot" onclick="addPhoto(2)" id="photoSlot2"><span class="add-icon">+</span></div>
          <div class="photo-slot" onclick="addPhoto(3)" id="photoSlot3"><span class="add-icon">+</span></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Название товара</label>
        <input type="text" class="form-input" id="adTitle" placeholder="Введите название">
      </div>

      <div class="form-group">
        <label class="form-label">Цена</label>
        <input type="text" class="form-input" id="adPrice" placeholder="Введите цену">
      </div>

      <div class="form-group">
        <label class="form-label">Город</label>
        <input type="text" class="form-input" id="adCity" placeholder="Введите город">
      </div>

      <button class="submit-btn" id="submitAdBtn" onclick="createAd()">Создать</button>
    </div>
  </div>

  <!-- AD DETAIL MODAL -->
  <div class="detail-modal" id="detailModal">
    <div class="detail-header">
      <button class="detail-back" onclick="closeDetailModal()">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div style="width:30px;height:30px;"></div>
      <button class="detail-back" style="visibility:hidden">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
    </div>
    <div class="image-carousel" id="detailCarousel">
      <div class="carousel-track" id="carouselTrack"></div>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>
    <div class="detail-info">
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-price" id="detailPrice"></div>
      <div class="detail-city" id="detailCity"></div>
      <div class="detail-seller">
        <div class="detail-seller-avatar" id="detailSellerAvatar">👤</div>
        <div>
          <div class="detail-seller-name" id="detailSellerName"></div>
        </div>
      </div>
      <button class="detail-contact-btn" onclick="contactSeller()">Написать продавцу</button>
    </div>
  </div>

  <input type="file" id="photoInput" accept="image/*" multiple style="display:none;" onchange="handlePhotoSelect(event)">

  <script>
    // Marquee logic removed as requested
    
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    if (window.innerWidth > 430) {
      document.body.style.width = '430px';
    } else {
      document.body.style.width = '100%';
    }

    const user = tg.initDataUnsafe?.user;
    const currentUser = {
      id: user?.id || 'guest_' + Date.now(),
      firstName: user?.first_name || 'Гость',
      lastName: user?.last_name || '',
      username: user?.username || '',
      photoUrl: user?.photo_url || ''
    };

    const ADS_KEY = 'swapka_ads';
    const THEME_KEY = 'swapka_theme';
    const CHATS_KEY = 'swapka_chats';

    function loadAds() {
      try { const data = localStorage.getItem(ADS_KEY); return data ? JSON.parse(data) : []; } catch (e) { return []; }
    }
    function saveAds(ads) {
      try { localStorage.setItem(ADS_KEY, JSON.stringify(ads)); } catch (e) {
        console.error("Storage error:", e);
        tg.showAlert("Ошибка памяти");
        throw e;
      }
    }
    function loadChats() {
      try { const data = localStorage.getItem(CHATS_KEY); return data ? JSON.parse(data) : []; } catch (e) { return []; }
    }
    function saveChats(chats) {
      try { localStorage.setItem(CHATS_KEY, JSON.stringify(chats)); } catch (e) {}
    }
    function loadTheme() { return localStorage.getItem(THEME_KEY); }
    function saveTheme(theme) { localStorage.setItem(THEME_KEY, theme); }

    function applyTheme(theme) {
      const body = document.body;
      const iconMoon = document.getElementById('iconMoon');
      const iconSun = document.getElementById('iconSun');
      if (theme === 'dark') {
        body.classList.add('dark-theme');
        if (iconMoon) iconMoon.style.display = 'none';
        if (iconSun) iconSun.style.display = 'block';
      } else {
        body.classList.remove('dark-theme');
        if (iconMoon) iconMoon.style.display = 'block';
        if (iconSun) iconSun.style.display = 'none';
      }
    }

    const savedTheme = loadTheme();
    if (savedTheme === 'dark' || savedTheme === 'light') {
      applyTheme(savedTheme);
    } else {
      applyTheme(tg.colorScheme === 'dark' ? 'dark' : 'light');
    }

    const themeBtn = document.getElementById('themeToggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', function() {
        const isDark = document.body.classList.contains('dark-theme');
        if (isDark) { applyTheme('light'); saveTheme('light'); }
        else { applyTheme('dark'); saveTheme('dark'); }
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      });
    }

    function setupProfile() {
      const avatarContainer = document.getElementById('profileAvatarContainer');
      if (currentUser.photoUrl) {
        avatarContainer.innerHTML = `<img src="${currentUser.photoUrl}" class="profile-avatar" alt="Avatar">`;
      } else {
        avatarContainer.innerHTML = `<div class="profile-avatar-placeholder">👤</div>`;
      }
      document.getElementById('profileName').textContent = currentUser.firstName + (currentUser.lastName ? ' ' + currentUser.lastName : '');
      document.getElementById('profileUsername').textContent = currentUser.username ? '@' + currentUser.username : '';
    }
    setupProfile();

    function setRandomSearchPlaceholder() {
      const searchInput = document.getElementById('searchInput');
      const rand = Math.random();
      if (rand < 0.1) searchInput.placeholder = 'Свиной навоз оптом';
      else if (rand < 0.55) searchInput.placeholder = 'Что ищем?';
      else searchInput.placeholder = 'Погнали за покупками!';
    }

    const navPill = document.getElementById('navPill');
    const navIndicator = document.getElementById('navIndicator');
    const navItems = document.querySelectorAll('.nav-item');
    let indicatorPhysics = { isDragging: false, currentTransformX: 0, touchOffsetX: 0, velocity: 0, lastX: 0, lastTime: 0, currentIndex: 0, cachedItemWidth: 0 };

    function initIndicatorPhysics() {
      indicatorPhysics.cachedItemWidth = navItems[0].offsetWidth;
      updateIndicatorPosition(0, false);
      window.addEventListener('resize', () => {
        indicatorPhysics.cachedItemWidth = navItems[0].offsetWidth;
        updateIndicatorPosition(indicatorPhysics.currentIndex, false);
      });
    }

    // ИСПРАВЛЕНИЕ БАГА: Функция updateIndicatorPosition теперь пересчитывает ширину, если она равна 0
    function updateIndicatorPosition(index, isDragging = false) {
      // Пересчитываем ширину элемента навигации, если она не установлена или равна 0
      if (!indicatorPhysics.cachedItemWidth || indicatorPhysics.cachedItemWidth === 0) {
        const navItem = navItems[index] || navItems[0];
        if (navItem) {
          indicatorPhysics.cachedItemWidth = navItem.offsetWidth;
        }
      }
      
      // Если ширина все еще 0, пробуем вычислить её заново
      if (indicatorPhysics.cachedItemWidth === 0) {
        const navItem = navItems[0];
        if (navItem) {
          indicatorPhysics.cachedItemWidth = navItem.offsetWidth;
        }
      }
      
      const targetX = index * indicatorPhysics.cachedItemWidth;
      indicatorPhysics.currentTransformX = targetX;
      indicatorPhysics.currentIndex = index;
      if (isDragging) return;
      navIndicator.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease';
      navIndicator.style.transform = `translate3d(${targetX}px, 0, 0) scale(1)`;
      navIndicator.style.width = `calc(33.33% - 8px)`;
      navIndicator.style.borderRadius = '24px';
    }

    function switchTab(tab, index) {
      navItems.forEach(n => n.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const activeBtn = document.querySelector(`.nav-item[data-tab="${tab}"]`);
      if(activeBtn) activeBtn.classList.add('active');
      const pageMap = { 'home': 'pageHome', 'messages': 'pageMessages', 'profile': 'pageProfile' };
      const activePage = document.getElementById(pageMap[tab]);
      if(activePage) activePage.classList.add('active');
      updateIndicatorPosition(index, false);
      indicatorPhysics.currentIndex = index;
      const mainContent = document.getElementById('mainContent');
      if(mainContent) mainContent.scrollTop = 0;
      if (tab === 'messages') renderMessages();
      if (tab === 'profile') renderMyAds();
      if (tab === 'home') renderAds();
    }

    navPill.addEventListener('touchstart', (e) => {
      indicatorPhysics.isDragging = true;
      indicatorPhysics.lastX = e.touches[0].clientX;
      indicatorPhysics.lastTime = Date.now();
      indicatorPhysics.velocity = 0;
      navItems.forEach((item, idx) => { if(item.classList.contains('active')) indicatorPhysics.currentIndex = idx; });
      indicatorPhysics.touchOffsetX = e.touches[0].clientX - indicatorPhysics.currentTransformX;
      navIndicator.style.transition = 'none';
    }, { passive: true });

    navPill.addEventListener('touchmove', (e) => {
      if (!indicatorPhysics.isDragging) return;
      const touchX = e.touches[0].clientX;
      const currentTime = Date.now();
      const dt = currentTime - indicatorPhysics.lastTime;
      if (dt > 10) { indicatorPhysics.velocity = (touchX - indicatorPhysics.lastX) / dt; indicatorPhysics.lastX = touchX; indicatorPhysics.lastTime = currentTime; }
      let newX = touchX - indicatorPhysics.touchOffsetX;
      const maxIndex = navItems.length - 1;
      const minX = 0;
      const maxX = maxIndex * indicatorPhysics.cachedItemWidth;
      const limit = indicatorPhysics.cachedItemWidth * 0.4;
      if (newX < minX - limit) newX = (minX - limit) + (newX - (minX - limit)) * 0.15;
      else if (newX > maxX + limit) newX = (maxX + limit) + (newX - (maxX + limit)) * 0.15;
      const diffFromCenter = Math.abs(newX - (indicatorPhysics.currentIndex * indicatorPhysics.cachedItemWidth));
      const stretch = Math.min(diffFromCenter / 100, 0.25);
      navIndicator.style.transform = `translate3d(${newX}px, 0, 0) scale(1.2)`;
      navIndicator.style.width = `calc(33.33% - 8px + ${stretch * 15}px)`;
      navIndicator.style.borderRadius = `${24 - stretch * 8}px`;
      indicatorPhysics.currentTransformX = newX;
    }, { passive: true });

    navPill.addEventListener('touchend', (e) => {
      if (!indicatorPhysics.isDragging) return;
      indicatorPhysics.isDragging = false;
      const momentum = indicatorPhysics.velocity * 15;
      let finalX = indicatorPhysics.currentTransformX + momentum;
      finalX = Math.max(0, Math.min(finalX, 2 * indicatorPhysics.cachedItemWidth));
      let targetIndex = Math.round(finalX / indicatorPhysics.cachedItemWidth);
      targetIndex = Math.max(0, Math.min(2, targetIndex));
      const newTab = navItems[targetIndex].getAttribute('data-tab');
      const currentTab = navItems[indicatorPhysics.currentIndex].getAttribute('data-tab');
      if (newTab !== currentTab) switchTab(newTab, targetIndex);
      else updateIndicatorPosition(indicatorPhysics.currentIndex, false);
      navIndicator.style.width = `calc(33.33% - 8px)`;
      navIndicator.style.borderRadius = '24px';
    });

    navItems.forEach((btn, index) => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const tab = this.getAttribute('data-tab');
        if (tab) switchTab(tab, index);
      });
    });

    setTimeout(() => { initIndicatorPhysics(); }, 100);

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderAds(filter = '') {
      const ads = loadAds();
      const grid = document.getElementById('adsGrid');
      const empty = document.getElementById('homeEmpty');
      grid.innerHTML = '';
      let filteredAds = ads;
      if (filter.trim()) {
        const q = filter.toLowerCase().trim();
        filteredAds = ads.filter(ad => ad.title.toLowerCase().includes(q));
      }
      if (filteredAds.length === 0) {
        empty.style.display = 'flex';
        if (filter.trim() && ads.length > 0) empty.querySelector('.empty-state-text').textContent = 'Ничего не найдено';
        else empty.querySelector('.empty-state-text').textContent = 'Пока нет объявлений';
      } else {
        empty.style.display = 'none';
        filteredAds.forEach(ad => grid.appendChild(createAdCard(ad)));
      }
    }

    function createAdCard(ad, isMyAd = false) {
      const card = document.createElement('div');
      card.className = 'ad-card';
      card.onclick = () => openDetailModal(ad);
      const imgHtml = ad.photos && ad.photos.length > 0
        ? `<img class="ad-image" src="${ad.photos[0]}" alt="${escapeHtml(ad.title)}">`
        : `<div class="ad-image-placeholder">📷</div>`;
      let deleteBtn = '';
      if (isMyAd) {
        deleteBtn = `<button class="ad-delete-btn" onclick="deleteAd(event, '${ad.id}')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>`;
      }
      card.innerHTML = `${deleteBtn}<div class="ad-image-container">${imgHtml}</div><div class="ad-info"><div class="ad-title">${escapeHtml(ad.title)}</div><div class="ad-price">${escapeHtml(ad.price)}</div><div class="ad-city">📍 ${escapeHtml(ad.city)}</div></div>`;
      return card;
    }

    function deleteAd(event, adId) {
      event.stopPropagation();
      if (confirm('Удалить это объявление?')) {
        const ads = loadAds();
        saveAds(ads.filter(ad => ad.id !== adId));
        renderAds();
        renderMyAds();
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      }
    }

    function renderMyAds() {
      const ads = loadAds();
      const grid = document.getElementById('myAdsGrid');
      const empty = document.getElementById('myAdsEmpty');
      grid.innerHTML = '';
      const myAds = ads.filter(ad => ad.userId === currentUser.id);
      if (myAds.length === 0) { empty.style.display = 'flex'; }
      else { empty.style.display = 'none'; myAds.forEach(ad => grid.appendChild(createAdCard(ad, true))); }
    }

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function (e) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => renderAds(e.target.value), 200);
    });

    let selectedPhotos = [];
    const bottomNav = document.getElementById('bottomNav');
    function hideBottomNav() { bottomNav.classList.add('hidden'); }
    function showBottomNav() { bottomNav.classList.remove('hidden'); }

    function openCreateModal() {
      selectedPhotos = [];
      resetPhotoSlots();
      document.getElementById('adTitle').value = '';
      document.getElementById('adPrice').value = '';
      document.getElementById('adCity').value = '';
      document.getElementById('createModal').classList.add('active');
      hideBottomNav();
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }
    function closeCreateModal() {
      document.getElementById('createModal').classList.remove('active');
      showBottomNav();
    }
    document.getElementById('openCreateBtn').addEventListener('click', openCreateModal);

    function resetPhotoSlots() {
      for (let i = 0; i < 4; i++) {
        const slot = document.getElementById('photoSlot' + i);
        slot.innerHTML = '<span class="add-icon">+</span>';
        slot.style.display = 'flex';
        slot.onclick = () => addPhoto(i);
      }
    }
    function addPhoto(index) { document.getElementById('photoInput').dataset.index = index; document.getElementById('photoInput').click(); }
    
    function handlePhotoSelect(event) {
      const files = event.target.files;
      if (!files || files.length === 0) return;
      const remainingSlots = 4 - selectedPhotos.length;
      if (remainingSlots <= 0) {
        tg.showAlert('Максимум 4 фотографии');
        event.target.value = '';
        return;
      }
      const filesToProcess = Array.from(files).slice(0, remainingSlots);
      let processedCount = 0;
      filesToProcess.forEach(file => {
        compressImage(file, (compressedDataUrl) => {
          selectedPhotos.push(compressedDataUrl);
          processedCount++;
          const slotIndex = selectedPhotos.length - 1;
          updatePhotoSlot(slotIndex, compressedDataUrl);
          if (processedCount === filesToProcess.length) {
             event.target.value = '';
          }
        });
      });
    }

    function compressImage(file, callback) {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const MAX_WIDTH = 800;
          const MAX_HEIGHT = 800;
          let width = img.width;
          let height = img.height;
          if (width > height) {
            if (width > MAX_WIDTH) {
              height *= MAX_WIDTH / width;
              width = MAX_WIDTH;
            }
          } else {
            if (height > MAX_HEIGHT) {
              width *= MAX_HEIGHT / height;
              height = MAX_HEIGHT;
            }
          }
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          callback(dataUrl);
        }
      }
    }
    
    function updatePhotoSlot(index, dataUrl) {
      const slot = document.getElementById('photoSlot' + index);
      slot.innerHTML = `<img src="${dataUrl}" alt="Photo"><button class="remove-btn" onclick="removePhoto(event, ${index})">✕</button>`;
      slot.onclick = null;
    }
    function removePhoto(event, index) {
      event.stopPropagation();
      selectedPhotos.splice(index, 1);
      resetPhotoSlots();
      selectedPhotos.forEach((photo, i) => updatePhotoSlot(i, photo));
    }
    
    function createAd() {
      const title = document.getElementById('adTitle').value.trim();
      const price = document.getElementById('adPrice').value.trim();
      const city = document.getElementById('adCity').value.trim();
      if (!title) { tg.showAlert('Введите название товара'); return; }
      if (!price) { tg.showAlert('Введите цену'); return; }
      if (!city) { tg.showAlert('Введите город'); return; }
      if (selectedPhotos.length === 0) { tg.showAlert('Добавьте хотя бы одну фотографию'); return; }
      
      const ads = loadAds();
      const newAd = {
        id: 'ad_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        userId: currentUser.id,
        userName: currentUser.firstName,
        userUsername: currentUser.username,
        userPhoto: currentUser.photoUrl,
        title, price, city,
        photos: selectedPhotos.slice(0, 4),
        createdAt: Date.now()
      };
      
      try {
        ads.unshift(newAd);
        saveAds(ads);
        selectedPhotos = [];
        resetPhotoSlots();
        document.getElementById('adTitle').value = '';
        document.getElementById('adPrice').value = '';
        document.getElementById('adCity').value = '';
        closeCreateModal();
        renderAds();
        renderMyAds();
        switchTab('home', 0);
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        tg.showAlert('Объявление создано! ✅');
      } catch (e) {
        ads.shift();
        console.error(e);
      }
    }

    let currentCarouselIndex = 0;
    let currentAdForChat = null;

    function openDetailModal(ad) {
      const modal = document.getElementById('detailModal');
      document.getElementById('detailTitle').textContent = ad.title;
      document.getElementById('detailPrice').textContent = ad.price;
      document.getElementById('detailCity').textContent = '📍 ' + ad.city;
      document.getElementById('detailSellerName').textContent = ad.userName || 'Продавец';
      if (ad.userPhoto) {
        document.getElementById('detailSellerAvatar').innerHTML = `<img src="${ad.userPhoto}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">`;
      } else {
        document.getElementById('detailSellerAvatar').innerHTML = '👤';
      }
      const track = document.getElementById('carouselTrack');
      const dots = document.getElementById('carouselDots');
      track.innerHTML = '';
      dots.innerHTML = '';
      currentCarouselIndex = 0;
      ad.photos.forEach((photo, i) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.innerHTML = `<img src="${photo}" alt="Photo ${i + 1}">`;
        track.appendChild(slide);
        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.onclick = () => goToSlide(i);
        dots.appendChild(dot);
      });
      modal.dataset.adId = ad.id;
      modal.classList.add('active');
      hideBottomNav();
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function goToSlide(index) {
      const track = document.getElementById('carouselTrack');
      track.style.transform = `translateX(-${index * 100}%)`;
      currentCarouselIndex = index;
      document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === index));
    }
    function closeDetailModal() { document.getElementById('detailModal').classList.remove('active'); showBottomNav(); }

    function contactSeller() {
      const modal = document.getElementById('detailModal');
      const adId = modal.dataset.adId;
      const ads = loadAds();
      const ad = ads.find(a => a.id === adId);
      if (!ad) return;
      currentAdForChat = ad;
      const chats = loadChats();
      let chat = chats.find(c => c.adId === adId && c.sellerId === ad.userId);
      if (!chat) {
        chat = {
          id: 'chat_' + Date.now(),
          adId, adTitle: ad.title,
          sellerId: ad.userId, sellerName: ad.userName, sellerPhoto: ad.userPhoto, sellerUsername: ad.userUsername,
          buyerId: currentUser.id,
          messages: [],
          createdAt: Date.now(),
          updatedAt: Date.now(),
          lastActive: Date.now()
        };
        chats.push(chat);
        saveChats(chats);
      }
      closeDetailModal();
      openChat(chat);
    }

    function formatLastSeen(lastActiveTimestamp) {
      if (!lastActiveTimestamp) return 'Был(а) недавно';
      const now = Date.now();
      const diff = now - lastActiveTimestamp;
      if (diff < 5 * 60 * 1000) {
        return 'В сети';
      }
      const minutes = Math.floor(diff / (60 * 1000));
      const hours = Math.floor(diff / (60 * 60 * 1000));
      const days = Math.floor(diff / (24 * 60 * 60 * 1000));
      if (minutes < 60) {
        return `Был(а) ${minutes} мин. назад`;
      } else if (hours < 24) {
        return `Был(а) ${hours} ч. назад`;
      } else {
        return `Был(а) ${days} дн. назад`;
      }
    }

    function updateChatHeaderStatus(chat) {
      const statusEl = document.getElementById('chatHeaderStatus');
      const statusText = formatLastSeen(chat.lastActive);
      statusEl.textContent = statusText;
      if (statusText === 'В сети') {
        statusEl.classList.add('online');
      } else {
        statusEl.classList.remove('online');
      }
    }

    function openChat(chat) {
      const chatModal = document.getElementById('chatModal');
      document.getElementById('chatHeaderName').textContent = chat.sellerName;
      const avatarEl = document.getElementById('chatHeaderAvatar');
      if (chat.sellerPhoto) {
        avatarEl.innerHTML = `<img src="${chat.sellerPhoto}" alt="">`;
      } else {
        avatarEl.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#ddd;color:#555;font-size:16px;">👤</div>`;
      }
      chatModal.dataset.chatId = chat.id;
      chatModal.classList.add('active');
      updateChatHeaderStatus(chat);
      const chats = loadChats();
      const chatIdx = chats.findIndex(c => c.id === chat.id);
      if (chatIdx !== -1) {
        chats[chatIdx].unreadCount = 0;
        saveChats(chats);
        renderMessages();
      }
      renderChatMessages(chat);
      // При использовании column-reverse прокрутка вниз = scrollTop = 0
      setTimeout(() => {
        const messagesContainer = document.getElementById('chatMessages');
        messagesContainer.scrollTop = 0;
      }, 100);
    }

    // ИСПРАВЛЕНИЕ БАГА: Добавлена задержка для обновления DOM перед переключением вкладки
    function closeChat() {
      document.getElementById('chatModal').classList.remove('active');
      currentAdForChat = null;
      removeAttachedPhoto();
      
      // Небольшая задержка для обновления DOM перед переключением вкладки
      setTimeout(() => {
        switchTab('messages', 1);
      }, 50);
      
      showBottomNav();
    }

    function openOtherProfile() {
      const chatModal = document.getElementById('chatModal');
      const chatId = chatModal.dataset.chatId;
      const chats = loadChats();
      const chat = chats.find(c => c.id === chatId);
      if (!chat) return;

      const modal = document.getElementById('otherProfileModal');
      const avatar = document.getElementById('otherProfileAvatar');
      if (chat.sellerPhoto) {
        avatar.src = chat.sellerPhoto;
        avatar.style.display = 'block';
      } else {
        avatar.style.display = 'none';
      }
      document.getElementById('otherProfileName').textContent = chat.sellerName;
      document.getElementById('otherProfileUsername').textContent = chat.sellerUsername ? '@' + chat.sellerUsername : '';
      const ads = loadAds();
      const userAds = ads.filter(ad => ad.userId === chat.sellerId);
      document.getElementById('otherProfileAdsCount').textContent = userAds.length;
      modal.classList.add('active');
    }

    function closeOtherProfile() {
      document.getElementById('otherProfileModal').classList.remove('active');
    }

    function renderChatMessages(chat) {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      
      if (chat.messages.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-text">Напишите свое первое сообщение</div></div>';
        return;
      }
      
      // При column-reverse порядок должен быть обратным: новые сверху
      [...chat.messages].reverse().forEach(msg => {
        const isSent = msg.senderId === currentUser.id;
        const messageDiv = document.createElement('div');
        messageDiv.className = `chat-message ${isSent ? 'sent' : 'received'}`;
        
        let contentHtml = '';
        if (msg.image) {
          contentHtml += `<img src="${msg.image}" alt="Photo">`;
        }
        if (msg.text) {
          contentHtml += `<div>${escapeHtml(msg.text)}</div>`;
        }
        
        const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        messageDiv.innerHTML = `${contentHtml}<div class="chat-message-time">${time}</div>`;
        container.appendChild(messageDiv);
      });
    }

    let attachedChatPhoto = null;

    function handleChatPhotoSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      compressImage(file, (dataUrl) => {
        attachedChatPhoto = dataUrl;
        document.getElementById('attachedPhotoImg').src = dataUrl;
        document.getElementById('attachedPhotoPreview').classList.add('active');
        document.getElementById('chatInput').focus();
      });
      event.target.value = '';
    }

    function removeAttachedPhoto() {
      attachedChatPhoto = null;
      document.getElementById('attachedPhotoPreview').classList.remove('active');
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      
      if (!text && !attachedChatPhoto) return;
      
      const chatModal = document.getElementById('chatModal');
      const chatId = chatModal.dataset.chatId;
      const chats = loadChats();
      const chat = chats.find(c => c.id === chatId);
      
      if (chat) {
        const newMessage = {
          id: 'msg_' + Date.now(),
          senderId: currentUser.id,
          text: text,
          image: attachedChatPhoto,
          timestamp: Date.now()
        };
        
        chat.messages.push(newMessage);
        chat.updatedAt = Date.now();
        chat.lastActive = Date.now();
        
        saveChats(chats);
        
        input.value = '';
        removeAttachedPhoto();
        
        renderChatMessages(chat);
        updateChatHeaderStatus(chat);
        
        // При column-reverse прокрутка вниз = scrollTop = 0
        setTimeout(() => {
          const messagesContainer = document.getElementById('chatMessages');
          messagesContainer.scrollTop = 0;
        }, 50);
        
        renderMessages();
      }
    }

    document.getElementById('chatInput')?.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });

    function initChatSwipe(item, chatId) {
      let startX = 0;
      let currentX = 0;
      let isSwiping = false;
      const deleteWidth = 120;
      
      item.addEventListener('touchstart', (e) => {
        document.querySelectorAll('.message-item').forEach(el => {
          if (el !== item) {
            el.style.transform = 'translateX(0)';
            const wrapper = el.closest('.message-item-wrapper');
            if(wrapper) {
                const bg = wrapper.querySelector('.message-delete-bg');
                const btn = wrapper.querySelector('.message-delete-btn');
                if(bg) bg.classList.remove('visible');
                if(btn) btn.classList.remove('visible');
            }
          }
        });

        startX = e.touches[0].clientX;
        currentX = startX;
        isSwiping = true;
        item.classList.add('swiping');
      }, { passive: true });
      
      item.addEventListener('touchmove', (e) => {
        if (!isSwiping) return;
        const touchX = e.touches[0].clientX;
        const diff = startX - touchX;
        if (diff > 0) {
          currentX = touchX;
          const translateX = Math.min(diff, deleteWidth);
          item.style.transform = `translateX(-${translateX}px)`;
        }
      }, { passive: true });
      
      item.addEventListener('touchend', (e) => {
        if (!isSwiping) return;
        isSwiping = false;
        item.classList.remove('swiping');
        
        const diff = startX - currentX;
        const wrapper = item.closest('.message-item-wrapper');
        const deleteBg = wrapper.querySelector('.message-delete-bg');
        const deleteBtn = wrapper.querySelector('.message-delete-btn');
        
        if (diff > deleteWidth / 2) {
          item.style.transform = `translateX(-${deleteWidth}px)`;
          if (deleteBg) deleteBg.classList.add('visible');
          if (deleteBtn) deleteBtn.classList.add('visible');
        } else {
          item.style.transform = 'translateX(0)';
          if (deleteBg) deleteBg.classList.remove('visible');
          if (deleteBtn) deleteBtn.classList.remove('visible');
        }
      });
    }

    function deleteChat(chatId) {
      if (confirm('Удалить этот чат?')) {
        const chats = loadChats();
        saveChats(chats.filter(c => c.id !== chatId));
        renderMessages();
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      }
    }

    function renderMessages() {
      const chats = loadChats();
      const container = document.getElementById('messagesList');
      const userChats = chats.filter(c => c.buyerId === currentUser.id);
      
      if (userChats.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-text">У вас пока нет чатов</div></div>`;
        return;
      }
      
      userChats.sort((a, b) => b.updatedAt - a.updatedAt);
      container.innerHTML = '';
      
      userChats.forEach(chat => {
        const lastMessage = chat.messages[chat.messages.length - 1];
        let preview = 'Нет сообщений';
        if (lastMessage) {
          if (lastMessage.image) preview = '📷 Фотография';
          else preview = lastMessage.text;
        }
        
        const wrapper = document.createElement('div');
        wrapper.className = 'message-item-wrapper';
        
        const deleteBg = document.createElement('div');
        deleteBg.className = 'message-delete-bg';
        deleteBg.innerHTML = `
          <svg viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
          <span>Удалить</span>
        `;
        
        const messageItem = document.createElement('div');
        messageItem.className = 'message-item';
        messageItem.onclick = function() {
          const style = window.getComputedStyle(this);
          const matrix = new WebKitCSSMatrix(style.transform);
          if (matrix.m41 !== 0) {
             this.style.transform = 'translateX(0)';
             const wrapper = this.closest('.message-item-wrapper');
             if(wrapper) {
                const bg = wrapper.querySelector('.message-delete-bg');
                const btn = wrapper.querySelector('.message-delete-btn');
                if(bg) bg.classList.remove('visible');
                if(btn) btn.classList.remove('visible');
             }
             return;
          }
          openChat(chat);
        };
        
        const avatarHtml = chat.sellerPhoto
          ? `<div class="message-avatar"><img src="${chat.sellerPhoto}" alt=""></div>`
          : '<div class="message-avatar">👤</div>';
        
        const unreadBadge = chat.unreadCount > 0 ? `<div class="unread-badge">${chat.unreadCount}</div>` : '';
        
        messageItem.innerHTML = `
          ${avatarHtml}
          <div class="message-content">
            <div class="message-name">${escapeHtml(chat.sellerName)}</div>
            <div class="message-preview">${escapeHtml(preview)}</div>
          </div>
          ${unreadBadge}
        `;
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'message-delete-btn';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          deleteChat(chat.id);
        };
        
        wrapper.appendChild(deleteBg);
        wrapper.appendChild(messageItem);
        wrapper.appendChild(deleteBtn);
        container.appendChild(wrapper);
        
        initChatSwipe(messageItem, chat.id);
      });
    }

    document.getElementById('createModal').addEventListener('click', function (e) {
      if (e.target === this) closeCreateModal();
    });

    let touchStartX = 0;
    let touchEndX = 0;
    document.getElementById('detailCarousel').addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    document.getElementById('detailCarousel').addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      const totalSlides = document.querySelectorAll('.carousel-slide').length;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && currentCarouselIndex < totalSlides - 1) goToSlide(currentCarouselIndex + 1);
        else if (diff < 0 && currentCarouselIndex > 0) goToSlide(currentCarouselIndex - 1);
      }
    }, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        if (window.innerHeight - window.visualViewport.height > 150) {
           hideBottomNav();
        } else {
           if (!document.getElementById('createModal').classList.contains('active')) {
             showBottomNav();
           }
        }
      });
    }

    setRandomSearchPlaceholder();
    renderAds();
    renderMyAds();
  </script>
</body>
</html>
