<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swapka</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #000000;
            --text-secondary: #555555;
            --text-muted: #888888;
            --header-bg: #ffffff;
            --input-bg: #F5C56B;
            --border-color: #dddddd;
            --modal-bg: #ffffff;
            --nav-bg: #ffffff;
            --msg-item-bg: #D3E3C6;
            --msg-top-bg: #eeeeee;
            --desc-box-bg: #E0A66B;
            --shadow-color: rgba(0,0,0,0.1);
            --btn-create-gradient: linear-gradient(90deg, #f5a66b, #e06b6b);
        }

        .dark-theme {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-secondary: #aaaaaa;
            --text-muted: #777777;
            --header-bg: #1e1e1e;
            --input-bg: #333333;
            --border-color: #444444;
            --modal-bg: #1e1e1e;
            --nav-bg: #1e1e1e;
            --msg-item-bg: #2a3a2a;
            --msg-top-bg: #2a2a2a;
            --desc-box-bg: #5c442a;
            --shadow-color: rgba(0,0,0,0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- Header Styles --- */
        .page-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: var(--header-bg);
            z-index: 100;
            padding-bottom: 8px;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .page-header.hidden {
            transform: translateY(-100%);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        .logo {
            height: 45px;
            width: auto;
            object-fit: contain;
        }

        .search-bar {
            padding: 0 12px 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-input {
            flex-grow: 1;
            background-color: var(--input-bg);
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            color: var(--text-color);
        }

        .heart-icon {
            color: #E06B6B;
            font-size: 22px;
        }

        .filters {
            padding: 0 12px 8px;
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            background: #333;
            color: white;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
        }

        /* --- Scroll to Top Button --- */
        #scrollTopBtn {
            position: fixed;
            top: 75px;
            right: 12px;
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            box-shadow: 0 2px 5px var(--shadow-color);
            z-index: 90;
            cursor: pointer;
        }

        /* --- Main Content Area --- */
        .page {
            display: none;
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 70px;
        }

        .page.active {
            display: block;
        }

        #homePage.active {
            padding-top: 125px;
        }

        #messagesPage.active, #profilePage.active {
            padding-top: 75px;
        }

        /* --- Grid Layout --- */
        .ads-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 8px;
        }

        .ad-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 1px 3px var(--shadow-color);
            transition: background-color 0.3s ease;
        }

        .ad-image {
            width: 100%;
            height: 140px;
            background-color: #E08E8E;
            object-fit: cover;
        }
        
        .ad-placeholder {
            width: 100%;
            height: 140px;
            background-color: #E08E8E;
            opacity: 0.6;
        }

        .ad-info {
            padding: 6px;
        }

        .ad-title {
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-color);
        }

        .ad-price {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .ad-city {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* --- Messages Tab --- */
        .messages-list {
            padding: 8px;
        }

        .message-item {
            background: var(--msg-item-bg);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .message-top {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            background: var(--msg-top-bg);
            padding: 8px;
            border-radius: 12px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #ccc;
            object-fit: cover;
        }

        .msg-info {
            flex-grow: 1;
        }

        .msg-name {
            font-weight: bold;
            font-size: 13px;
            color: var(--text-color);
        }

        .msg-preview {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .msg-badge {
            background: red;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 9px;
        }

        /* --- Profile Tab --- */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        .profile-top-row {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            justify-content: center;
        }

        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ddd;
            object-fit: cover;
            flex-shrink: 0;
        }

        .profile-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-grow: 1;
        }

        .profile-name {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-color);
        }

        .rating {
            color: #FFD700;
            margin-top: 4px;
        }

        .theme-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
            flex-shrink: 0;
        }

        .create-btn {
            background: var(--btn-create-gradient);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            max-width: 200px;
        }

        /* --- Bottom Navigation --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            box-shadow: 0 -2px 10px var(--shadow-color);
            z-index: 100;
            border-radius: 16px 16px 0 0;
            transition: background-color 0.3s ease;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 9px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0 15px;
        }

        .nav-item.active {
            color: #5754A4;
        }

        .nav-icon {
            font-size: 18px;
            margin-bottom: 2px;
        }

        /* --- Create Ad Modal --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            justify-content: center;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--modal-bg);
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 15px;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            color: var(--text-color);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 16px;
        }

        .close-modal {
            font-size: 22px;
            cursor: pointer;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
            font-size: 13px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 13px;
            background: var(--bg-color);
            color: var(--text-color);
        }

        .photo-upload {
            border: 2px dashed var(--border-color);
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-muted);
        }

        .preview-images {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .preview-img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(90deg, #8857ff, #e05288);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* --- Detail Page --- */
        .detail-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            z-index: 150;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            color: var(--text-color);
        }

        .detail-page.active {
            display: block;
        }

        .detail-header {
            padding: 8px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 10;
        }

        .back-btn {
            font-size: 22px;
            cursor: pointer;
            margin-right: 12px;
        }

        .detail-logo {
            margin: 0 auto;
            height: 35px;
            width: auto;
        }

        .detail-image-container {
            width: 100%;
            height: 280px;
            background: #E08E8E;
            margin-bottom: 12px;
        }
        
        .detail-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-content {
            padding: 0 12px 80px;
        }

        .detail-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .detail-price {
            font-size: 16px;
            margin-bottom: 4px;
            color: var(--text-color);
        }

        .detail-city {
            color: var(--text-muted);
            margin-bottom: 12px;
            font-size: 13px;
        }

        .detail-desc-box {
            background: var(--desc-box-bg);
            padding: 12px;
            border-radius: 8px;
            min-height: 80px;
            font-size: 13px;
            color: var(--text-color);
        }

        /* --- Toast Notification --- */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
